/* ============================= STATISTICS VIEW ============================= */
function StatisticsView({ items, sim, extraBudget, strategy }) {
  const activeDebts = items.filter((i) => i.type === "debt" && i.status === "active");
  const activeReceivables = items.filter((i) => i.type === "receivable" && i.status === "active");
  const totalDebt = activeDebts.reduce((s, d) => s + d.balance, 0);
  const totalReceivable = activeReceivables.reduce((s, d) => s + d.balance, 0);
  const net = totalReceivable - totalDebt;

  let totalPaidOut = 0, totalReceived = 0;
  items.forEach((it) => (it.history || []).forEach((t) => {
    if (it.type === "debt" && t.kind === "payment") totalPaidOut += t.amount;
    if (it.type === "receivable" && t.kind === "payment") totalReceived += t.amount;
  }));

  const settledCount = items.filter((i) => i.status === "settled").length;
  const upcoming = items.filter((i) => i.status === "active" && i.dueDate && daysUntil(i.dueDate) <= (i.reminderDays ?? 3) && daysUntil(i.dueDate) >= -30);

  const topBalances = [...items].filter((i) => i.status === "active" && i.balance > 0).sort((a, b) => b.balance - a.balance).slice(0, 6);
  const maxTop = Math.max(1, ...topBalances.map((i) => i.balance));

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        <MetricCard icon="trending-down" label="You owe" animateValue={totalDebt} sub={`${activeDebts.length} active`} accent="amber" delay={0} tip="Sum of all balances across your active debts." />
        <MetricCard icon="trending-up" label="Owed to you" animateValue={totalReceivable} sub={`${activeReceivables.length} active`} accent="azure" delay={40} tip="Sum of all balances people still owe you." />
        <MetricCard icon="wallet" label="Net position" animateValue={net} signed sub={net >= 0 ? "You're net positive" : "You're net negative"} accent={net >= 0 ? "emerald" : "amber"} delay={80} tip="What you'd have left if everyone paid you back and you paid everyone off." />
        <MetricCard icon="banknote" label="Interest to be paid" animateValue={sim.totalInterest} sub={`${strategy === "snowball" ? "Snowball" : "Avalanche"} plan`} accent="violet" delay={120} tip="Total interest you'll pay over the life of your current payoff plan." />
        <MetricCard icon="badge-check" label="Total paid historically" animateValue={totalPaidOut} sub="Across all your debts" accent="emerald" delay={160} tip="Every payment you've ever logged toward your own debts." />
        <MetricCard icon="archive" label="Total received historically" animateValue={totalReceived} sub="From people who owed you" accent="azure" delay={200} tip="Every payment you've received from people who owed you money." />
        <MetricCard icon="badge-check" label="Settled entries" value={String(settledCount)} sub="Fully paid off or repaid" accent="violet" delay={240} tip="Debts and loans you've marked as fully paid off or repaid." />
        <MetricCard icon="alarm-clock" label="Due soon" value={String(upcoming.length)} sub="Within your reminder window" accent="amber" delay={280} tip="Entries whose due date falls inside their reminder window." />
      </div>

      <div className="glass rounded-3xl p-5 sm:p-7">
        <Tooltip label="Your six biggest active balances, debts or receivables, ranked highest to lowest." position="bottom">
          <h3 className="font-display font-semibold text-lg mb-4 inline-block">Largest active balances</h3>
        </Tooltip>
        {topBalances.length === 0 ? (
          <p className="text-[13px] text-[var(--text-muted)]">No active balances to rank yet.</p>
        ) : (
          <div className="space-y-3">
            {topBalances.map((it, i) => (
              <div key={it.id} className="anim-in" style={{ animationDelay: `${i * 40}ms` }}>
                <div className="flex items-center justify-between text-[13px] mb-1">
                  <span className="truncate min-w-0 flex-1 font-medium">{it.name}{it.contact ? ` · ${it.contact}` : ""}</span>
                  <span className="font-mono text-[var(--text-muted)] shrink-0 ml-2">{fmtMoney(it.balance)}</span>
                </div>
                <div className="h-2.5 rounded-full bg-[#EEEBE3] overflow-hidden">
                  <div className="progress-bar-fill h-full rounded-full" style={{ width: `${(it.balance / maxTop) * 100}%`, background: it.type === "debt" ? "linear-gradient(90deg,#B8790A88,#B8790A)" : "linear-gradient(90deg,#14120D66,#14120D)" }}></div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {upcoming.length > 0 && (
        <div className="glass rounded-3xl p-5 sm:p-7">
          <Tooltip label="Entries due soon, based on each one's own reminder window." position="bottom">
            <h3 className="font-display font-semibold text-lg mb-4 flex items-center gap-2"><Icon name="alarm-clock" size={17} className="text-[var(--amber)]" /> Upcoming reminders</h3>
          </Tooltip>
          <div className="space-y-2">
            {upcoming.sort((a, b) => daysUntil(a.dueDate) - daysUntil(b.dueDate)).map((it) => (
              <div key={it.id} className="flex items-center justify-between px-4 py-3 rounded-xl bg-[var(--surface)]">
                <span className="text-sm font-medium">{it.name}{it.contact ? ` · ${it.contact}` : ""}</span>
                <DueBadge item={it} />
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================= SETTINGS ============================= */
function ChangeCredentialModal({ onClose, onSubmit }) {
  const [step, setStep] = useState("current"); // current | new | confirm
  const [currentVal, setCurrentVal] = useState("");
  const [newVal, setNewVal] = useState("");
  const [confirmVal, setConfirmVal] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  const currentValid = currentVal.length >= 4;
  const newValid = newVal.length >= 4 && newVal.length <= 6;

  const handleCurrentContinue = () => { if (currentValid) { setError(""); setStep("new"); } };
  const handleNewContinue = () => { if (newValid) { setError(""); setStep("confirm"); } };

  const handleFinalSubmit = async () => {
    if (confirmVal !== newVal) { setError("PINs don't match — try again."); return; }
    setBusy(true);
    const result = await onSubmit(currentVal, newVal);
    setBusy(false);
    if (!result.ok) { setError(result.error); setStep("current"); setCurrentVal(""); return; }
    onClose(true);
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center modal-backdrop p-4" style={{ background: "rgba(4,6,10,0.7)" }} onClick={() => onClose(false)}>
      <div className="modal-panel glass w-full sm:max-w-sm sm:rounded-3xl p-6 sm:p-7 max-h-[90vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-5">
          <h2 className="font-display text-lg font-semibold">
            {step === "current" ? "Confirm it's you" : step === "new" ? "Choose a new PIN" : "Confirm your new PIN"}
          </h2>
          <button onClick={() => onClose(false)} className="icon-btn w-9 h-9 rounded-full flex items-center justify-center text-[var(--text-muted)] hover:bg-[var(--surface-hover)] focus-ring"><Icon name="x" size={17} /></button>
        </div>

        {step === "current" && (
          <div className="space-y-4">
            <p className="text-[13px] text-[var(--text-muted)]">Enter your current PIN to continue.</p>
            <input autoFocus type="text" inputMode="numeric" value={currentVal}
              onChange={(e) => setCurrentVal(e.target.value.replace(/\D/g, "").slice(0, 6))}
              onKeyDown={(e) => { if (e.key === "Enter") handleCurrentContinue(); }}
              className="w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl px-4 py-3 text-sm font-mono tracking-widest text-center focus-ring focus:border-[var(--emerald)]"
              placeholder="Current PIN" />
            {error && <p className="text-[var(--danger)] text-xs font-medium">{error}</p>}
            <button onClick={handleCurrentContinue} disabled={!currentValid}
              className="w-full h-12 rounded-2xl font-display font-semibold text-[15px] disabled:opacity-30 focus-ring" style={{ background: "var(--emerald)", color: "#211804" }}>
              Continue
            </button>
          </div>
        )}

        {step === "new" && (
          <div className="space-y-4">
            <input autoFocus type="text" inputMode="numeric" value={newVal}
              onChange={(e) => setNewVal(e.target.value.replace(/\D/g, "").slice(0, 6))}
              onKeyDown={(e) => { if (e.key === "Enter") handleNewContinue(); }}
              className="w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl px-4 py-3 text-sm font-mono tracking-widest text-center focus-ring focus:border-[var(--emerald)]"
              placeholder="New 4–6 digit PIN" />
            <button onClick={handleNewContinue} disabled={!newValid}
              className="w-full h-12 rounded-2xl font-display font-semibold text-[15px] disabled:opacity-30 focus-ring" style={{ background: "var(--emerald)", color: "#211804" }}>
              Continue
            </button>
          </div>
        )}

        {step === "confirm" && (
          <div className="space-y-4">
            <p className="text-[13px] text-[var(--text-muted)]">Enter it once more to lock it in.</p>
            <input autoFocus type="text" inputMode="numeric" value={confirmVal}
              onChange={(e) => setConfirmVal(e.target.value.replace(/\D/g, "").slice(0, 6))}
              onKeyDown={(e) => { if (e.key === "Enter") handleFinalSubmit(); }}
              className="w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl px-4 py-3 text-sm font-mono tracking-widest text-center focus-ring focus:border-[var(--emerald)]"
              placeholder="Confirm PIN" />
            {error && <p className="text-[var(--danger)] text-xs font-medium">{error}</p>}
            <button onClick={handleFinalSubmit} disabled={busy || confirmVal.length < 4}
              className="w-full h-12 rounded-2xl font-display font-semibold text-[15px] disabled:opacity-30 focus-ring" style={{ background: "var(--emerald)", color: "#211804" }}>
              {busy ? "Saving…" : "Save new PIN"}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function AppearanceCard() {
  const [dark, setDark] = useState(() => document.documentElement.getAttribute("data-theme") === "dark");

  useEffect(() => {
    const sync = () => setDark(document.documentElement.getAttribute("data-theme") === "dark");
    window.addEventListener("ledger-theme-change", sync);
    return () => window.removeEventListener("ledger-theme-change", sync);
  }, []);

  const setTheme = (isDark) => {
    setDark(isDark);
    document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
    try { localStorage.setItem("ledger_theme", isDark ? "dark" : "light"); } catch (e) { /* ignore */ }
    window.dispatchEvent(new Event("ledger-theme-change"));
  };

  return (
    <div className="glass rounded-3xl p-5 sm:p-7">
      <div className="flex items-center gap-2 mb-5">
        <Icon name={dark ? "moon" : "sun"} size={17} className="text-[var(--emerald)]" />
        <h3 className="font-display font-semibold text-lg">Appearance</h3>
      </div>
      <div className="grid grid-cols-2 gap-1 p-1 rounded-2xl bg-[var(--surface)] border border-[var(--border-soft)]">
        <button onClick={() => setTheme(false)} className="flex items-center justify-center gap-2 py-2.5 rounded-xl text-sm font-display font-medium transition-all"
          style={{ background: !dark ? "var(--emerald-dim)" : "transparent", color: !dark ? "var(--emerald)" : "var(--text-muted)", border: !dark ? "1px solid var(--accent-border)" : "1px solid transparent" }}>
          <Icon name="sun" size={14} /> Light
        </button>
        <button onClick={() => setTheme(true)} className="flex items-center justify-center gap-2 py-2.5 rounded-xl text-sm font-display font-medium transition-all"
          style={{ background: dark ? "var(--emerald-dim)" : "transparent", color: dark ? "var(--emerald)" : "var(--text-muted)", border: dark ? "1px solid var(--accent-border)" : "1px solid transparent" }}>
          <Icon name="moon" size={14} /> Dark
        </button>
      </div>
    </div>
  );
}

/* ============================= ASSISTANT PANEL ============================= */
function AssistantConnectAI({ assistant, saveData, onClose }) {
  const [apiKey, setApiKey] = useState(assistant.apiKey || "");
  const [model, setModel] = useState(assistant.model || "claude-sonnet-5");
  const [showKey, setShowKey] = useState(false);
  const connected = !!assistant.apiKey;

  const save = () => {
    saveData((prev) => ({ ...prev, assistant: { ...prev.assistant, apiKey: apiKey.trim(), model } }));
    onClose();
  };
  const disconnect = () => {
    saveData((prev) => ({ ...prev, assistant: { ...prev.assistant, apiKey: "" } }));
    setApiKey("");
    onClose();
  };

  return (
    <div className="p-5 sm:p-6">
      <div className="flex items-center justify-between mb-4">
        <h3 className="font-display font-bold text-[15px]">Connect your own AI</h3>
        <button onClick={onClose} className="icon-btn w-8 h-8 rounded-full flex items-center justify-center text-[var(--text-muted)] hover:bg-[var(--surface-hover)] focus-ring"><Icon name="x" size={15} /></button>
      </div>
      <p className="text-[12.5px] leading-relaxed mb-4" style={{ color: "var(--text-muted)" }}>
        Ledger's built-in assistant runs entirely on your device. Connecting your own <span style={{ fontWeight: 500, color: "var(--text-primary)" }}>Anthropic API key</span> instead lets it hold real open-ended conversations — but your messages are then sent directly from your browser to Anthropic's API. That's a genuine exception to "nothing leaves this device," so it's off by default and entirely your call.
      </p>
      <p className="text-[11.5px] leading-relaxed mb-5 px-3 py-2.5 rounded-xl" style={{ background: "var(--amber-dim)", color: "var(--text-muted)" }}>
        Your key is stored encrypted on this device, the same as everything else in Ledger — but it's also sent as a plain request header to Anthropic on every message, visible to anyone with access to this browser's network tools. Consider using a key with a spend limit.
      </p>
      <label className="text-[12px] font-medium mb-1.5 block" style={{ color: "var(--text-muted)" }}>Anthropic API key</label>
      <div className="relative mb-4">
        <input type={showKey ? "text" : "password"} value={apiKey} onChange={(e) => setApiKey(e.target.value)} placeholder="sk-ant-..."
          className="w-full bg-[var(--surface-hover)] border border-[var(--border-soft)] rounded-full px-4 py-2.5 pr-11 text-sm font-mono focus-ring" />
        <button type="button" onClick={() => setShowKey((s) => !s)} className="absolute right-3.5 top-1/2 -translate-y-1/2" style={{ color: "var(--text-dim)" }}>
          <Icon name={showKey ? "eye-off" : "eye"} size={15} />
        </button>
      </div>
      <label className="text-[12px] font-medium mb-1.5 block" style={{ color: "var(--text-muted)" }}>Model</label>
      <select value={model} onChange={(e) => setModel(e.target.value)}
        className="styled-select w-full bg-[var(--surface-hover)] border border-[var(--border-soft)] rounded-full px-4 py-2.5 text-sm mb-5 cursor-pointer">
        <option value="claude-sonnet-5">Claude Sonnet 5 (balanced)</option>
        <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (fastest)</option>
        <option value="claude-opus-4-8">Claude Opus 4.8 (most capable)</option>
      </select>
      <div className="flex gap-3">
        {connected && (
          <button onClick={disconnect} className="flex-1 h-11 rounded-full text-sm font-display font-bold" style={{ background: "var(--danger-dim)", color: "var(--danger)" }}>
            Disconnect
          </button>
        )}
        <RippleButton onClick={save} disabled={!apiKey.trim()} className="flex-1 h-11 rounded-full text-sm font-display font-bold disabled:opacity-40" style={{ background: "var(--accent)", color: "var(--accent-ink)" }}>
          {connected ? "Update key" : "Connect"}
        </RippleButton>
      </div>
    </div>
  );
}

const ASSISTANT_SUGGESTIONS = ["How much do I owe?", "When will I be debt-free?", "Who owes me the most?", "How do I import a spreadsheet?"];

function AssistantPanel({ data, saveData, sim, onClose }) {
  const assistant = data.assistant || { apiKey: "", model: "claude-sonnet-5", shareData: false };
  const connected = !!assistant.apiKey;
  const [messages, setMessages] = useState([
    { role: "assistant", text: connected
      ? "Hey — I'm connected to your own AI key, so we can chat freely. Ask me anything."
      : "Hey! I'm Ledger's built-in assistant. I run locally on your device and can answer questions about your balances, payoff plan, and how to use the app." },
  ]);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [error, setError] = useState("");
  const scrollRef = useRef(null);

  useEffect(() => {
    scrollRef.current?.scrollTo({ top: scrollRef.current.scrollHeight, behavior: "smooth" });
  }, [messages, busy]);

  const ctx = useMemo(() => buildAssistantContext(data.items, sim, data.extraBudget, data.strategy), [data.items, sim, data.extraBudget, data.strategy]);

  const toggleShareData = () => {
    saveData((prev) => ({ ...prev, assistant: { ...prev.assistant, shareData: !prev.assistant?.shareData } }));
  };

  const send = async (text) => {
    const trimmed = (text || input).trim();
    if (!trimmed || busy) return;
    setInput("");
    setError("");
    const nextMessages = [...messages, { role: "user", text: trimmed }];
    setMessages(nextMessages);

    if (!connected) {
      const local = answerAssistantLocally(trimmed, ctx);
      setMessages((m) => [...m, { role: "assistant", text: local || ASSISTANT_FALLBACK }]);
      return;
    }

    setBusy(true);
    try {
      const summary = assistant.shareData
        ? `The user's Ledger snapshot — total debt: ${fmtMoney(ctx.totalDebt)} across ${ctx.activeDebts.length} debts; total owed to them: ${fmtMoney(ctx.totalReceivable)}; net position: ${fmtMoney(ctx.totalReceivable - ctx.totalDebt)}; strategy: ${ctx.strategy}; projected debt-free: ${monthsFromNowLabel(ctx.sim.months)}. Use this only if relevant.`
        : "The user has chosen not to share their financial data with you. Answer generally and do not claim to know their specific numbers.";
      const systemPrompt = `You are a concise, friendly assistant embedded inside Ledger, a personal debt and receivables tracking app. ${summary}`;
      const reply = await callAnthropicAPI(assistant.apiKey, assistant.model, nextMessages, systemPrompt);
      setMessages((m) => [...m, { role: "assistant", text: reply }]);
    } catch (e) {
      setError(e.message || "Something went wrong reaching the API.");
    }
    setBusy(false);
  };

  return (
    <div className="assistant-panel-box fixed bottom-24 right-4 sm:right-8 z-50 w-[calc(100vw-2rem)] sm:w-[380px] max-h-[70vh] flex flex-col overflow-hidden glass anim-in" style={{ background: "var(--surface)" }}>
      <div className="flex items-center justify-between px-5 py-4 border-b" style={{ borderColor: "var(--border-soft)" }}>
        <div className="flex items-center gap-2.5">
          <div className="w-8 h-8 rounded-full flex items-center justify-center" style={{ background: "var(--accent)" }}>
            <Icon name="sparkles" size={15} style={{ color: "var(--accent-ink)" }} />
          </div>
          <div>
            <div className="font-display font-bold text-[13.5px]">Ledger Assistant</div>
            <div className="text-[10.5px]" style={{ color: connected ? "var(--emerald)" : "var(--text-dim)" }}>{connected ? "Connected to your AI key" : "Local · runs on this device"}</div>
          </div>
        </div>
        <div className="flex items-center gap-1">
          <button onClick={() => setShowSettings((s) => !s)} className="icon-btn w-8 h-8 rounded-full flex items-center justify-center text-[var(--text-muted)] hover:bg-[var(--surface-hover)] focus-ring" aria-label="Assistant settings">
            <Icon name="settings" size={15} />
          </button>
          <button onClick={onClose} className="icon-btn w-8 h-8 rounded-full flex items-center justify-center text-[var(--text-muted)] hover:bg-[var(--surface-hover)] focus-ring" aria-label="Close assistant">
            <Icon name="x" size={16} />
          </button>
        </div>
      </div>

      {showSettings ? (
        <div className="overflow-y-auto">
          <AssistantConnectAI assistant={assistant} saveData={saveData} onClose={() => setShowSettings(false)} />
          {connected && (
            <div className="px-5 sm:px-6 pb-5 -mt-2">
              <label className="flex items-center justify-between gap-3 px-4 py-3 rounded-2xl cursor-pointer" style={{ background: "var(--surface-hover)" }}>
                <span className="text-[12.5px]" style={{ color: "var(--text-primary)" }}>Let the assistant see a summary of my finances</span>
                <input type="checkbox" checked={!!assistant.shareData} onChange={toggleShareData} className="w-4 h-4 accent-[var(--accent)]" />
              </label>
              <p className="text-[11px] mt-2" style={{ color: "var(--text-dim)" }}>Off by default. When on, a numbers-only summary (no names or notes) is sent with each message.</p>
            </div>
          )}
        </div>
      ) : (
        <>
          <div ref={scrollRef} className="flex-1 overflow-y-auto px-4 py-4">
            {messages.map((m, i) => <AssistantMessage key={i} msg={m} />)}
            {busy && <AssistantMessage msg={{ role: "assistant", text: "…" }} />}
            {error && <p className="text-[11.5px] px-2" style={{ color: "var(--danger)" }}>{error}</p>}
          </div>
          {messages.length <= 1 && (
            <div className="flex flex-wrap gap-2 px-4 pb-3">
              {ASSISTANT_SUGGESTIONS.map((s) => (
                <button key={s} onClick={() => send(s)} className="text-[11.5px] px-3 py-1.5 rounded-full" style={{ background: "var(--surface-hover)", color: "var(--text-muted)" }}>
                  {s}
                </button>
              ))}
            </div>
          )}
          <div className="flex items-center gap-2 px-4 py-3 border-t" style={{ borderColor: "var(--border-soft)" }}>
            <input value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") send(); }}
              placeholder={connected ? "Ask anything…" : "Ask about your balances or the app…"} disabled={busy}
              className="flex-1 bg-[var(--surface-hover)] border border-[var(--border-soft)] rounded-full px-4 py-2.5 text-[13px] focus-ring" />
            <button onClick={() => send()} disabled={busy || !input.trim()} className="w-10 h-10 rounded-full flex items-center justify-center shrink-0 disabled:opacity-40" style={{ background: "var(--accent)", color: "var(--accent-ink)" }} aria-label="Send">
              <Icon name="send" size={15} />
            </button>
          </div>
        </>
      )}
    </div>
  );
}

          <span className="text-[12px] uppercase tracking-widest text-[var(--text-dim)] font-medium">Local-first, always</span>
        </div>
        <p className="text-[12px] text-[var(--text-muted)] leading-relaxed">
          Ledger is 100% private and runs entirely on your device. We never store your PIN or your data on a server — so keep your PIN safe and hold onto your backup code, since without them your data can't be recovered.
        </p>
      </div>

      <BYOSSection data={data} saveData={saveData} />

      {/* Danger zone */}
      <div className="glass rounded-3xl p-5 sm:p-6" style={{ borderColor: "#E8BFB8" }}>
        <div className="flex items-center gap-2 mb-2">
          <Icon name="triangle-alert" size={15} className="text-[var(--danger)]" />

        </div>
        <p className="text-[12px] text-[var(--text-muted)] leading-relaxed mb-4">

/* ============================= BRING YOUR OWN STORAGE (free) ============================= */
function BYOSSection({ data, saveData }) {
  const [busyProvider, setBusyProvider] = useState("");

  const backupTo = (provider, url) => {
    setBusyProvider(provider);
    const payload = { app: "Ledger", exportedAt: new Date().toISOString(), items: data.items, extraBudget: data.extraBudget, strategy: data.strategy };
    downloadFile(`ledger-backup-${todayISO()}.json`, JSON.stringify(payload, null, 2), "application/json");
    window.open(url, "_blank", "noopener,noreferrer");
    setTimeout(() => setBusyProvider(""), 1200);
  };

  const providers = [
    { id: "drive", name: "Google Drive", url: "https://drive.google.com/drive/my-drive" },
    { id: "dropbox", name: "Dropbox", url: "https://www.dropbox.com/home" },
    { id: "onedrive", name: "OneDrive", url: "https://onedrive.live.com/" },
  ];

  return (
    <div className="glass rounded-3xl p-5 sm:p-7">
      <div className="flex items-center gap-2 mb-2">
        <Icon name="cloud" size={17} className="text-[var(--azure)]" />
        <h3 className="font-display font-semibold text-lg">Bring Your Own Storage</h3>
      </div>
      <p className="text-[13px] text-[var(--text-muted)] leading-relaxed mb-5">
        Back up your data to your own Google Drive, Dropbox, or OneDrive — free, for everyone. Pick a provider below: this downloads a fresh backup file and opens that provider's site so you can drop it in. Ledger has no API access to any of these accounts; it just hands you the file.
      </p>
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
        {providers.map((p) => (
          <button key={p.id} onClick={() => backupTo(p.id, p.url)} disabled={busyProvider === p.id}
            className="flex flex-col items-center gap-2 px-4 py-5 rounded-2xl bg-[var(--surface)] border border-[var(--border-soft)] hover:bg-[var(--surface-hover)] focus-ring disabled:opacity-60">
            <Icon name={busyProvider === p.id ? "check-circle" : "cloud"} size={22} className={busyProvider === p.id ? "text-[var(--emerald)]" : "text-[var(--azure)]"} />
            <span className="text-[13px] font-medium">{p.name}</span>
            <span className="text-[11px] text-[var(--text-dim)] flex items-center gap-1">Back up <Icon name="external-link" size={10} /></span>
          </button>
        ))}
      </div>
    </div>
  );
}

/* ============================= DATA PANEL (import / export / backup) ============================= */
function DataPanel({ items, onClose, onImport }) {
  const [dragOver, setDragOver] = useState(false);
  const [importPreview, setImportPreview] = useState(null); // {rows, fileName}
  const fileRef = useRef(null);

  const guessField = (row, candidates) => {
    const keys = Object.keys(row);
    for (const c of candidates) {
      const found = keys.find((k) => k.toLowerCase().replace(/[^a-z]/g, "").includes(c));
      if (found) return row[found];
    }
    return "";
  };

  const parseFile = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = window.XLSX.read(e.target.result, { type: "array" });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = window.XLSX.utils.sheet_to_json(sheet, { defval: "" });
        const parsed = rows.map((row) => {
          const typeRaw = String(guessField(row, ["type", "direction", "category"])).toLowerCase();
          const type = /receiv|owed to me|lent|loanedout|theyowe/.test(typeRaw) ? "receivable" : "debt";
          const balanceRaw = guessField(row, ["balance", "amount", "owed", "outstanding"]);
          const rateRaw = guessField(row, ["rate", "interest", "apr"]);
          const minRaw = guessField(row, ["minpayment", "minimumpayment", "monthlypayment", "payment"]);
          const dueRaw = guessField(row, ["duedate", "due", "date"]);
          let dueDate = "";
          if (dueRaw) {
            const d = new Date(dueRaw);
            if (!isNaN(d.getTime())) dueDate = d.toISOString().slice(0, 10);
          }
          return {
            id: uid("item"),
            type,
            name: String(guessField(row, ["name", "title", "debt", "description"]) || "Imported entry"),
            contact: String(guessField(row, ["contact", "person", "who", "lender", "borrower"])),
            contactImage: null,
            balance: Number(String(balanceRaw).replace(/[^0-9.-]/g, "")) || 0,
            originalAmount: Number(String(balanceRaw).replace(/[^0-9.-]/g, "")) || 0,
            rate: Number(String(rateRaw).replace(/[^0-9.-]/g, "")) || 0,
            minPayment: Number(String(minRaw).replace(/[^0-9.-]/g, "")) || 0,
            dueDate, reminderDays: 3,
            notes: String(guessField(row, ["notes", "note", "memo"])),
            status: "active", createdAt: new Date().toISOString(), settledAt: null, history: [],
          };
        }).filter((r) => r.name && r.balance >= 0);
        setImportPreview({ rows: parsed, fileName: file.name });
      } catch (err) {
        alert("Couldn't read that file. Please upload a valid .xlsx, .xls, or .csv file.");
      }
    };
    reader.readAsArrayBuffer(file);
  };

  const handleFiles = (files) => { const f = files?.[0]; if (f) parseFile(f); };

  const exportItemsCSV = () => {
    const csv = toCSV(items, [
      { label: "Type", get: (r) => r.type === "debt" ? "I Owe" : "Owed to Me" },
      { label: "Name", get: (r) => r.name },
      { label: "Contact", get: (r) => r.contact },
      { label: "Balance", get: (r) => r.balance },
      { label: "Original Amount", get: (r) => r.originalAmount },
      { label: "Interest Rate %", get: (r) => r.rate },
      { label: "Monthly Payment", get: (r) => r.minPayment },
      { label: "Due Date", get: (r) => r.dueDate },
      { label: "Reminder Days", get: (r) => r.reminderDays },
      { label: "Status", get: (r) => r.status },
      { label: "Date Added", get: (r) => r.createdAt },
      { label: "Settled At", get: (r) => r.settledAt || "" },
      { label: "Notes", get: (r) => r.notes },
    ]);
    downloadFile(`ledger-entries-${todayISO()}.csv`, csv, "text/csv");
  };

  const exportTransactionsCSV = () => {
    let rows = [];
    items.forEach((it) => (it.history || []).forEach((t) => rows.push({ ...t, itemName: it.name, contact: it.contact, itemType: it.type })));
    const csv = toCSV(rows, [
      { label: "Item", get: (r) => r.itemName },
      { label: "Contact", get: (r) => r.contact },
      { label: "Type", get: (r) => r.itemType === "debt" ? "I Owe" : "Owed to Me" },
      { label: "Kind", get: (r) => r.kind },
      { label: "Amount", get: (r) => r.amount },
      { label: "Date", get: (r) => r.date },
      { label: "Note", get: (r) => r.note },
    ]);
    downloadFile(`ledger-transactions-${todayISO()}.csv`, csv, "text/csv");
  };

  const exportJSON = () => {
    downloadFile(`ledger-backup-${todayISO()}.json`, JSON.stringify({ items, exportedAt: new Date().toISOString() }, null, 2), "application/json");
  };

  const exportEverything = () => {
    exportJSON();
    setTimeout(exportItemsCSV, 250);
    setTimeout(exportTransactionsCSV, 500);
  };

  const downloadTemplate = () => {
    const headers = ["Type", "Name", "Contact", "Balance", "Interest Rate (%)", "Monthly Payment", "Due Date (YYYY-MM-DD)", "Notes"];
    const examples = [
      ["I Owe", "Visa Signature Card", "Chase Bank", 4500, 22.99, 120, "2026-08-15", "Optional — anything worth remembering"],
      ["Owed to Me", "Loan for car repair", "John Kamau", 300, 0, 50, "2026-08-01", ""],
    ];
    const ws = window.XLSX.utils.aoa_to_sheet([headers, ...examples]);
    ws["!cols"] = [{ wch: 12 }, { wch: 26 }, { wch: 18 }, { wch: 12 }, { wch: 16 }, { wch: 16 }, { wch: 22 }, { wch: 30 }];
    const wb = window.XLSX.utils.book_new();
    window.XLSX.utils.book_append_sheet(wb, ws, "Entries");
    const out = window.XLSX.write(wb, { bookType: "xlsx", type: "array" });
    downloadFile("ledger-import-template.xlsx", out, "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet");
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center modal-backdrop p-4" style={{ background: "rgba(4,6,10,0.7)" }} onClick={onClose}>
      <div className="modal-panel glass w-full sm:max-w-lg sm:rounded-3xl p-6 sm:p-7 max-h-[90vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-6">
          <h2 className="font-display text-xl font-semibold">Import, export &amp; backup</h2>
          <button onClick={onClose} className="icon-btn w-9 h-9 rounded-full flex items-center justify-center text-[var(--text-muted)] hover:bg-[var(--surface-hover)] focus-ring"><Icon name="x" size={18} /></button>
        </div>

        {!importPreview ? (
          <>
            <h3 className="text-[12px] uppercase tracking-widest text-[var(--text-dim)] font-medium mb-2">Import from a spreadsheet</h3>
            <Tooltip label="Get a ready-made .xlsx with the right columns and two example rows." position="bottom" className="w-full">
              <button onClick={downloadTemplate} className="w-full flex items-center justify-between px-4 py-3 rounded-xl mb-3 focus-ring" style={{ background: "var(--azure-dim)", border: "1px solid #DEDBD2" }}>
                <span className="flex items-center gap-2 text-sm font-medium text-[var(--azure)]"><Icon name="download" size={15} /> Download blank Excel template</span>
                <Icon name="chevron-right" size={15} className="text-[var(--azure)]" />
              </button>
            </Tooltip>
            <p className="text-[12px] text-[var(--text-dim)] mb-4 leading-relaxed">
              Fill it in offline — one row per debt or person who owes you — then drop the same file back in below and it'll be read in automatically.
            </p>
            <div
              className={`dropzone rounded-2xl p-6 text-center cursor-pointer ${dragOver ? "drag-over" : ""}`}
              onClick={() => fileRef.current?.click()}
              onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={() => setDragOver(false)}
              onDrop={(e) => { e.preventDefault(); setDragOver(false); handleFiles(e.dataTransfer.files); }}
            >
              <Icon name="file-spreadsheet" size={26} className="text-[var(--emerald)] mx-auto mb-2" />
              <p className="text-sm font-medium">Drop an Excel or CSV file here</p>
              <p className="text-[12px] text-[var(--text-dim)] mt-1">We'll auto-detect names, amounts, contacts, and dates — no manual typing needed</p>
              <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" className="hidden" onChange={(e) => handleFiles(e.target.files)} />
            </div>

            <h3 className="text-[12px] uppercase tracking-widest text-[var(--text-dim)] font-medium mb-2 mt-7">Export your data</h3>
            <div className="grid grid-cols-1 gap-2">
              <button onClick={exportEverything} className="flex items-center justify-between px-4 py-3 rounded-xl focus-ring" style={{ background: "var(--emerald-dim)", border: "1px solid #E4C57C" }}>
                <span className="flex items-center gap-2 text-sm font-medium text-[var(--emerald)]"><Icon name="download" size={16} /> Export everything (JSON + 2 CSVs)</span>
                <Icon name="chevron-right" size={15} className="text-[var(--emerald)]" />
              </button>
              <button onClick={exportItemsCSV} className="flex items-center justify-between px-4 py-3 rounded-xl bg-[var(--surface)] border border-[var(--border-soft)] focus-ring hover:bg-[var(--surface-hover)]">
                <span className="flex items-center gap-2 text-sm font-medium"><Icon name="file-spreadsheet" size={16} /> Entries only (CSV)</span>
                <Icon name="chevron-right" size={15} className="text-[var(--text-dim)]" />
              </button>
              <button onClick={exportTransactionsCSV} className="flex items-center justify-between px-4 py-3 rounded-xl bg-[var(--surface)] border border-[var(--border-soft)] focus-ring hover:bg-[var(--surface-hover)]">
                <span className="flex items-center gap-2 text-sm font-medium"><Icon name="receipt" size={16} /> Payment history only (CSV)</span>
                <Icon name="chevron-right" size={15} className="text-[var(--text-dim)]" />
              </button>
              <button onClick={exportJSON} className="flex items-center justify-between px-4 py-3 rounded-xl bg-[var(--surface)] border border-[var(--border-soft)] focus-ring hover:bg-[var(--surface-hover)]">
                <span className="flex items-center gap-2 text-sm font-medium"><Icon name="cloud" size={16} /> Full backup (JSON)</span>
                <Icon name="chevron-right" size={15} className="text-[var(--text-dim)]" />
              </button>
            </div>
            <p className="text-[12px] text-[var(--text-dim)] mt-3 leading-relaxed">
              "Full backup" downloads a file to your device. To back it up on Google Drive, save it into your synced Drive folder, or upload it manually at drive.google.com — this app can't connect to your Drive account directly since it runs entirely offline with no server of its own.
            </p>
          </>
        ) : (
          <div>
            <p className="text-sm mb-3"><span className="font-semibold">{importPreview.rows.length}</span> row{importPreview.rows.length === 1 ? "" : "s"} found in <span className="text-[var(--text-muted)]">{importPreview.fileName}</span>:</p>
            <div className="glass rounded-xl divide-y divide-[var(--border-soft)] max-h-64 overflow-y-auto mb-4">
              {importPreview.rows.slice(0, 8).map((r, i) => (
                <div key={i} className="flex items-center justify-between px-3 py-2 text-[13px]">
                  <span className="truncate min-w-0 flex-1">{r.name}{r.contact ? ` · ${r.contact}` : ""} <span className="text-[11px] text-[var(--text-dim)]">({r.type === "debt" ? "I Owe" : "Owed to Me"})</span></span>
                  <span className="font-mono shrink-0 ml-2">{fmtMoney(r.balance)}</span>
                </div>
              ))}
              {importPreview.rows.length > 8 && <div className="px-3 py-2 text-[12px] text-[var(--text-dim)]">+ {importPreview.rows.length - 8} more…</div>}
            </div>
            <div className="flex gap-3">
              <button onClick={() => setImportPreview(null)} className="flex-1 h-11 rounded-xl text-sm font-medium bg-[var(--surface)] border border-[var(--border-soft)] focus-ring">Cancel</button>
              <button onClick={() => { onImport(importPreview.rows); setImportPreview(null); onClose(); }}
                className="flex-1 h-11 rounded-xl text-sm font-display font-semibold focus-ring" style={{ background: "var(--emerald)", color: "#211804" }}>
                Import {importPreview.rows.length} entries
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* Celebrates paying off a debt. The state to trigger this (celebrating,
   celebrationKey) already existed on Dashboard — this is the actual burst it
   was meant to show. */
function ConfettiBurst() {
  const pieces = useMemo(() => {
    const colors = ["#34d399", "#3b9eff", "#fbbf24", "#fb7185", "#a78bfa", "#f472b6"];
    return Array.from({ length: 40 }).map((_, i) => {
      const angle = Math.random() * Math.PI * 2;
      const dist = 100 + Math.random() * 220;
      return {
        id: i,
        color: colors[i % colors.length],
        tx: `${Math.cos(angle) * dist}px`,
        ty: `${Math.sin(angle) * dist - 40}px`,
        rot: `${(Math.random() - 0.5) * 720}deg`,
        delay: `${Math.random() * 100}ms`,
        left: `${42 + Math.random() * 16}%`,
        top: `${30 + Math.random() * 16}%`,
        round: i % 3 === 0,
      };
    });
  }, []);
  return (
    <div className="fixed inset-0 z-[100] pointer-events-none overflow-hidden">
      {pieces.map((p) => (
        <span key={p.id} className={`confetti-piece ${p.round ? "confetti-round" : ""}`}
          style={{ left: p.left, top: p.top, background: p.color, "--tx": p.tx, "--ty": p.ty, "--rot": p.rot, animationDelay: p.delay }}></span>
      ))}
    </div>
  );
}

/* Surfaces the browser's native "install this app" prompt (captured globally
   in <head>) as a normal button, and falls back to plain-language instructions
   on browsers that don't support beforeinstallprompt (iOS Safari, most
   desktop Safari/Firefox) rather than showing a dead button. */
function isStandalone() {
  return window.matchMedia?.("(display-mode: standalone)")?.matches || window.navigator.standalone === true;
}
function InstallButton({ variant = "icon" }) {
  const [installable, setInstallable] = useState(() => !!window.__deferredInstallPrompt);
  const [installed, setInstalled] = useState(() => isStandalone());
  const [showHelp, setShowHelp] = useState(false);

  useEffect(() => {
    const onInstallable = () => setInstallable(true);
    const onInstalled = () => { setInstalled(true); setInstallable(false); };
    window.addEventListener("pwa-installable", onInstallable);
    window.addEventListener("pwa-installed", onInstalled);
    return () => {
      window.removeEventListener("pwa-installable", onInstallable);
      window.removeEventListener("pwa-installed", onInstalled);
    };
  }, []);

  if (installed) return null;

  const handleClick = async () => {
    const promptEvent = window.__deferredInstallPrompt;
    if (promptEvent) {
      promptEvent.prompt();
      await promptEvent.userChoice;
      window.__deferredInstallPrompt = null;
      setInstallable(false);
    } else {
      setShowHelp(true);
    }
  };

  return (
    <>
      {variant === "icon" ? (
        <Tooltip label="Install Ledger as an app on this device" position="bottom">
          <button onClick={handleClick} className="icon-btn h-9 w-9 rounded-xl flex items-center justify-center text-[var(--text-muted)] border border-[var(--border-soft)] hover:bg-[var(--surface-hover)] hover:text-[var(--text-primary)] focus-ring">
            <Icon name="download" size={15} />
          </button>
        </Tooltip>
      ) : (
        <RippleButton onClick={handleClick} className="inline-flex items-center gap-2 h-12 px-6 rounded-2xl font-display font-semibold text-[15px] focus-ring" style={{ background: "var(--emerald)", color: "#211804" }}>
          <Icon name="download" size={17} /> Install Ledger
        </RippleButton>
      )}
      {showHelp && (
        <div className="fixed inset-0 z-[95] flex items-end sm:items-center justify-center modal-backdrop p-4" style={{ background: "rgba(20,18,13,0.55)" }} onClick={() => setShowHelp(false)}>
          <div className="modal-panel glass w-full sm:max-w-sm p-6 sm:p-7" onClick={(e) => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4">
              <h2 className="font-display text-lg font-semibold">Install Ledger</h2>
              <button onClick={() => setShowHelp(false)} className="icon-btn w-9 h-9 rounded-full flex items-center justify-center text-[var(--text-muted)] hover:bg-[var(--surface-hover)] focus-ring"><Icon name="x" size={17} /></button>
            </div>
            <div className="space-y-4 text-[13px] text-[var(--text-muted)] leading-relaxed">
              <div>
                <p className="font-semibold text-[var(--text-primary)] mb-1">On iPhone / iPad (Safari)</p>
                <p>Tap the Share icon, then "Add to Home Screen."</p>
              </div>
              <div>
                <p className="font-semibold text-[var(--text-primary)] mb-1">On Android (Chrome)</p>
                <p>Tap the ⋮ menu, then "Install app" or "Add to Home screen."</p>
              </div>
              <div>
                <p className="font-semibold text-[var(--text-primary)] mb-1">On desktop (Chrome / Edge)</p>
                <p>Look for the install icon in the address bar, or open the ⋮ menu and choose "Install Ledger."</p>
              </div>
              <p className="text-[11px] text-[var(--text-dim)]">This only works once Ledger is hosted at a real https:// address — a locally opened file can't be installed this way.</p>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

function Dashboard({ data, saveData, onLock, onChangeCredential, onFactoryReset }) {
  const { items, extraBudget, strategy } = data;
  // Keep the shared money formatter in sync with this account's chosen currency.
  // Synchronous and before any children render, so every fmtMoney() call below reflects it immediately.
  setCurrentCurrency(data.settings?.currency);
  const [tab, setTab] = useState("overview"); // overview | owe | owed | contacts | history | stats
  const [modalItem, setModalItem] = useState(null); // null closed, {} new, {...} edit
  const [modalDefaultType, setModalDefaultType] = useState("debt");
  const [showDataPanel, setShowDataPanel] = useState(false);
  const navRef = useRef(null);
  const tabBtnRefs = useRef({});
  const [tabIndicator, setTabIndicator] = useState({ left: 0, width: 0, ready: false });
  const [celebrationKey, setCelebrationKey] = useState(0);
  const [celebrating, setCelebrating] = useState(false);
  const triggerCelebration = () => {
    setCelebrationKey((k) => k + 1);
    setCelebrating(true);
    setTimeout(() => setCelebrating(false), 1400);
  };

  useEffect(() => {
    const recompute = () => {
      const btn = tabBtnRefs.current[tab];
      const nav = navRef.current;
      if (!btn || !nav) return;
      setTabIndicator({ left: btn.offsetLeft, width: btn.offsetWidth, ready: true });
    };
    recompute();
    window.addEventListener("resize", recompute);
    return () => window.removeEventListener("resize", recompute);
  }, [tab, data.items?.length]);

  const [query, setQuery] = useState("");
  const [sortBy, setSortBy] = useState("dateAdded");
  const [sortDir, setSortDir] = useState("desc");
  const [statusFilter, setStatusFilter] = useState("active");

  const setItems = (updater) => saveData((prev) => ({ ...prev, items: typeof updater === "function" ? updater(prev.items) : updater }));
  const setExtraBudget = (v) => saveData((prev) => ({ ...prev, extraBudget: v }));
  const setStrategy = (v) => saveData((prev) => ({ ...prev, strategy: v }));

  const sim = useMemo(() => simulatePayoff(items, extraBudget, strategy), [items, extraBudget, strategy]);

  const debts = items.filter((i) => i.type === "debt");
  const receivables = items.filter((i) => i.type === "receivable");
  const totalBalance = debts.filter((d) => d.status === "active").reduce((s, d) => s + d.balance, 0);
  const minSum = debts.filter((d) => d.status === "active").reduce((s, d) => s + d.minPayment, 0);
  const totalReceivable = receivables.filter((d) => d.status === "active").reduce((s, d) => s + d.balance, 0);

  const strategyColor = strategy === "snowball"
    ? { text: "var(--emerald)", dim: "var(--emerald-dim)", border: "#E4C57C" }
    : { text: "var(--azure)", dim: "var(--azure-dim)", border: "#DEDBD2" };

  const oweFiltered = useMemo(() => filterSortItems(debts, { query, sortBy, sortDir, statusFilter }), [debts, query, sortBy, sortDir, statusFilter]);
  const owedFiltered = useMemo(() => filterSortItems(receivables, { query, sortBy, sortDir, statusFilter }), [receivables, query, sortBy, sortDir, statusFilter]);

  const rankMap = useMemo(() => { const m = {}; sim.order.forEach((id, i) => { m[id] = i + 1; }); return m; }, [sim]);

  const openNew = (type) => { setModalDefaultType(type); setModalItem({}); };

  const handleSaveItem = (item) => {
    setItems((prev) => {
      const exists = prev.some((d) => d.id === item.id);
      return exists ? prev.map((d) => (d.id === item.id ? item : d)) : [...prev, item];
    });
    setModalItem(null);
  };
  const handleDeleteItem = (id) => { setItems((prev) => prev.filter((d) => d.id !== id)); setModalItem(null); };
  const handleSettleItem = (id) => {
    setItems((prev) => prev.map((d) => d.id === id ? { ...d, status: "settled", balance: 0, settledAt: new Date().toISOString() } : d));
    setModalItem(null);
    triggerCelebration();
  };
  const handleTransact = (id, { kind, amount, date, note, receipt }) => {
    let becameSettled = false;
    setItems((prev) => prev.map((d) => {
      if (d.id !== id) return d;
      let balance = d.balance;
      let originalAmount = d.originalAmount || d.balance;
      if (kind === "payment") balance = Math.max(0, balance - amount);
      else { balance += amount; originalAmount = Math.max(originalAmount, balance); }
      const txn = { id: uid("txn"), kind, amount, date, note, receipt: receipt || null };
      const settled = balance <= 0.005 && kind === "payment";
      if (settled && d.status !== "settled") becameSettled = true;
      return {
        ...d, balance, originalAmount,
        status: settled ? "settled" : d.status,
        settledAt: settled ? new Date().toISOString() : d.settledAt,
        history: [...(d.history || []), txn],
      };
    }));
    if (becameSettled) triggerCelebration();
  };
  const handleImportRows = (rows) => setItems((prev) => [...prev, ...rows]);

  const TABS = [
    { id: "overview", label: "Overview", icon: "bar-chart-3", tip: "Your at-a-glance snapshot: balances, freedom date, and payoff order." },
    { id: "owe", label: "I Owe", icon: "trending-down", tip: "Debts you're paying down — cards, loans, and lines of credit." },
    { id: "owed", label: "Owed to Me", icon: "trending-up", tip: "Money others owe you, plus payments you've received back." },
    { id: "contacts", label: "Contacts", icon: "users", tip: "See what each person owes you or you owe them, grouped together." },
    { id: "history", label: "History", icon: "clock", tip: "Every payment and charge you've ever logged, plus settled debts." },
    { id: "stats", label: "Statistics", icon: "sparkles", tip: "Deeper numbers: net position, totals paid, and largest balances." },
    { id: "settings", label: "Settings", icon: "settings", tip: "Edit your profile name and change your PIN or password." },
  ];

  return (
    <div className="min-h-screen pb-16 relative z-10">
      <DashboardBackground />
      {celebrating && <ConfettiBurst key={celebrationKey} />}
      <header className="sticky top-0 z-30 backdrop-blur-md border-b border-[var(--border-soft)]" style={{ background: "var(--header-bg)" }}>
        <div className="max-w-6xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between gap-3">
          <div className="flex items-center gap-2 shrink-0">
            <div className="w-8 h-8 rounded-xl bg-[var(--emerald-dim)] border border-[#E4C57C] flex items-center justify-center">
              <Icon name="landmark" size={16} className="text-[var(--emerald)]" />
            </div>
            <span className="font-display font-semibold text-[17px] tracking-tight hidden sm:inline">Ledger</span>
          </div>
          <nav ref={navRef} className="relative flex items-center gap-1 overflow-x-auto no-scrollbar">
            <div
              className="absolute top-0 bottom-0 rounded-xl bg-[var(--surface-hover)] transition-all duration-300 ease-out"
              style={{ left: tabIndicator.left, width: tabIndicator.width, opacity: tabIndicator.ready ? 1 : 0, zIndex: 0 }}
            ></div>
            {TABS.map((t) => (
              <Tooltip key={t.id} label={t.tip} position="bottom">
                <button ref={(el) => { tabBtnRefs.current[t.id] = el; }} onClick={() => setTab(t.id)}
                  className="tab-btn relative flex items-center gap-2 h-9 px-3 rounded-xl text-[13px] font-medium whitespace-nowrap focus-ring"
                  style={{ color: tab === t.id ? "var(--text-primary)" : "var(--text-muted)", zIndex: 1 }}>
                  <Icon name={t.icon} size={14} /> <span className="hidden md:inline">{t.label}</span>
                </button>
              </Tooltip>
            ))}
          </nav>
          <div className="flex items-center gap-2 shrink-0">
            <InstallButton variant="icon" />
            <Tooltip label="Import a spreadsheet, export your data, or back it up." position="bottom">
              <button onClick={() => setShowDataPanel(true)} className="icon-btn h-9 w-9 rounded-xl flex items-center justify-center text-[var(--text-muted)] border border-[var(--border-soft)] hover:bg-[var(--surface-hover)] hover:text-[var(--text-primary)] focus-ring">
                <Icon name="cloud" size={15} />
              </button>
            </Tooltip>
            <Tooltip label="Instantly re-lock your dashboard and require your PIN again." position="bottom">
              <button onClick={onLock} className="icon-btn flex items-center gap-2 h-9 px-3.5 rounded-xl text-[13px] font-medium text-[var(--text-muted)] border border-[var(--border-soft)] hover:bg-[var(--surface-hover)] hover:text-[var(--text-primary)] focus-ring">
                <Icon name="lock" size={14} /> <span className="hidden sm:inline">Lock</span>
              </button>
            </Tooltip>
          </div>
        </div>
      </header>

      <main key={tab} className="max-w-6xl mx-auto px-4 sm:px-6 pt-6 sm:pt-8 anim-in">
        {tab === "overview" && (
          <>
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
              <MetricCard icon="wallet" label="Total remaining" animateValue={totalBalance} sub={`${debts.filter(d=>d.status==='active').length} active debt${debts.filter(d=>d.status==='active').length===1?"":"s"}`} accent="emerald" delay={0} tip="The combined balance of every active debt you're currently paying down." />
              <MetricCard icon="trending-down" label="Interest to be paid" animateValue={sim.totalInterest} sub={strategy === "avalanche" ? "Minimized via Avalanche" : "Snowball order applied"} accent="amber" delay={60} tip="Total interest you'll pay over the life of your plan at this strategy." />
              <MetricCard icon="calendar-check" label="Freedom date" value={debts.filter(d=>d.status==='active').length ? monthsFromNowLabel(sim.months) : "—"} sub={debts.filter(d=>d.status==='active').length ? `${sim.months} month${sim.months === 1 ? "" : "s"} from now` : "Add debts to begin"} accent="azure" delay={120} tip="Projected month you'll be completely debt-free at your current extra budget." />
            </div>

            {sim.insufficient && (
              <div className="glass rounded-2xl p-4 mb-6 flex items-center gap-3 border-[#E4C57C] anim-in">
                <Icon name="triangle-alert" size={18} className="text-[var(--amber)] shrink-0" />
                <p className="text-[13px] text-[var(--text-muted)]">At this payment level your payoff stretches past 60 years. Increase your extra monthly budget to see a realistic freedom date.</p>
              </div>
            )}

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div className="lg:col-span-2 order-2 lg:order-1">
                <div className="flex items-center justify-between mb-4">
                  <h2 className="font-display font-semibold text-lg">Your debts (payoff order)</h2>
                  <Tooltip label="Add a new card, loan, or line of credit you owe." position="bottom">
                    <RippleButton onClick={() => openNew("debt")} className="icon-btn inline-flex items-center gap-2 h-9 px-3.5 rounded-xl text-[13px] font-display font-semibold focus-ring" style={{ background: "var(--emerald)", color: "#211804" }}>
                      <Icon name="plus" size={15} /> Add debt
                    </RippleButton>
                  </Tooltip>
                </div>
                {debts.filter((d) => d.status === "active").length === 0 ? (
                  <EmptyState title="No debts tracked yet" sub="Add your first balance — a card, loan, or line of credit — and watch your payoff plan build itself." cta="Add your first debt" onCta={() => openNew("debt")} />
                ) : (
                  <div className="space-y-3">
                    {sim.order.map((id) => items.find((d) => d.id === id)).filter(Boolean).map((d, i) => (
                      <ItemCard key={d.id} item={d} rank={i + 1} accentColor={strategyColor} onOpen={setModalItem} delay={i * 50} />
                    ))}
                  </div>
                )}
              </div>
              <div className="order-1 lg:order-2 space-y-4">
                <StrategyToggle strategy={strategy} setStrategy={setStrategy} />
                <BudgetControl extraBudget={extraBudget} setExtraBudget={setExtraBudget} minSum={minSum} />
                <div className="glass rounded-3xl p-5">
                  <div className="flex items-center justify-between mb-1">
                    <Tooltip label="The total balance people currently owe you across all active receivables." position="top">
                      <span className="text-[11px] uppercase tracking-widest text-[var(--text-dim)] font-medium">Owed to you</span>
                    </Tooltip>
                    <Icon name="trending-up" size={16} className="text-[var(--azure)]" />
                  </div>
                  <div className="font-mono text-2xl font-semibold mb-3">{fmtMoney(totalReceivable)}</div>
                  <Tooltip label="Track money you've lent to someone else." position="bottom" className="w-full">
                    <button onClick={() => openNew("receivable")} className="w-full h-10 rounded-xl text-[13px] font-display font-semibold flex items-center justify-center gap-2 focus-ring" style={{ background: "var(--azure-dim)", border: "1px solid #DEDBD2", color: "var(--azure)" }}>
                      <Icon name="plus" size={14} /> Add who owes you
                    </button>
                  </Tooltip>
                </div>
              </div>
            </div>

            <div className="mt-6"><DebtSnake items={items} sim={sim} strategy={strategy} /></div>
          </>
        )}

        {(tab === "owe" || tab === "owed") && (
          <>
            <div className="flex items-center justify-between mb-4">
              <h2 className="font-display font-semibold text-lg">{tab === "owe" ? "Debts you owe" : "People who owe you"}</h2>
              <Tooltip label={tab === "owe" ? "Add a new card, loan, or line of credit you owe." : "Add a new person or loan that owes you money."} position="bottom">
                <button onClick={() => openNew(tab === "owe" ? "debt" : "receivable")} className="icon-btn inline-flex items-center gap-2 h-9 px-3.5 rounded-xl text-[13px] font-display font-semibold focus-ring" style={{ background: "var(--emerald)", color: "#211804" }}>
                  <Icon name="plus" size={15} /> Add {tab === "owe" ? "debt" : "receivable"}
                </button>
              </Tooltip>
            </div>
            <Toolbar query={query} setQuery={setQuery} sortBy={sortBy} setSortBy={setSortBy} sortDir={sortDir} setSortDir={setSortDir} statusFilter={statusFilter} setStatusFilter={setStatusFilter} />
            {(tab === "owe" ? oweFiltered : owedFiltered).length === 0 ? (
              <EmptyState icon={tab === "owe" ? "trending-down" : "trending-up"} title={`No ${tab === "owe" ? "debts" : "receivables"} found`} sub="Try adjusting your search or filters, or add a new entry." cta={`Add ${tab === "owe" ? "debt" : "receivable"}`} onCta={() => openNew(tab === "owe" ? "debt" : "receivable")} />
            ) : (
              <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-3">
                {(tab === "owe" ? oweFiltered : owedFiltered).map((d, i) => (
                  <ItemCard key={d.id} item={d} rank={tab === "owe" ? rankMap[d.id] : null} accentColor={tab === "owe" ? strategyColor : { text: "var(--azure)", dim: "var(--azure-dim)", border: "#DEDBD2" }} onOpen={setModalItem} delay={i * 40} />
                ))}
              </div>
            )}
          </>
        )}

        {tab === "contacts" && <ContactsView items={items} onOpenItem={setModalItem} />}
        {tab === "history" && <HistoryView items={items} />}
        {tab === "stats" && <StatisticsView items={items} sim={sim} extraBudget={extraBudget} strategy={strategy} />}
        {tab === "settings" && <SettingsView data={data} saveData={saveData} onChangeCredential={onChangeCredential} onFactoryReset={onFactoryReset} />}
      </main>

      {modalItem !== null && (
        <ItemModal
          initial={modalItem.id ? modalItem : null}
          defaultType={modalDefaultType}
          onClose={() => setModalItem(null)}
          onSave={handleSaveItem}
          onDelete={handleDeleteItem}
          onSettle={handleSettleItem}
          onTransact={handleTransact}
        />
      )}
      {showDataPanel && <DataPanel items={items} onClose={() => setShowDataPanel(false)} onImport={handleImportRows} />}
      <AssistantLauncher data={data} saveData={saveData} sim={sim} />
    </div>
  );
}

function LandingStat({ value, label, delay }) {

function App() {
  const [phase, setPhase] = useState("loading");
  const [error, setError] = useState("");
  const [data, setData] = useState(null);
  const [showReset, setShowReset] = useState(false);

  const keyRef = useRef(null);           // the in-memory DEK (Data Encryption Key)
  const storeRef = useRef(null);         // { authMode: "pin", wrappedMain, wrappedRecovery, data }
  const firstCredRef = useRef("");       // holds the first entry while confirming
  const recoveryCodeRef = useRef("");    // freshly generated code, pending the reveal screen
  const recoveryNoteRef = useRef("");    // custom copy for the reveal screen (setup vs. upgrade vs. reset)
  const pendingDataRef = useRef(null);   // decrypted data waiting on a 2FA check
  const pendingTotpSecretRef = useRef(""); // secret awaiting confirmation during 2FA setup
  const forgotDekRef = useRef(null);
  const forgotDataRef = useRef(null);
  const resolvedAuthPhaseRef = useRef("create"); // where "Open App" / "Get Started" on the landing page leads

  useEffect(() => {
    (async () => {
      try {
        const parsed = await loadAuthStore();
        if (!parsed) { resolvedAuthPhaseRef.current = "create"; setPhase("landing"); return; }
        storeRef.current = parsed;
        resolvedAuthPhaseRef.current = "unlock";
        setPhase("landing");
      } catch (e) {
        setError("This browser doesn't support IndexedDB, which Ledger needs to store your data securely.");
        resolvedAuthPhaseRef.current = "create";
        setPhase("landing");
      }
    })();
  }, []);

  const handleLaunch = () => setPhase(resolvedAuthPhaseRef.current);

  const persist = useCallback(async (nextData) => {
    if (!keyRef.current || !storeRef.current) return;
    const dataBlob = await encryptJSON(keyRef.current, nextData);
    storeRef.current = { ...storeRef.current, data: dataBlob };
    await saveAuthStore(storeRef.current);
  }, []);

  const saveData = useCallback((updater) => {
    setData((prev) => { const next = typeof updater === "function" ? updater(prev) : updater; persist(next); return next; });
  }, [persist]);

  /* ---------- first-run setup: set a Master PIN directly ---------- */
  const handleCreateSubmit = (val) => {
    firstCredRef.current = val;
    setError("");
    setPhase("confirm");
  };

  const handleConfirmSubmit = async (val) => {
    if (val !== firstCredRef.current) {
      setError("PINs don't match — try again.");
      firstCredRef.current = "";
      setPhase("create");
      return;
    }
    const salt1 = randomSaltB64();
    const key1 = await deriveKey(val, salt1);
    const dek = await generateDEK();
    const wrappedMain = await wrapDEK(key1, dek);
    wrappedMain.salt = salt1;

    const recoveryCode = generateRecoveryCode();
    const salt2 = randomSaltB64();
    const key2 = await deriveKey(recoveryCode, salt2);
    const wrappedRecovery = await wrapDEK(key2, dek);
    wrappedRecovery.salt = salt2;

    const initial = {
      items: [], extraBudget: 200, strategy: "avalanche",
      security: { totpEnabled: false, totpSecret: null },
      profile: { name: "" },
      settings: { currency: "USD" },
      assistant: { apiKey: "", model: "claude-sonnet-5", shareData: false },
    };
    const dataBlob = await encryptJSON(dek, initial);

    storeRef.current = { authMode: "pin", wrappedMain, wrappedRecovery, data: dataBlob };
    await saveAuthStore(storeRef.current);

    keyRef.current = dek;
    pendingDataRef.current = initial;
    recoveryCodeRef.current = recoveryCode;
    recoveryNoteRef.current = "";
    setError("");
    setPhase("recovery-reveal");
  };

  const handleRecoveryRevealContinue = () => setPhase("twofa-offer");

  const handleTwoFAEnable = () => {
    const secret = generateTotpSecret();
    pendingTotpSecretRef.current = secret;
    setError("");
    setPhase("twofa-setup");
  };

  const enterDashboard = () => { setData(pendingDataRef.current); pendingDataRef.current = null; setPhase("dashboard"); };

  const handleTwoFASkip = () => enterDashboard();

  const handleTwoFAVerifySetup = async (code) => {
    const ok = await verifyTotp(pendingTotpSecretRef.current, code);
    if (!ok) { setError("That code didn't match — try again."); return; }
    const updated = { ...pendingDataRef.current, security: { totpEnabled: true, totpSecret: pendingTotpSecretRef.current } };
    pendingDataRef.current = updated;
    await persist(updated); // keyRef.current (DEK) is already set from setup/unlock
    setError("");
    enterDashboard();
  };

  /* ---------- returning-user login ---------- */
  const handleUnlockSubmit = async (cred) => {
    const store = storeRef.current;
    if (store && store.wrappedMain) {
      try {
        const key1 = await deriveKey(cred, store.wrappedMain.salt);
        const dek = await unwrapDEK(key1, store.wrappedMain.iv, store.wrappedMain.cipher);
        const decrypted = migrateData(await decryptJSON(dek, store.data.iv, store.data.cipher));
        keyRef.current = dek;
        setError("");
        if (decrypted.security?.totpEnabled) { pendingDataRef.current = decrypted; setPhase("unlock-twofa"); }
        else { setData(decrypted); setPhase("dashboard"); }
      } catch (e) {
        setError("Incorrect PIN — try again.");
      }
      return;
    }
    // one-time migration path for the older, pre-recovery-code storage format
    try {
      const legacyKey = await deriveKey(cred, store.salt);
      const legacyData = migrateData(await decryptJSON(legacyKey, store.iv, store.cipher));
      const dek = await generateDEK();
      const salt1 = randomSaltB64();
      const key1 = await deriveKey(cred, salt1);
      const wrappedMain = await wrapDEK(key1, dek);
      wrappedMain.salt = salt1;
      const recoveryCode = generateRecoveryCode();
      const salt2 = randomSaltB64();
      const key2 = await deriveKey(recoveryCode, salt2);
      const wrappedRecovery = await wrapDEK(key2, dek);
      wrappedRecovery.salt = salt2;
      const dataBlob = await encryptJSON(dek, legacyData);
      storeRef.current = { authMode: "pin", wrappedMain, wrappedRecovery, data: dataBlob };
      await saveAuthStore(storeRef.current);
      keyRef.current = dek;
      pendingDataRef.current = legacyData;
      recoveryCodeRef.current = recoveryCode;
      recoveryNoteRef.current = "Your security was just upgraded to support backup codes and two-factor authentication. Save this new backup code — it's the only way back in if you forget your PIN.";
      setError("");
      setPhase("recovery-reveal");
    } catch (e) {
      setError("Incorrect PIN — try again.");
    }
  };

  const handleUnlockTwoFA = async (code) => {
    const ok = await verifyTotp(pendingDataRef.current.security.totpSecret, code);
    if (!ok) { setError("That code didn't match — try again."); return; }
    setError("");
    enterDashboard();
  };

  /* ---------- forgot PIN: honest local explanation -> backup code -> new PIN -> back to login ---------- */
  const handleForgotStart = () => { setError(""); setPhase("forgot-explain"); };
  const handleForgotHaveCode = () => { setError(""); setPhase("forgot-code"); };
  const handleForgotBackToLogin = () => { setError(""); setPhase("unlock"); };

  const handleForgotCodeSubmit = async (code) => {
    try {
      const store = storeRef.current;
      const key2 = await deriveKey(code, store.wrappedRecovery.salt);
      const dek = await unwrapDEK(key2, store.wrappedRecovery.iv, store.wrappedRecovery.cipher);
      const decrypted = migrateData(await decryptJSON(dek, store.data.iv, store.data.cipher));
      forgotDekRef.current = dek;
      forgotDataRef.current = decrypted;
      firstCredRef.current = "";
      setError("");
      setPhase("forgot-create");
    } catch (e) {
      setError("That backup code doesn't match — double-check and try again.");
    }
  };

  const handleForgotCreateSubmit = (val) => { firstCredRef.current = val; setError(""); setPhase("forgot-confirm"); };

  const handleForgotConfirmSubmit = async (val) => {
    if (val !== firstCredRef.current) {
      setError("PINs don't match — try again.");
      firstCredRef.current = "";
      setPhase("forgot-create");
      return;
    }
    const dek = forgotDekRef.current;
    const salt1 = randomSaltB64();
    const key1 = await deriveKey(val, salt1);
    const wrappedMain = await wrapDEK(key1, dek);
    wrappedMain.salt = salt1;

    const newRecoveryCode = generateRecoveryCode();
    const salt2 = randomSaltB64();
    const key2 = await deriveKey(newRecoveryCode, salt2);
    const wrappedRecovery = await wrapDEK(key2, dek);
    wrappedRecovery.salt = salt2;

    storeRef.current = { ...storeRef.current, authMode: "pin", wrappedMain, wrappedRecovery };
    await saveAuthStore(storeRef.current);

    // Data itself never changed (same DEK), so nothing else needs re-encrypting.
    recoveryCodeRef.current = newRecoveryCode;
    recoveryNoteRef.current = "Your PIN was reset. Here's your new backup code — save it, since the old one no longer works.";
    setError("");
    setPhase("recovery-reveal-reset");
  };

  const handleRecoveryResetContinue = () => {
    // After a reset, send the person back to the login page to log in fresh with their new PIN.
    keyRef.current = null;
    forgotDekRef.current = null;
    forgotDataRef.current = null;
    pendingDataRef.current = null;
    setError("");
    setPhase("unlock");
  };

  const handleLock = () => { keyRef.current = null; setData(null); setError(""); setPhase("unlock"); };

  /* ---------- settings: change PIN from inside the dashboard ---------- */
  const handleChangeCredential = useCallback(async (currentCred, newVal) => {
    try {
      const store = storeRef.current;
      const key1 = await deriveKey(currentCred, store.wrappedMain.salt);
      const dek = await unwrapDEK(key1, store.wrappedMain.iv, store.wrappedMain.cipher); // throws if currentCred is wrong

      const newSalt = randomSaltB64();
      const newKey = await deriveKey(newVal, newSalt);
      const wrappedMain = await wrapDEK(newKey, dek);
      wrappedMain.salt = newSalt;

      storeRef.current = { ...store, authMode: "pin", wrappedMain };
      await saveAuthStore(storeRef.current);
      keyRef.current = dek;
      return { ok: true };
    } catch (e) {
      return { ok: false, error: "Your current PIN doesn't match." };
    }
  }, []);

  /* ---------- factory reset: for when both the PIN and the backup code are lost ---------- */
  const handleFactoryReset = useCallback(async () => {
    try { await idbDeleteDatabase(); } catch (e) { /* ignore */ }
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) { /* ignore */ }
    window.location.reload();
  }, []);

  if (phase === "loading") {
    return <div className="min-h-screen flex items-center justify-center text-[var(--text-dim)] text-sm">Loading…</div>;
  }

  const wrapped = (children) => <>
    <AuthBackground />
    <ThemeToggle />
    {children}
    {showReset && <FactoryResetModal onClose={() => setShowReset(false)} onConfirm={handleFactoryReset} />}
  </>;

  switch (phase) {
    case "landing":
      return <LandingPage onLaunch={handleLaunch} />;
    case "create":
      return wrapped(<div key="create">
        <CredentialScreen mode="pin" title="Set your Master PIN"
          subtitle="Welcome to Ledger. This generates the encryption key that secures your data right on this device — nothing is ever sent anywhere."
          onSubmit={handleCreateSubmit} error={error} submitLabel="Continue" showDisclaimer />
      </div>);
    case "confirm":
      return wrapped(<div key="confirm">
        <CredentialScreen mode="pin" title="Confirm your PIN"
          subtitle="Enter it once more to lock it in." onSubmit={handleConfirmSubmit} error={error} submitLabel="Continue" />
      </div>);
    case "recovery-reveal":
      return wrapped(<div key="recovery-reveal"><RecoveryRevealScreen code={recoveryCodeRef.current} note={recoveryNoteRef.current} onContinue={handleRecoveryRevealContinue} /></div>);
    case "twofa-offer":
      return wrapped(<div key="twofa-offer"><TwoFAOfferScreen onEnable={handleTwoFAEnable} onSkip={handleTwoFASkip} /></div>);
    case "twofa-setup": {
      const otpauthUrl = `otpauth://totp/Ledger:local?secret=${pendingTotpSecretRef.current}&issuer=Ledger&digits=6&period=30`;
      return wrapped(<div key="twofa-setup"><TwoFASetupScreen secret={pendingTotpSecretRef.current} otpauthUrl={otpauthUrl} onVerify={handleTwoFAVerifySetup} onSkip={handleTwoFASkip} error={error} /></div>);
    }
    case "unlock":
      return wrapped(<div key="unlock">
        <CredentialScreen mode="pin" title="Welcome back" subtitle="Enter your PIN to decrypt and unlock your local data."
          onSubmit={handleUnlockSubmit} error={error} submitLabel="Log In" showForgot onForgot={handleForgotStart} showDisclaimer />
        <p className="text-center mt-2">
          <button onClick={() => setShowReset(true)} className="text-[12px] text-[var(--text-dim)] hover:text-[var(--danger)] transition-colors focus-ring">
            Lost your PIN and backup code? Factory reset
          </button>
        </p>
      </div>);
    case "unlock-twofa":
      return wrapped(<div key="unlock-twofa"><TwoFAVerifyScreen onVerify={handleUnlockTwoFA} error={error} /></div>);
    case "forgot-explain":
      return wrapped(<div key="forgot-explain"><ForgotExplainScreen onHaveCode={handleForgotHaveCode} onBackToLogin={handleForgotBackToLogin} onFactoryReset={() => setShowReset(true)} /></div>);
    case "forgot-code":
      return wrapped(<div key="forgot-code">
        <CredentialScreen mode="recovery" icon="key" title="Enter your backup code" subtitle="The 12-character code you saved when you first set up Ledger."
          onSubmit={handleForgotCodeSubmit} error={error} submitLabel="Continue" />
        <p className="text-center mt-2">
          <button onClick={() => setShowReset(true)} className="text-[12px] text-[var(--text-dim)] hover:text-[var(--danger)] transition-colors focus-ring">
            Lost this too? Factory reset instead
          </button>
        </p>
      </div>);
    case "forgot-create":
      return wrapped(<div key="forgot-create">
        <CredentialScreen mode="pin" title="Create a new PIN"
          subtitle="This replaces your old one." onSubmit={handleForgotCreateSubmit} error={error} submitLabel="Continue" />
      </div>);
    case "forgot-confirm":
      return wrapped(<div key="forgot-confirm">
        <CredentialScreen mode="pin" title="Confirm it" subtitle="Enter it once more to lock it in."
          onSubmit={handleForgotConfirmSubmit} error={error} submitLabel="Continue" />
      </div>);
    case "recovery-reveal-reset":
      return wrapped(<div key="recovery-reveal-reset"><RecoveryRevealScreen code={recoveryCodeRef.current} note={recoveryNoteRef.current} onContinue={handleRecoveryResetContinue} continueLabel="Continue to Log In" /></div>);
    case "dashboard":
      if (data) return <>
        <ThemeToggle />
        <Dashboard data={data} saveData={saveData} onLock={handleLock} onChangeCredential={handleChangeCredential} onFactoryReset={() => setShowReset(true)} />
        {showReset && <FactoryResetModal onClose={() => setShowReset(false)} onConfirm={handleFactoryReset} />}
      </>;
      return null;
    default:
      return null;
  }
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
