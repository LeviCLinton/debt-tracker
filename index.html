<script>
  // The Tailwind Play CDN and in-browser Babel transformer both print a
  // one-line "don't use this in production" notice on load. That notice is
  // expected and harmless in this single-file, no-build-step app (there is no
  // production bundler to hand off to), so we filter just those two known
  // messages here — every other console.warn/error still prints normally.
  (function () {
    const KNOWN_NOISY = [
      "cdn.tailwindcss.com should not be used in production",
      "You are using the in-browser Babel transformer",
    ];
    const wrap = (fn) => (...args) => {
      const text = args.map((a) => (typeof a === "string" ? a : "")).join(" ");
      if (KNOWN_NOISY.some((needle) => text.includes(needle))) return;
      fn.apply(console, args);
    };
    console.warn = wrap(console.warn.bind(console));
    console.error = wrap(console.error.bind(console));
  })();
</script>

    .icon-btn, .keypad-btn, .tab-btn { min-height:36px; }
  }
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    color:var(--text-primary);
    background:var(--bg-vignette);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .font-display{font-family:'Space Grotesk',sans-serif;}
  .font-mono{font-family:'JetBrains Mono',monospace;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#232d40;border-radius:8px;}
  ::selection{background:rgba(52,211,153,0.3);}

  @keyframes fadeSlideIn{
    from{opacity:0; transform:translateY(10px) scale(0.98);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }
  .anim-in{animation:fadeSlideIn 0.42s cubic-bezier(0.16,1,0.3,1) both;}

  @keyframes shake{
    10%,90%{transform:translateX(-1px);}
    20%,80%{transform:translateX(2px);}
    30%,50%,70%{transform:translateX(-4px);}
    40%,60%{transform:translateX(4px);}
  }
  .anim-shake{animation:shake 0.5s cubic-bezier(.36,.07,.19,.97) both;}

  @keyframes pulseRing{
    0%,100%{box-shadow:0 0 0 0 var(--ring-color, rgba(52,211,153,0.55));}
    50%{box-shadow:0 0 0 6px var(--ring-color-transparent, rgba(52,211,153,0));}
  }
  .pulse-dot{animation:pulseRing 2.2s ease-in-out infinite;}

  @keyframes riseIn{
    from{opacity:0; transform:translateY(18px);}
    to{opacity:1; transform:translateY(0);}
  }
  .anim-rise{animation:riseIn 0.5s cubic-bezier(0.16,1,0.3,1) both;}

  @keyframes floatKey{
    0%,100%{transform:translateY(0px);}
    50%{transform:translateY(-6px);}
  }
  .float-slow{animation:floatKey 5s ease-in-out infinite;}

  .glass{
    background:linear-gradient(180deg, rgba(22,31,48,0.85) 0%, rgba(17,24,39,0.85) 100%);
    backdrop-filter:blur(14px);
    border:1px solid var(--border-soft);
  }

  .num-input::-webkit-outer-spin-button,
  .num-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .num-input{-moz-appearance:textfield;}

  .slider-track{
    -webkit-appearance:none;
    appearance:none;
    height:6px;
    border-radius:999px;
    background:#1c2740;
    outline:none;
  }
  .slider-track::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:18px;height:18px;border-radius:50%;
    background:var(--emerald);
    box-shadow:0 0 0 4px rgba(52,211,153,0.18), 0 2px 6px rgba(0,0,0,0.4);
    cursor:pointer;
    border:2px solid #071310;
    transition:transform 0.15s ease;
  }
  .slider-track::-webkit-slider-thumb:hover{transform:scale(1.12);}
  .slider-track::-moz-range-thumb{
    width:18px;height:18px;border-radius:50%;
    background:var(--emerald); border:2px solid #071310; cursor:pointer;
  }

  .pin-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid #3a4863;transition:all 0.18s ease;}

  .keypad-btn{ transition:all 0.12s ease; font-family:'Space Grotesk',sans-serif; }
  .keypad-btn:active{transform:scale(0.92); background:var(--surface-hover);}

  .segbtn{ transition: color 0.35s ease; }
  .tab-btn{ transition: all 0.18s ease; }

  .item-card{ transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease; }
  .item-card:hover{ transform:translateY(-2px); border-color:#2c3a54; box-shadow:0 8px 24px -8px rgba(0,0,0,0.5); }

  .progress-bar-fill{ transition: width 0.9s cubic-bezier(0.16,1,0.3,1); }

  .icon-btn:active{ transform:scale(0.9); }

  .avatar{

  .dropzone{

  .dropzone.drag-over{ border-color:var(--emerald); background:rgba(52,211,153,0.06); }

    appearance:none; -webkit-appearance:none; background-image:none;
  }
  .no-scrollbar{ scrollbar-width:none; -ms-overflow-style:none; }
  .no-scrollbar::-webkit-scrollbar{ display:none; }

  .auth-orb-1{ width:440px; height:440px; background:radial-gradient(circle, #34d399, transparent 70%); top:-140px; left:-120px; animation: driftA 15s ease-in-out infinite; }
  .auth-orb-2{ width:400px; height:400px; background:radial-gradient(circle, #3b9eff, transparent 70%); bottom:-160px; right:-120px; animation: driftB 17s ease-in-out infinite; }
  .auth-orb-3{ width:260px; height:260px; background:radial-gradient(circle, #fbbf24, transparent 70%); top:40%; right:10%; animation: driftA 20s ease-in-out infinite reverse; opacity:0.18; }

  @keyframes driftB{ 0%,100%{ transform:translate(0,0) scale(1); } 50%{ transform:translate(-30px,-34px) scale(1.05); } }

  .strength-fill{ height:100%; border-radius:999px; transition:width 0.35s cubic-bezier(0.16,1,0.3,1), background 0.35s ease; }

  .social-btn:hover{ background:var(--surface-hover); transform:translateY(-1px); border-color:#2c3a54; }

    0%{ opacity:0; transform:scale(0.9) translateY(6px); }
    100%{ opacity:1; transform:scale(1) translateY(0); }
  }
  .anim-pop{ animation: gentlePop 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }

  .tooltip-anchor{ position:relative; display:inline-flex; }
  .tooltip-bubble{
    position:absolute;
    left:50%;
    transform:translateX(-50%) translateY(4px);
    background:#0a0e15;
    color:#f4f7fb;
    font-family:'Inter',sans-serif;
    font-size:11.5px;
    font-weight:500;
    line-height:1.35;
    padding:7px 11px;
    border-radius:9px;
    width:max-content;
    max-width:220px;
    text-align:center;
    white-space:normal;
    box-shadow:0 10px 28px -6px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.07);
    opacity:0;
    visibility:hidden;
    pointer-events:none;
    transition:opacity 0.16s ease, transform 0.16s ease, visibility 0.16s;
    z-index:90;
  }
  .tooltip-bubble::after{
    content:"";
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:8px;height:8px;
    background:#0a0e15;
    border-radius:2px;
  }
  .tooltip-top{ bottom:calc(100% + 9px); }
  .tooltip-top::after{ bottom:-3px; clip-path:polygon(0 0,100% 0,50% 100%); }
  .tooltip-bottom{ top:calc(100% + 9px); }
  .tooltip-bottom::after{ top:-3px; clip-path:polygon(50% 0,0 100%,100% 100%); }
  .tooltip-anchor:hover .tooltip-bubble,
  .tooltip-anchor:focus-within .tooltip-bubble{
    opacity:1;
    visibility:visible;
    transform:translateX(-50%) translateY(0);
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; }
  }
</style>

/* ============================= CRYPTO HELPERS ============================= */
const enc = new TextEncoder();
const dec = new TextDecoder();

function toB64(buf) {
  const bytes = new Uint8Array(buf);
  let bin = "";
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}
function fromB64(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}
async function deriveKey(pin, saltB64) {
  const salt = new Uint8Array(fromB64(saltB64));
  const baseKey = await crypto.subtle.importKey("raw", enc.encode(pin), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 210000, hash: "SHA-256" },
    baseKey, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
  );
}
async function encryptJSON(key, obj) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const data = enc.encode(JSON.stringify(obj));
  const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, data);
  return { iv: toB64(iv), cipher: toB64(cipher) };
}
async function decryptJSON(key, ivB64, cipherB64) {
  const iv = new Uint8Array(fromB64(ivB64));
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, fromB64(cipherB64));
  return JSON.parse(dec.decode(plain));
}
function randomSaltB64() { return toB64(crypto.getRandomValues(new Uint8Array(16)).buffer); }

/* --- Envelope encryption: a random Data Encryption Key (DEK) encrypts the
   actual app data. The DEK itself is "wrapped" (encrypted) separately under
   the PIN/password key AND under a recovery-code key. This means changing
   your PIN/password or resetting via recovery code never requires touching
   or re-encrypting the bulk data — only its small wrapped key. --- */
async function generateDEK() {
  return crypto.subtle.generateKey({ name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
}
async function wrapDEK(wrapperKey, dek) {
  const raw = await crypto.subtle.exportKey("raw", dek);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, wrapperKey, raw);
  return { iv: toB64(iv), cipher: toB64(cipher) };
}
async function unwrapDEK(wrapperKey, ivB64, cipherB64) {
  const iv = new Uint8Array(fromB64(ivB64));
  const raw = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, wrapperKey, fromB64(cipherB64));
  return crypto.subtle.importKey("raw", raw, { name: "AES-GCM" }, true, ["encrypt", "decrypt"]);
}

/* --- Recovery code: a locally-generated backup key. Since this app has no
   server, it can't email a reset link — this code is the honest client-side
   equivalent of "forgot password". --- */
function generateRecoveryCode() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // no ambiguous 0/O/1/I
  const bytes = crypto.getRandomValues(new Uint8Array(12));
  let raw = "";
  for (let i = 0; i < 12; i++) raw += chars[bytes[i] % chars.length];
  return raw.match(/.{1,4}/g).join("-");
}
function normalizeRecoveryInput(str) {
  const clean = (str || "").toUpperCase().replace(/[^A-Z0-9]/g, "");
  return clean.match(/.{1,4}/g)?.join("-") || clean;
}

/* --- TOTP (RFC 6238) two-factor codes, computed entirely client-side with
   Web Crypto's HMAC-SHA1 — compatible with Google Authenticator, Authy, etc. --- */
function base32Encode(bytes) {
  const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
  let bits = 0, value = 0, out = "";
  for (let i = 0; i < bytes.length; i++) {
    value = (value << 8) | bytes[i];
    bits += 8;
    while (bits >= 5) { out += alphabet[(value >>> (bits - 5)) & 31]; bits -= 5; }
  }
  if (bits > 0) out += alphabet[(value << (5 - bits)) & 31];
  return out;
}
function base32Decode(str) {
  const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
  const clean = str.toUpperCase().replace(/[^A-Z2-7]/g, "");
  let bits = 0, value = 0; const bytes = [];
  for (let i = 0; i < clean.length; i++) {
    value = (value << 5) | alphabet.indexOf(clean[i]);
    bits += 5;
    if (bits >= 8) { bytes.push((value >>> (bits - 8)) & 0xff); bits -= 8; }
  }
  return new Uint8Array(bytes);
}
function generateTotpSecret() { return base32Encode(crypto.getRandomValues(new Uint8Array(20))); }
async function hotpCode(secretBytes, counter) {
  const buf = new ArrayBuffer(8);
  const view = new DataView(buf);
  view.setUint32(0, Math.floor(counter / 2 ** 32), false);
  view.setUint32(4, counter >>> 0, false);
  const key = await crypto.subtle.importKey("raw", secretBytes, { name: "HMAC", hash: "SHA-1" }, false, ["sign"]);
  const sig = new Uint8Array(await crypto.subtle.sign("HMAC", key, buf));
  const offset = sig[sig.length - 1] & 0xf;
  const bin = ((sig[offset] & 0x7f) << 24) | ((sig[offset + 1] & 0xff) << 16) | ((sig[offset + 2] & 0xff) << 8) | (sig[offset + 3] & 0xff);
  return String(bin % 1000000).padStart(6, "0");
}
async function totpCodeAt(secretBase32, timeMs, step = 30) {
  const counter = Math.floor(timeMs / 1000 / step);
  return hotpCode(base32Decode(secretBase32), counter);
}
async function verifyTotp(secretBase32, code, windowSteps = 1) {
  const now = Date.now();
  for (let w = -windowSteps; w <= windowSteps; w++) {
    if ((await totpCodeAt(secretBase32, now + w * 30000)) === code) return true;
  }
  return false;
}

/* --- Password strength: a lightweight local heuristic (no external library). --- */
const STORAGE_KEY = "ledger_debtdash_v2"; // legacy localStorage key, kept only for one-time migration
const IDB_NAME = "ledger_debtdash_db";
const IDB_VERSION = 1;
const IDB_STORE = "kv";
const IDB_RECORD_KEY = "authStore";

/* --- IndexedDB storage layer. Bigger quota than localStorage (important now
   that receipts and contact photos live inside the encrypted blob) and never
   blocks the main thread. Objects are stored via structured clone, so no
   JSON.stringify/parse round-trip is needed. A one-time migration pulls in
   anything left over from the old localStorage-based version. --- */
function idbOpen() {
  return new Promise((resolve, reject) => {
    if (!window.indexedDB) { reject(new Error("IndexedDB is not available in this browser.")); return; }
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, "readonly");
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => resolve(req.result ?? null);
    req.onerror = () => reject(req.error);
  });
}
async function idbSet(key, value) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).put(value, key);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}
async function loadAuthStore() {
  const fromIdb = await idbGet(IDB_RECORD_KEY);
  if (fromIdb) return fromIdb;
  // one-time migration: bring over anything left in localStorage from before the IndexedDB switch
  const legacyRaw = localStorage.getItem(STORAGE_KEY);
  if (!legacyRaw) return null;
  try {
    const parsed = JSON.parse(legacyRaw);
    await idbSet(IDB_RECORD_KEY, parsed);
    localStorage.removeItem(STORAGE_KEY);
    return parsed;
  } catch (e) { return null; }
}
async function saveAuthStore(value) { return idbSet(IDB_RECORD_KEY, value); }
function idbDeleteDatabase() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.deleteDatabase(IDB_NAME);
    req.onsuccess = () => resolve(true);
    req.onerror = () => reject(req.error);
    req.onblocked = () => resolve(true); // still proceed with reload; the DB will finish closing on its own
  });
}
function wipeAllLocalData() {
  return new Promise((resolve) => {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) { /* ignore */ }
    try {
      const req = indexedDB.deleteDatabase(IDB_NAME);
      req.onsuccess = () => resolve();
      req.onerror = () => resolve();
      req.onblocked = () => resolve();
    } catch (e) { resolve(); }
  });
}

function resizeImageFile(file, maxSize = 160, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } }
        else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);

  });
}

function downloadFile(filename, content, mime) {

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

function csvEscape(val) {
  const s = val === null || val === undefined ? "" : String(val);
  if (/[",\n]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
  return s;
}
function toCSV(rows, headers) {
  const head = headers.map((h) => csvEscape(h.label)).join(",");
  const body = rows.map((r) => headers.map((h) => csvEscape(h.get(r))).join(",")).join("\n");
  return head + "\n" + body;
}

function migrateData(raw) {
  if (raw && raw.items) return { security: { totpEnabled: false, totpSecret: null }, profile: { name: "", email: "" }, settings: { currency: "USD" }, ...raw };
  if (raw && raw.debts) {
    const items = raw.debts.map((d) => ({
      id: d.id, type: "debt", name: d.name, contact: "", contactImage: null,
      originalAmount: d.balance, balance: d.balance, rate: d.rate || 0,
      minPayment: d.minPayment || 0, dueDate: "", reminderDays: 3, notes: "",
      status: "active", createdAt: new Date().toISOString(), settledAt: null, history: [],
    }));
    return { items, extraBudget: raw.extraBudget ?? 200, strategy: raw.strategy || "avalanche", security: { totpEnabled: false, totpSecret: null }, profile: { name: "", email: "" }, settings: { currency: "USD" } };
  }
  return { items: [], extraBudget: 200, strategy: "avalanche", security: { totpEnabled: false, totpSecret: null }, profile: { name: "", email: "" }, settings: { currency: "USD" } };
}

/* ============================= PAYOFF SIMULATION (debts only) ============================= */
function simulatePayoff(items, extraBudget, strategy) {
  const active = items.filter((d) => d.type === "debt" && d.status === "active" && d.balance > 0);
  if (active.length === 0) {
    return { months: 0, totalInterest: 0, payoffMonth: {}, order: [], insufficient: false };
  }
  const order = [...active].sort((a, b) => strategy === "snowball" ? a.balance - b.balance : b.rate - a.rate);
  const orderIds = order.map((d) => d.id);
  let sim = {}; active.forEach((d) => { sim[d.id] = d.balance; });
  const minSum = active.reduce((s, d) => s + d.minPayment, 0);
  let months = 0, totalInterest = 0;
  const payoffMonth = {};
  const MAX_MONTHS = 720;
  let insufficient = false;
  while (Object.values(sim).some((b) => b > 0.005) && months < MAX_MONTHS) {
    months++;
    active.forEach((d) => {
      if (sim[d.id] > 0.005) { const interest = sim[d.id] * (d.rate / 100 / 12); sim[d.id] += interest; totalInterest += interest; }
    });
    let pool = extraBudget;
    active.forEach((d) => { if (sim[d.id] > 0.005) { const pay = Math.min(d.minPayment, sim[d.id]); sim[d.id] -= pay; } });
    for (const id of orderIds) {
      if (pool <= 0) break;
      if (sim[id] > 0.005) { const pay = Math.min(pool, sim[id]); sim[id] -= pay; pool -= pay; }
    }
    active.forEach((d) => { if (sim[d.id] <= 0.005 && payoffMonth[d.id] === undefined) payoffMonth[d.id] = months; });
    if (months === MAX_MONTHS - 1) insufficient = true;
  }
  return { months, totalInterest, payoffMonth, order: orderIds, insufficient };
}

/* ============================= SEARCH / FILTER / SORT ============================= */
function filterSortItems(items, { query, sortBy, sortDir, statusFilter }) {
  let out = items;
  if (statusFilter && statusFilter !== "all") out = out.filter((i) => i.status === statusFilter);
  if (query && query.trim()) {
    const q = query.trim().toLowerCase();
    out = out.filter((i) => {
      const hay = [i.name, i.contact, i.notes, String(i.balance), String(i.rate), i.dueDate]
        .filter(Boolean).join(" ").toLowerCase();
      return hay.includes(q);
    });
  }
  const dir = sortDir === "asc" ? 1 : -1;
  out = [...out].sort((a, b) => {
    switch (sortBy) {
      case "amount": return (a.balance - b.balance) * dir;
      case "dueDate": {
        const av = a.dueDate ? new Date(a.dueDate).getTime() : Infinity;
        const bv = b.dueDate ? new Date(b.dueDate).getTime() : Infinity;
        return (av - bv) * dir;
      }
      case "dateAdded": return (new Date(a.createdAt) - new Date(b.createdAt)) * dir;
      case "name":
      default: return a.name.localeCompare(b.name) * dir;
    }
  });
  return out;
}

function progressPct(item) {
  const orig = Math.max(item.originalAmount || 0, item.balance || 0, 0.01);
  return Math.max(0, Math.min(100, (1 - item.balance / orig) * 100));
}

function contactSummaries(items) {
  const map = new Map();
  items.forEach((it) => {
    const key = (it.contact || "Unspecified").trim() || "Unspecified";
    if (!map.has(key)) map.set(key, { name: key, image: null, debtTotal: 0, receivableTotal: 0, items: [] });
    const c = map.get(key);
    if (it.status === "active") {
      if (it.type === "debt") c.debtTotal += it.balance; else c.receivableTotal += it.balance;
    }
    if (it.contactImage && !c.image) c.image = it.contactImage;
    c.items.push(it);
  });
  return [...map.values()].sort((a, b) => (b.debtTotal + b.receivableTotal) - (a.debtTotal + a.receivableTotal));
}

              {error && <p className="text-[var(--danger)] text-xs text-center -mt-5 mb-5 font-medium">{error}</p>}
              <PinPad onDigit={handleDigit} onBack={handleBack} />
            </>
          ) : (
            <>
              <div className="relative mb-3">
                <input
                  autoFocus
                  type="text"
                  value={value}
                  onChange={(e) => setValue(e.target.value.toUpperCase())}
                  onKeyDown={(e) => { if (e.key === "Enter") submit(); }}
                  placeholder="XXXX-XXXX-XXXX"
                  className="w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl px-4 py-3.5 font-mono tracking-widest text-center text-sm focus-ring focus:border-[var(--emerald)]"
                />
              </div>
              {error && <p className="text-[var(--danger)] text-xs text-center mb-3 font-medium">{error}</p>}
            </>
          )}

          <button onClick={submit} disabled={!canSubmit}
            className="w-full mt-6 h-12 rounded-2xl font-display font-semibold text-[15px] transition-all focus-ring disabled:opacity-30 disabled:cursor-not-allowed"
            style={{ background: canSubmit ? "var(--emerald)" : "var(--surface)", color: canSubmit ? "#06231a" : "var(--text-dim)" }}>
            {submitLabel}
          </button>

          {showForgot && (
            <button onClick={onForgot} className="w-full text-center text-[12px] text-[var(--text-muted)] hover:text-[var(--emerald)] mt-4 focus-ring transition-colors">
              Forgot your PIN?
            </button>
          )}
        </div>

        {showDisclaimer ? (
          <p className="text-center text-[var(--text-dim)] text-[11px] leading-relaxed mt-6 max-w-[300px] mx-auto">
            Ledger is 100% private and runs entirely on your device. We never store your PIN or your data on a server — so please keep your PIN safe and save your backup code, since without them your data can't be recovered.
          </p>
        ) : (
          <p className="text-center text-[var(--text-dim)] text-xs mt-6">Encrypted locally with AES-GCM. Nothing leaves this device.</p>
        )}
      </div>
    </div>
  );
}

/* --- Shown once right after setup (and again after any recovery reset):
   the one and only way back in if the PIN is forgotten. --- */
function RecoveryRevealScreen({ code, note, onContinue, continueLabel = "Continue" }) {
  const [confirmed, setConfirmed] = useState(false);
  const [copied, setCopied] = useState(false);
  const [downloaded, setDownloaded] = useState(false);
  const saved = copied || downloaded;

  const copy = async () => {
    try { await navigator.clipboard.writeText(code); setCopied(true); setTimeout(() => setCopied(false), 1500); } catch (e) { /* ignore */ }
  };
  const download = () => {
    const content = `Ledger recovery code\n\n${code}\n\nKeep this somewhere safe and private. Anyone with this code can reset the PIN on this device's Ledger data.\nSaved: ${new Date().toLocaleString()}`;
    downloadFile(`ledger-recovery-code-${todayISO()}.txt`, content, "text/plain");
    setDownloaded(true);
  };

  return (
    <div className="min-h-screen flex items-center justify-center px-5 py-10 relative z-10">
      <div className="w-full max-w-sm anim-rise">
        <div className="flex flex-col items-center mb-6">
          <div className="w-16 h-16 rounded-2xl bg-[var(--amber-dim)] border border-[#5c451a] flex items-center justify-center mb-5 float-slow anim-pop">
            <Icon name="key" size={26} className="text-[var(--amber)]" />
          </div>
          <h1 className="font-display text-2xl font-semibold text-center">Save your recovery code</h1>
          <p className="text-[var(--text-muted)] text-sm text-center mt-2 max-w-[300px]">
            {note || "Since Ledger has no server and can't email you a reset link, this code is the only way back in if you forget your PIN."}
          </p>
        </div>
        <div className="glass rounded-3xl p-5 sm:p-7 text-center">
          <div className="recovery-code-capsule text-xl font-semibold px-4 py-4 rounded-2xl bg-[var(--surface)] border border-[var(--border-soft)] mb-4 select-all anim-pop">{code}</div>
          <div className="grid grid-cols-2 gap-2.5 mb-6">
            <button onClick={copy} className="social-btn inline-flex items-center justify-center gap-2 h-11 rounded-xl border border-[var(--border-soft)] text-[13px] font-medium focus-ring" style={{ color: copied ? "var(--emerald)" : "var(--text-primary)" }}>
              <Icon name={copied ? "check-circle" : "receipt"} size={14} /> {copied ? "Copied!" : "Copy code"}
            </button>
            <button onClick={download} className="social-btn inline-flex items-center justify-center gap-2 h-11 rounded-xl border border-[var(--border-soft)] text-[13px] font-medium focus-ring" style={{ color: downloaded ? "var(--emerald)" : "var(--text-primary)" }}>
              <Icon name={downloaded ? "check-circle" : "download"} size={14} /> {downloaded ? "Downloaded!" : "Download"}
            </button>
          </div>
          <label className={`flex items-start gap-2.5 text-left mb-5 ${saved ? "cursor-pointer" : "cursor-not-allowed opacity-50"}`}>
            <input type="checkbox" checked={confirmed} disabled={!saved} onChange={(e) => setConfirmed(e.target.checked)} className="mt-0.5 w-4 h-4 accent-[var(--emerald)]" />
            <span className="text-[13px] text-[var(--text-muted)]">I've saved this somewhere safe — I understand Ledger can't recover it for me.</span>
          </label>
          {!saved && <p className="text-[11px] text-[var(--amber)] -mt-3 mb-5">Copy or download your code first to unlock this checkbox.</p>}
          <button onClick={onContinue} disabled={!confirmed}
            className="w-full h-12 rounded-2xl font-display font-semibold text-[15px] disabled:opacity-30 focus-ring transition-all"
            style={{ background: confirmed ? "var(--emerald)" : "var(--surface)", color: confirmed ? "#06231a" : "var(--text-dim)" }}>
            {continueLabel}
          </button>
        </div>
      </div>
    </div>
  );
}

/* --- Last resort: for when both the PIN and the backup code are gone.
   There is no way to decrypt existing data without one of those, so this
   permanently deletes the local database and starts over from scratch. --- */
function FactoryResetModal({ onClose, onConfirm }) {
  const [confirmText, setConfirmText] = useState("");
  const [busy, setBusy] = useState(false);
  const canReset = confirmText.trim().toUpperCase() === "RESET";

  const handleConfirm = async () => {
    if (!canReset || busy) return;
    setBusy(true);
    await onConfirm();
  };

  return (
    <div className="fixed inset-0 z-[90] flex items-end sm:items-center justify-center modal-backdrop p-4" style={{ background: "rgba(4,6,10,0.8)" }} onClick={() => !busy && onClose()}>
      <div className="modal-panel glass w-full sm:max-w-sm sm:rounded-3xl rounded-t-3xl p-6 sm:p-7" style={{ borderColor: "rgba(251,113,133,0.35)" }} onClick={(e) => e.stopPropagation()}>
        <div className="w-14 h-14 rounded-2xl flex items-center justify-center mb-5" style={{ background: "var(--danger-dim)", border: "1px solid rgba(251,113,133,0.4)" }}>
          <Icon name="triangle-alert" size={24} className="text-[var(--danger)]" />
        </div>
        <h2 className="font-display text-xl font-semibold mb-2">Factory reset Ledger?</h2>
        <p className="text-[13px] text-[var(--text-muted)] leading-relaxed mb-5">
          This permanently deletes your PIN, backup code, and every debt, receivable, and receipt stored on this device. There is no server copy to fall back on — <span className="text-[var(--danger)] font-medium">this cannot be undone.</span>
        </p>
        <label className="text-[12px] text-[var(--text-muted)] font-medium mb-1.5 block">
          Type <span className="font-mono text-[var(--danger)]">RESET</span> to confirm
        </label>
        <input autoFocus type="text" value={confirmText} onChange={(e) => setConfirmText(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter") handleConfirm(); }}
          className="w-full bg-[var(--surface)] border rounded-xl px-4 py-3 text-sm font-mono tracking-widest text-center focus-ring mb-5"
          style={{ borderColor: "rgba(251,113,133,0.3)" }} placeholder="RESET" />
        <div className="flex gap-3">
          <button onClick={onClose} disabled={busy} className="flex-1 h-12 rounded-2xl border border-[var(--border-soft)] text-sm font-medium text-[var(--text-muted)] hover:bg-[var(--surface-hover)] focus-ring disabled:opacity-50">
            Cancel
          </button>
          <button onClick={handleConfirm} disabled={!canReset || busy}
            className="flex-1 h-12 rounded-2xl font-display font-semibold text-[15px] text-white disabled:opacity-30 disabled:cursor-not-allowed focus-ring transition-all"
            style={{ background: "linear-gradient(135deg, #fb7185, #dc2626)" }}>
            {busy ? "Wiping…" : "Wipe Data & Reset"}
          </button>
        </div>
      </div>
    </div>
  );
}

function TwoFASetupScreen({ secret, otpauthUrl, onVerify, onSkip, error }) {
  const qrRef = useRef(null);

  useEffect(() => {

function DueBadge({ item }) {
  if (!item.dueDate) return null;
  const d = daysUntil(item.dueDate);
  let color = "var(--text-dim)", bg = "transparent", label = fmtDate(item.dueDate);
  if (d < 0) { color = "var(--danger)"; bg = "var(--danger-dim)"; label = `${Math.abs(d)}d overdue`; }
  else if (d <= (item.reminderDays ?? 3)) { color = "var(--amber)"; bg = "var(--amber-dim)"; label = d === 0 ? "Due today" : `Due in ${d}d`; }
  else { label = fmtDate(item.dueDate); }
  return (
    <span className="inline-flex items-center gap-1 text-[11px] font-medium px-2 py-0.5 rounded-full" style={{ color, background: bg, border: `1px solid ${color}33` }}>
      <Icon name="clock" size={11} /> {label}
    </span>
  );
}

              <option value="amount">Amount</option>

              <option value="dateAdded">Date added</option>
            </select>
            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[var(--text-dim)] pointer-events-none"><Icon name="arrow-up-down" size={14} /></span>
          </div>
        </Tooltip>
        <Tooltip label="Flip between ascending and descending order." position="bottom">
          <button onClick={() => setSortDir(sortDir === "asc" ? "desc" : "asc")}
            className="icon-btn h-full px-3 rounded-xl border border-[var(--border-soft)] bg-[var(--surface)] hover:bg-[var(--surface-hover)] focus-ring text-[var(--text-muted)]">
            <Icon name="arrow-up-down" size={15} />
          </button>
        </Tooltip>
        <Tooltip label="Show only active entries, only settled ones, or everything." position="bottom">
          <div className="relative">
            <select value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)}
              className="styled-select bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl pl-9 pr-8 py-2.5 text-sm focus-ring cursor-pointer">
              <option value="active">Active</option>
              <option value="settled">Settled</option>
              <option value="all">All</option>
            </select>
            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[var(--text-dim)] pointer-events-none"><Icon name="sliders-horizontal" size={14} /></span>
          </div>
        </Tooltip>
      </div>
    </div>
  );
}

/* ============================= ITEM CARD ============================= */
function ItemCard({ item, rank, accentColor, onOpen, delay }) {
  const pct = progressPct(item);
  const isDebt = item.type === "debt";
  return (
    <div className="item-card glass rounded-2xl p-4 sm:p-5 cursor-pointer anim-in" style={{ animationDelay: `${delay}ms` }} onClick={() => onOpen(item)}>
      <div className="flex items-start justify-between gap-3">
        <div className="flex items-center gap-3 min-w-0">
          <Avatar image={item.contactImage} name={item.contact || item.name} size={38} />
          <div className="min-w-0">
            <div className="flex items-center gap-2">
              <span className="font-display font-semibold text-[15px] truncate">{item.name}</span>
              {rank && (
                <span className="text-[10px] font-mono font-bold px-1.5 py-0.5 rounded-full shrink-0"
                  style={{ background: accentColor.dim, color: accentColor.text, border: `1px solid ${accentColor.border}` }}>#{rank}</span>
              )}
            </div>
            <div className="text-[12px] text-[var(--text-dim)] mt-0.5 truncate">
              {item.contact ? `${item.contact} · ` : ""}{isDebt ? `${item.rate}% APR` : "owed to you"}{item.minPayment ? ` · ${fmtMoney(item.minPayment)}/mo` : ""}
            </div>
          </div>
        </div>
        <div className="text-right shrink-0">
          <div className="font-mono text-lg font-semibold" style={{ color: isDebt ? "var(--text-primary)" : "var(--emerald)" }}>{fmtMoney(item.balance)}</div>
          <div className="text-[11px] text-[var(--text-dim)]">{item.status === "settled" ? "settled" : "balance"}</div>
        </div>
      </div>
      <div className="mt-4">
        <div className="flex items-center justify-between text-[11px] text-[var(--text-dim)] mb-1.5">
          <span>{Math.round(pct)}% paid off</span>
          {item.dueDate && <DueBadge item={item} />}
        </div>
        <div className="h-1.5 rounded-full bg-[#1c2740] overflow-hidden">
          <div className="progress-bar-fill h-full rounded-full" style={{ width: `${pct}%`, background: `linear-gradient(90deg, ${accentColor.text}88, ${accentColor.text})` }}></div>
        </div>
      </div>
    </div>
  );
}

/* ============================= TRANSACTION MODAL (payment / charge) ============================= */
function TransactionModal({ item, onClose, onApply }) {
  const [kind, setKind] = useState("payment");
  const [amount, setAmount] = useState("");
  const [date, setDate] = useState(todayISO());
  const [note, setNote] = useState("");
  const [receipt, setReceipt] = useState(null); // { name, type: 'image'|'pdf', dataUrl }
  const [receiptBusy, setReceiptBusy] = useState(false);
  const receiptRef = useRef(null);
  const valid = Number(amount) > 0;

  const verb = item.type === "debt"
    ? (kind === "payment" ? "Log a payment" : "Add a charge")
    : (kind === "payment" ? "Log money received" : "Lend more money");

  const handleReceiptFile = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    if (file.size > 4 * 1024 * 1024) { alert("That file is a bit large — please choose one under 4MB."); return; }
    setReceiptBusy(true);
    try {
      if (file.type.startsWith("image/")) {
        const dataUrl = await resizeImageFile(file, 1000, 0.8);
        setReceipt({ name: file.name, type: "image", dataUrl });
      } else if (file.type === "application/pdf") {
        const dataUrl = await fileToDataURL(file);
        setReceipt({ name: file.name, type: "pdf", dataUrl });
      } else {
        alert("Please upload a photo or PDF of your receipt.");
      }
    } catch (err) { /* ignore */ }
    setReceiptBusy(false);
  };

  return (
    <div className="fixed inset-0 z-[60] flex items-end sm:items-center justify-center modal-backdrop" style={{ background: "rgba(4,6,10,0.7)" }} onClick={onClose}>
      <div className="modal-panel glass w-full sm:max-w-sm sm:rounded-3xl rounded-t-3xl p-6 sm:p-7" onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-5">
          <h2 className="font-display text-lg font-semibold">{verb}</h2>
          <button onClick={onClose} className="icon-btn w-9 h-9 rounded-full flex items-center justify-center text-[var(--text-muted)] hover:bg-[var(--surface-hover)] focus-ring"><Icon name="x" size={17} /></button>
        </div>
        <div className="glass rounded-2xl p-1 grid grid-cols-2 mb-5">
          <button onClick={() => setKind("payment")} className={`py-2.5 rounded-xl text-sm font-medium font-display transition-all ${kind === "payment" ? "" : "text-[var(--text-muted)]"}`}
            style={{ background: kind === "payment" ? "var(--emerald-dim)" : "transparent", color: kind === "payment" ? "var(--emerald)" : undefined, border: kind === "payment" ? "1px solid #1c4f3c" : "1px solid transparent" }}>
            <Icon name="minus-circle" size={14} className="inline mr-1.5 -mt-0.5" />{item.type === "debt" ? "Payment" : "Received"}
          </button>
          <button onClick={() => setKind("charge")} className={`py-2.5 rounded-xl text-sm font-medium font-display transition-all ${kind === "charge" ? "" : "text-[var(--text-muted)]"}`}
            style={{ background: kind === "charge" ? "var(--amber-dim)" : "transparent", color: kind === "charge" ? "var(--amber)" : undefined, border: kind === "charge" ? "1px solid #5c451a" : "1px solid transparent" }}>
            <Icon name="plus-circle" size={14} className="inline mr-1.5 -mt-0.5" />{item.type === "debt" ? "New charge" : "Lend more"}
          </button>
        </div>
        <div className="space-y-4">
          <div>
            <label className="text-[12px] text-[var(--text-muted)] font-medium mb-1.5 block">Amount</label>
            <div className="relative">
              <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-[var(--text-dim)] font-mono text-sm">{currentCurrencySymbol()}</span>
              <input autoFocus type="number" min="0" step="0.01" value={amount} onChange={(e) => setAmount(e.target.value)}
                className="num-input w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl pl-7 pr-3 py-3 font-mono text-sm focus-ring focus:border-[var(--emerald)]" />
            </div>
          </div>
          <div>
            <label className="text-[12px] text-[var(--text-muted)] font-medium mb-1.5 block">Date</label>
            <input type="date" value={date} onChange={(e) => setDate(e.target.value)}
              className="w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl px-4 py-3 text-sm focus-ring focus:border-[var(--emerald)]" />
          </div>
          <div>
            <label className="text-[12px] text-[var(--text-muted)] font-medium mb-1.5 block">Note (optional)</label>
            <input type="text" value={note} onChange={(e) => setNote(e.target.value)} placeholder="e.g. paid via bank transfer"
              className="w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl px-4 py-3 text-sm focus-ring focus:border-[var(--emerald)]" />
          </div>
          <div>
            <label className="text-[12px] text-[var(--text-muted)] font-medium mb-1.5 block">Receipt (optional)</label>
            {receipt ? (
              <div className="flex items-center justify-between px-3.5 py-2.5 rounded-xl bg-[var(--surface)] border border-[var(--border-soft)]">
                <span className="flex items-center gap-2 text-[13px] truncate min-w-0">
                  <Icon name="paperclip" size={14} className="text-[var(--emerald)] shrink-0" />
                  <span className="truncate">{receipt.name}</span>
                </span>
                <button onClick={() => setReceipt(null)} className="icon-btn w-6 h-6 rounded-full flex items-center justify-center text-[var(--text-dim)] hover:bg-[var(--surface-hover)] shrink-0" aria-label="Remove receipt">
                  <Icon name="x" size={13} />
                </button>
              </div>
            ) : (
              <button onClick={() => receiptRef.current?.click()} disabled={receiptBusy}
                className="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl border border-dashed border-[var(--border)] text-[13px] text-[var(--text-muted)] hover:border-[var(--emerald)] hover:text-[var(--text-primary)] focus-ring disabled:opacity-50">
                <Icon name="upload" size={14} /> {receiptBusy ? "Processing…" : "Attach a photo or PDF"}
              </button>
            )}
            <input ref={receiptRef} type="file" accept="image/*,application/pdf" className="hidden" onChange={handleReceiptFile} />
          </div>
        </div>
        <button onClick={() => valid && onApply({ kind, amount: Number(amount), date, note, receipt })} disabled={!valid}
          className="w-full mt-6 h-12 rounded-2xl font-display font-semibold text-[15px] disabled:opacity-30 focus-ring"
          style={{ background: kind === "payment" ? "var(--emerald)" : "var(--amber)", color: "#06231a" }}>
          Confirm {kind === "payment" ? (item.type === "debt" ? "payment" : "receipt") : (item.type === "debt" ? "charge" : "loan")}
        </button>
      </div>
    </div>
  );
}

/* ============================= ITEM MODAL (add/edit) ============================= */
function ItemModal({ initial, defaultType, onClose, onSave, onDelete, onSettle, onTransact }) {
  const isEdit = !!initial;
  const [type, setType] = useState(initial?.type || defaultType || "debt");
  const [name, setName] = useState(initial?.name || "");
  const [contact, setContact] = useState(initial?.contact || "");
  const [contactImage, setContactImage] = useState(initial?.contactImage || null);
  const [balance, setBalance] = useState(initial?.balance ?? "");
  const [rate, setRate] = useState(initial?.rate ?? "");
  const [minPayment, setMinPayment] = useState(initial?.minPayment ?? "");
  const [dueDate, setDueDate] = useState(initial?.dueDate || "");
  const [reminderDays, setReminderDays] = useState(initial?.reminderDays ?? 3);
  const [notes, setNotes] = useState(initial?.notes || "");
  const [showTxn, setShowTxn] = useState(false);
  const [showHistory, setShowHistory] = useState(false);
  const fileRef = useRef(null);

  const valid = name.trim() && Number(balance) >= 0;

  const submit = () => {
    if (!valid) return;
    const base = {
      id: initial?.id || uid("item"),
      type, name: name.trim(), contact: contact.trim(), contactImage,
      balance: Number(balance),
      originalAmount: initial ? Math.max(initial.originalAmount || 0, Number(balance)) : Number(balance),
      rate: Number(rate) || 0,
      minPayment: Number(minPayment) || 0,
      dueDate, reminderDays: Number(reminderDays) || 0, notes: notes.trim(),
      status: initial?.status || "active",
      createdAt: initial?.createdAt || new Date().toISOString(),
      settledAt: initial?.settledAt || null,
      history: initial?.history || [],
    };
    onSave(base);
  };

  const handleImage = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    try { const dataUrl = await resizeImageFile(file); setContactImage(dataUrl); } catch (err) { /* ignore */ }
  };

  const applyTxn = ({ kind, amount, date, note, receipt }) => {
    onTransact(initial.id, { kind, amount, date, note, receipt });
    setShowTxn(false);
    onClose();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center modal-backdrop" style={{ background: "rgba(4,6,10,0.7)" }} onClick={onClose}>
      <div className="modal-panel glass w-full sm:max-w-lg sm:rounded-3xl rounded-t-3xl p-6 sm:p-7 max-h-[92vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-5">
          <h2 className="font-display text-xl font-semibold">{isEdit ? "Edit entry" : "Add an entry"}</h2>
          <button onClick={onClose} className="icon-btn w-9 h-9 rounded-full flex items-center justify-center text-[var(--text-muted)] hover:bg-[var(--surface-hover)] focus-ring"><Icon name="x" size={18} /></button>
        </div>

        <div className="glass rounded-2xl p-1 grid grid-cols-2 mb-5">
          <button onClick={() => setType("debt")} className="py-2.5 rounded-xl text-sm font-medium font-display transition-all"
            style={{ background: type === "debt" ? "var(--emerald-dim)" : "transparent", color: type === "debt" ? "var(--emerald)" : "var(--text-muted)", border: type === "debt" ? "1px solid #1c4f3c" : "1px solid transparent" }}>
            <Icon name="trending-down" size={14} className="inline mr-1.5 -mt-0.5" /> I owe this
          </button>
          <button onClick={() => setType("receivable")} className="py-2.5 rounded-xl text-sm font-medium font-display transition-all"
            style={{ background: type === "receivable" ? "var(--azure-dim)" : "transparent", color: type === "receivable" ? "var(--azure)" : "var(--text-muted)", border: type === "receivable" ? "1px solid #1c3a5c" : "1px solid transparent" }}>
            <Icon name="trending-up" size={14} className="inline mr-1.5 -mt-0.5" /> Owed to me
          </button>
        </div>

        <div className="flex items-center gap-4 mb-5">
          <div className="relative">
            <Avatar image={contactImage} name={contact || name} size={56} />
            <button onClick={() => fileRef.current?.click()} className="icon-btn absolute -bottom-1 -right-1 w-7 h-7 rounded-full bg-[var(--emerald)] text-[#06231a] flex items-center justify-center border-2 border-[var(--bg-base)]" aria-label="Upload photo">
              <Icon name="camera" size={13} />
            </button>
            <input ref={fileRef} type="file" accept="image/*" onChange={handleImage} className="hidden" />
          </div>
          <div className="flex-1">
            <label className="text-[12px] text-[var(--text-muted)] font-medium mb-1.5 block">Contact / person</label>
            <input type="text" value={contact} onChange={(e) => setContact(e.target.value)} placeholder="e.g. John Kamau"
              className="w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl px-4 py-2.5 text-sm focus-ring focus:border-[var(--emerald)]" />
          </div>
        </div>

        <div className="space-y-4">
          <div>
            <label className="text-[12px] text-[var(--text-muted)] font-medium mb-1.5 block">{type === "debt" ? "Debt name" : "What's it for"}</label>
            <input autoFocus type="text" value={name} onChange={(e) => setName(e.target.value)}
              placeholder={type === "debt" ? "e.g. Visa Signature Card" : "e.g. Loan for car repair"}
              className="w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl px-4 py-3 text-sm focus-ring focus:border-[var(--emerald)]" />
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-[12px] text-[var(--text-muted)] font-medium mb-1.5 block">{type === "debt" ? "Current balance" : "Amount owed to you"}</label>
              <div className="relative">
                <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-[var(--text-dim)] font-mono text-sm">{currentCurrencySymbol()}</span>
                <input type="number" min="0" value={balance} onChange={(e) => setBalance(e.target.value)} placeholder="4,500"
                  className="num-input w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl pl-7 pr-3 py-3 font-mono text-sm focus-ring focus:border-[var(--emerald)]" />
              </div>
            </div>
            <div>
              <label className="text-[12px] text-[var(--text-muted)] font-medium mb-1.5 block">Interest rate</label>
              <div className="relative">
                <input type="number" min="0" step="0.01" value={rate} onChange={(e) => setRate(e.target.value)} placeholder="0"
                  className="num-input w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl pl-3 pr-8 py-3 font-mono text-sm focus-ring focus:border-[var(--emerald)]" />
                <span className="absolute right-3.5 top-1/2 -translate-y-1/2 text-[var(--text-dim)] font-mono text-sm">%</span>
              </div>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-[12px] text-[var(--text-muted)] font-medium mb-1.5 block">{type === "debt" ? "Min. monthly payment" : "Expected monthly amount"}</label>
              <div className="relative">
                <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-[var(--text-dim)] font-mono text-sm">{currentCurrencySymbol()}</span>
                <input type="number" min="0" value={minPayment} onChange={(e) => setMinPayment(e.target.value)} placeholder="0"
                  className="num-input w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl pl-7 pr-3 py-3 font-mono text-sm focus-ring focus:border-[var(--emerald)]" />
              </div>
            </div>
            <div>
              <label className="text-[12px] text-[var(--text-muted)] font-medium mb-1.5 block">Due date</label>
              <input type="date" value={dueDate} onChange={(e) => setDueDate(e.target.value)}
                className="w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl px-3 py-3 text-sm focus-ring focus:border-[var(--emerald)]" />
            </div>
          </div>
          <div>
            <label className="text-[12px] text-[var(--text-muted)] font-medium mb-1.5 block">Remind me this many days before due date</label>
            <input type="number" min="0" value={reminderDays} onChange={(e) => setReminderDays(e.target.value)}
              className="num-input w-28 bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl px-3 py-2.5 font-mono text-sm focus-ring focus:border-[var(--emerald)]" />
          </div>
          <div>
            <label className="text-[12px] text-[var(--text-muted)] font-medium mb-1.5 block">Notes</label>
            <textarea rows="2" value={notes} onChange={(e) => setNotes(e.target.value)} placeholder="Anything worth remembering…"
              className="w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl px-4 py-3 text-sm focus-ring focus:border-[var(--emerald)] resize-none" />
          </div>
        </div>

        {isEdit && (
          <>
            <div className="flex gap-2 mt-5">
              <button onClick={() => setShowTxn(true)} className="flex-1 h-11 rounded-xl text-sm font-display font-semibold flex items-center justify-center gap-1.5 focus-ring"
                style={{ background: "var(--surface)", border: "1px solid var(--border-soft)" }}>
                <Icon name="banknote" size={15} /> Log payment / charge
              </button>
              {initial.status === "active" && (
                <button onClick={() => onSettle(initial.id)} className="h-11 px-3.5 rounded-xl text-sm font-display font-semibold flex items-center justify-center gap-1.5 focus-ring"
                  style={{ background: "var(--emerald-dim)", border: "1px solid #1c4f3c", color: "var(--emerald)" }} title="Mark as fully settled">
                  <Icon name="badge-check" size={15} />
                </button>
              )}
            </div>
            {initial.history && initial.history.length > 0 && (
              <div className="mt-4">
                <button onClick={() => setShowHistory((s) => !s)} className="flex items-center gap-1.5 text-[12px] text-[var(--text-muted)] hover:text-[var(--text-primary)]">
                  <Icon name={showHistory ? "chevron-down" : "chevron-right"} size={13} /> {initial.history.length} past transaction{initial.history.length === 1 ? "" : "s"}
                </button>
                {showHistory && (
                  <div className="mt-2 space-y-1.5 max-h-40 overflow-y-auto pr-1">
                    {[...initial.history].reverse().map((t) => (
                      <div key={t.id} className="flex items-center justify-between text-[12px] px-3 py-2 rounded-lg bg-[var(--surface)]">
                        <span className="text-[var(--text-muted)] truncate">{fmtDate(t.date)} {t.note ? `· ${t.note}` : ""}</span>
                        <span className="flex items-center gap-1.5 shrink-0 ml-2">
                          <ReceiptBadge receipt={t.receipt} />
                          <span className="font-mono font-medium" style={{ color: t.kind === "payment" ? "var(--emerald)" : "var(--amber)" }}>
                            {t.kind === "payment" ? "−" : "+"}{fmtMoney2(t.amount)}
                          </span>
                        </span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </>
        )}

        <div className="flex gap-3 mt-6">
          {isEdit && (
            <button onClick={() => onDelete(initial.id)} className="icon-btn h-12 w-12 rounded-2xl flex items-center justify-center text-[var(--danger)] border border-[#4a1f2b] hover:bg-[#2a1218] focus-ring" aria-label="Delete entry">
              <Icon name="trash-2" size={18} />
            </button>
          )}
          <button onClick={submit} disabled={!valid} className="flex-1 h-12 rounded-2xl font-display font-semibold text-[15px] disabled:opacity-30 focus-ring"
            style={{ background: "var(--emerald)", color: "#06231a" }}>
            {isEdit ? "Save changes" : "Add entry"}
          </button>
        </div>
      </div>

      {showTxn && isEdit && <TransactionModal item={initial} onClose={() => setShowTxn(false)} onApply={applyTxn} />}
    </div>
  );
}

/* ============================= STRATEGY TOGGLE & BUDGET ============================= */
function StrategyToggle({ strategy, setStrategy }) {
  return (
    <div className="glass rounded-3xl p-2 relative">
      <div className="grid grid-cols-2 relative">
        <div className="absolute top-0 bottom-0 w-1/2 rounded-2xl transition-transform duration-500 ease-[cubic-bezier(0.16,1,0.3,1)]"
          style={{
            background: strategy === "snowball" ? "linear-gradient(135deg,#0f3d30,#0a2b22)" : "linear-gradient(135deg,#0f2c47,#0a2036)",
            border: `1px solid ${strategy === "snowball" ? "#1c4f3c" : "#1c3a5c"}`,
            transform: strategy === "snowball" ? "translateX(0%)" : "translateX(100%)",
          }}></div>
        <Tooltip label="Prioritizes paying off your smallest balances first for quick psychological wins." position="bottom" className="w-full">
          <button onClick={() => setStrategy("snowball")} className="segbtn relative z-10 py-4 flex flex-col items-center gap-1.5 focus-ring rounded-2xl w-full"
            style={{ color: strategy === "snowball" ? "var(--emerald)" : "var(--text-muted)" }}>
            <Icon name="snowflake" size={20} /><span className="font-display font-semibold text-sm">Snowball</span>
            <span className="text-[11px] text-[var(--text-dim)]">Smallest balance first</span>
          </button>
        </Tooltip>
        <Tooltip label="Prioritizes paying off your highest interest rates first to save the most money." position="bottom" className="w-full">
          <button onClick={() => setStrategy("avalanche")} className="segbtn relative z-10 py-4 flex flex-col items-center gap-1.5 focus-ring rounded-2xl w-full"

/* ============================= DEBT SNAKE TIMELINE ============================= */
function DebtSnake({ items, sim, strategy }) {
  const maxMonths = Math.max(1, sim.months);
  const orderedDebts = sim.order.map((id) => items.find((d) => d.id === id)).filter(Boolean);
  if (orderedDebts.length === 0) {
    return <EmptyState icon="party-popper" title="Nothing to pay off" sub="Add a debt you owe to see your payoff timeline come to life." />;
  }
  const palette = ["#34d399", "#3b9eff", "#fbbf24", "#fb7185", "#a78bfa", "#f472b6", "#22d3ee", "#f97316"];
  return (
    <div className="glass rounded-3xl p-5 sm:p-7">
      <div className="flex items-center justify-between mb-1">
        <h3 className="font-display font-semibold text-lg">Payoff timeline</h3>
        <span className="text-[12px] text-[var(--text-dim)] font-mono">{maxMonths} mo total</span>
      </div>
      <p className="text-[13px] text-[var(--text-muted)] mb-6">
        Order and speed each balance hits zero, using the {strategy === "snowball" ? "Snowball" : "Avalanche"} method.
      </p>
      <div className="space-y-4">
        {orderedDebts.map((d, i) => {
          const payoff = sim.payoffMonth[d.id] || 0;
          const widthPct = Math.max(3, (payoff / maxMonths) * 100);
          const color = palette[i % palette.length];
          return (
            <div key={d.id} className="anim-in" style={{ animationDelay: `${i * 70}ms` }}>
              <div className="flex items-center justify-between mb-1.5">
                <div className="flex items-center gap-2 min-w-0">
                  <span className="w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-mono font-bold shrink-0" style={{ background: color + "22", color, border: `1px solid ${color}55` }}>{i + 1}</span>
                  <span className="font-medium text-sm truncate">{d.name}</span>
                </div>
                <span className="text-[11px] font-mono text-[var(--text-dim)] shrink-0 ml-2">{monthsFromNowLabel(payoff)}</span>
              </div>
              <div className="h-3 rounded-full bg-[#111726] relative overflow-hidden">
                <div className="gantt-bar h-full rounded-full relative" style={{ width: `${widthPct}%`, background: `linear-gradient(90deg, ${color}55, ${color})` }}>
                  <span className="absolute right-0 top-1/2 -translate-y-1/2 w-3 h-3 rounded-full pulse-dot" style={{ background: color, "--ring-color": color + "8c", "--ring-color-transparent": color + "00" }}></span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <div className="flex items-center gap-2 mt-6 pt-5 border-t border-[var(--border-soft)]">
        <Icon name="flag" size={14} className="text-[var(--text-dim)]" />
        <span className="text-[12px] text-[var(--text-dim)]">Debt-free by <span className="text-[var(--text-primary)] font-medium">{monthsFromNowLabel(maxMonths)}</span></span>
      </div>
    </div>
  );
}

/* ============================= STATISTICS VIEW ============================= */
function StatisticsView({ items, sim, extraBudget, strategy }) {
  const activeDebts = items.filter((i) => i.type === "debt" && i.status === "active");
  const activeReceivables = items.filter((i) => i.type === "receivable" && i.status === "active");
  const totalDebt = activeDebts.reduce((s, d) => s + d.balance, 0);
  const totalReceivable = activeReceivables.reduce((s, d) => s + d.balance, 0);
  const net = totalReceivable - totalDebt;

  let totalPaidOut = 0, totalReceived = 0;
  items.forEach((it) => (it.history || []).forEach((t) => {
    if (it.type === "debt" && t.kind === "payment") totalPaidOut += t.amount;
    if (it.type === "receivable" && t.kind === "payment") totalReceived += t.amount;
  }));

  const settledCount = items.filter((i) => i.status === "settled").length;
  const upcoming = items.filter((i) => i.status === "active" && i.dueDate && daysUntil(i.dueDate) <= (i.reminderDays ?? 3) && daysUntil(i.dueDate) >= -30);

  const topBalances = [...items].filter((i) => i.status === "active" && i.balance > 0).sort((a, b) => b.balance - a.balance).slice(0, 6);
  const maxTop = Math.max(1, ...topBalances.map((i) => i.balance));

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        <MetricCard icon="trending-down" label="You owe" value={fmtMoney(totalDebt)} sub={`${activeDebts.length} active`} accent="amber" delay={0} tip="Sum of all balances across your active debts." />
        <MetricCard icon="trending-up" label="Owed to you" value={fmtMoney(totalReceivable)} sub={`${activeReceivables.length} active`} accent="azure" delay={40} tip="Sum of all balances people still owe you." />
        <MetricCard icon="wallet" label="Net position" value={`${net >= 0 ? "+" : ""}${fmtMoney(net)}`} sub={net >= 0 ? "You're net positive" : "You're net negative"} accent={net >= 0 ? "emerald" : "amber"} delay={80} tip="What you'd have left if everyone paid you back and you paid everyone off." />
        <MetricCard icon="banknote" label="Interest to be paid" value={fmtMoney(sim.totalInterest)} sub={`${strategy === "snowball" ? "Snowball" : "Avalanche"} plan`} accent="violet" delay={120} tip="Total interest you'll pay over the life of your current payoff plan." />
        <MetricCard icon="badge-check" label="Total paid historically" value={fmtMoney(totalPaidOut)} sub="Across all your debts" accent="emerald" delay={160} tip="Every payment you've ever logged toward your own debts." />
        <MetricCard icon="archive" label="Total received historically" value={fmtMoney(totalReceived)} sub="From people who owed you" accent="azure" delay={200} tip="Every payment you've received from people who owed you money." />
        <MetricCard icon="badge-check" label="Settled entries" value={String(settledCount)} sub="Fully paid off or repaid" accent="violet" delay={240} tip="Debts and loans you've marked as fully paid off or repaid." />
        <MetricCard icon="alarm-clock" label="Due soon" value={String(upcoming.length)} sub="Within your reminder window" accent="amber" delay={280} tip="Entries whose due date falls inside their reminder window." />
      </div>

      <div className="glass rounded-3xl p-5 sm:p-7">
        <Tooltip label="Your six biggest active balances, debts or receivables, ranked highest to lowest." position="bottom">
          <h3 className="font-display font-semibold text-lg mb-4 inline-block">Largest active balances</h3>
        </Tooltip>
        {topBalances.length === 0 ? (
          <p className="text-[13px] text-[var(--text-muted)]">No active balances to rank yet.</p>
        ) : (
          <div className="space-y-3">
            {topBalances.map((it, i) => (
              <div key={it.id} className="anim-in" style={{ animationDelay: `${i * 40}ms` }}>
                <div className="flex items-center justify-between text-[13px] mb-1">
                  <span className="truncate font-medium">{it.name}{it.contact ? ` · ${it.contact}` : ""}</span>
                  <span className="font-mono text-[var(--text-muted)] shrink-0 ml-2">{fmtMoney(it.balance)}</span>
                </div>
                <div className="h-2.5 rounded-full bg-[#111726] overflow-hidden">
                  <div className="progress-bar-fill h-full rounded-full" style={{ width: `${(it.balance / maxTop) * 100}%`, background: it.type === "debt" ? "linear-gradient(90deg,#fbbf2488,#fbbf24)" : "linear-gradient(90deg,#3b9eff88,#3b9eff)" }}></div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {upcoming.length > 0 && (
        <div className="glass rounded-3xl p-5 sm:p-7">
          <Tooltip label="Entries due soon, based on each one's own reminder window." position="bottom">
            <h3 className="font-display font-semibold text-lg mb-4 flex items-center gap-2"><Icon name="alarm-clock" size={17} className="text-[var(--amber)]" /> Upcoming reminders</h3>
          </Tooltip>
          <div className="space-y-2">
            {upcoming.sort((a, b) => daysUntil(a.dueDate) - daysUntil(b.dueDate)).map((it) => (
              <div key={it.id} className="flex items-center justify-between px-4 py-3 rounded-xl bg-[var(--surface)]">
                <span className="text-sm font-medium">{it.name}{it.contact ? ` · ${it.contact}` : ""}</span>
                <DueBadge item={it} />
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================= SETTINGS ============================= */
function ChangeCredentialModal({ onClose, onSubmit }) {
  const [step, setStep] = useState("current"); // current | new | confirm
  const [currentVal, setCurrentVal] = useState("");
  const [newVal, setNewVal] = useState("");
  const [confirmVal, setConfirmVal] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  const currentValid = currentVal.length >= 4;
  const newValid = newVal.length >= 4 && newVal.length <= 6;

  const handleCurrentContinue = () => { if (currentValid) { setError(""); setStep("new"); } };
  const handleNewContinue = () => { if (newValid) { setError(""); setStep("confirm"); } };

  const handleFinalSubmit = async () => {
    if (confirmVal !== newVal) { setError("PINs don't match — try again."); return; }
    setBusy(true);
    const result = await onSubmit(currentVal, newVal);
    setBusy(false);
    if (!result.ok) { setError(result.error); setStep("current"); setCurrentVal(""); return; }
    onClose(true);
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center modal-backdrop" style={{ background: "rgba(4,6,10,0.7)" }} onClick={() => onClose(false)}>
      <div className="modal-panel glass w-full sm:max-w-sm sm:rounded-3xl rounded-t-3xl p-6 sm:p-7" onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-5">
          <h2 className="font-display text-lg font-semibold">
            {step === "current" ? "Confirm it's you" : step === "new" ? "Choose a new PIN" : "Confirm your new PIN"}
          </h2>
          <button onClick={() => onClose(false)} className="icon-btn w-9 h-9 rounded-full flex items-center justify-center text-[var(--text-muted)] hover:bg-[var(--surface-hover)] focus-ring"><Icon name="x" size={17} /></button>
        </div>

        {step === "current" && (
          <div className="space-y-4">
            <p className="text-[13px] text-[var(--text-muted)]">Enter your current PIN to continue.</p>
            <input autoFocus type="text" inputMode="numeric" value={currentVal}
              onChange={(e) => setCurrentVal(e.target.value.replace(/\D/g, "").slice(0, 6))}
              onKeyDown={(e) => { if (e.key === "Enter") handleCurrentContinue(); }}
              className="w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl px-4 py-3 text-sm font-mono tracking-widest text-center focus-ring focus:border-[var(--emerald)]"
              placeholder="Current PIN" />
            {error && <p className="text-[var(--danger)] text-xs font-medium">{error}</p>}
            <button onClick={handleCurrentContinue} disabled={!currentValid}
              className="w-full h-12 rounded-2xl font-display font-semibold text-[15px] disabled:opacity-30 focus-ring" style={{ background: "var(--emerald)", color: "#06231a" }}>
              Continue
            </button>
          </div>
        )}

        {step === "new" && (
          <div className="space-y-4">
            <input autoFocus type="text" inputMode="numeric" value={newVal}
              onChange={(e) => setNewVal(e.target.value.replace(/\D/g, "").slice(0, 6))}
              onKeyDown={(e) => { if (e.key === "Enter") handleNewContinue(); }}
              className="w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl px-4 py-3 text-sm font-mono tracking-widest text-center focus-ring focus:border-[var(--emerald)]"
              placeholder="New 4–6 digit PIN" />
            <button onClick={handleNewContinue} disabled={!newValid}
              className="w-full h-12 rounded-2xl font-display font-semibold text-[15px] disabled:opacity-30 focus-ring" style={{ background: "var(--emerald)", color: "#06231a" }}>
              Continue
            </button>
          </div>
        )}

        {step === "confirm" && (
          <div className="space-y-4">
            <p className="text-[13px] text-[var(--text-muted)]">Enter it once more to lock it in.</p>
            <input autoFocus type="text" inputMode="numeric" value={confirmVal}
              onChange={(e) => setConfirmVal(e.target.value.replace(/\D/g, "").slice(0, 6))}
              onKeyDown={(e) => { if (e.key === "Enter") handleFinalSubmit(); }}
              className="w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl px-4 py-3 text-sm font-mono tracking-widest text-center focus-ring focus:border-[var(--emerald)]"
              placeholder="Confirm PIN" />
            {error && <p className="text-[var(--danger)] text-xs font-medium">{error}</p>}
            <button onClick={handleFinalSubmit} disabled={busy || confirmVal.length < 4}
              className="w-full h-12 rounded-2xl font-display font-semibold text-[15px] disabled:opacity-30 focus-ring" style={{ background: "var(--emerald)", color: "#06231a" }}>
              {busy ? "Saving…" : "Save new PIN"}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

  const [name, setName] = useState(data.profile?.name || "");
  const [savedPulse, setSavedPulse] = useState(false);
  const [showChangeModal, setShowChangeModal] = useState(false);
  const [successMsg, setSuccessMsg] = useState("");
  const currency = data.settings?.currency || "USD";

    setCurrentCurrency(code); // update immediately so this same render pass reflects it
    saveData((prev) => ({ ...prev, settings: { ...prev.settings, currency: code } }));

  const saveProfile = () => {
    saveData((prev) => ({ ...prev, profile: { ...prev.profile, name: name.trim() } }));
    setSavedPulse(true);
    setTimeout(() => setSavedPulse(false), 1600);
  };

  const handleModalClose = (changed) => {
    setShowChangeModal(false);
    if (changed) {
      setSuccessMsg("Your PIN was updated.");
      setTimeout(() => setSuccessMsg(""), 3000);

  };

  const toggleTotp = () => {
    if (!data.security?.totpEnabled) return; // enabling lives in the setup flow; settings only offers turning it off
    saveData((prev) => ({ ...prev, security: { totpEnabled: false, totpSecret: null } }));
  };

  return (
    <div className="space-y-6 max-w-xl">

          <h3 className="font-display font-semibold text-lg">Profile</h3>

          <div className="flex-1">
            <label className="text-[12px] text-[var(--text-muted)] font-medium mb-1.5 block">Display name</label>
            <input type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. Amara"
              className="w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl px-4 py-2.5 text-sm focus-ring focus:border-[var(--emerald)]" />
          </div>
        </div>
        <div className="flex items-center gap-3">
          <button onClick={saveProfile} className="h-10 px-4 rounded-xl text-[13px] font-display font-semibold focus-ring" style={{ background: "var(--emerald)", color: "#06231a" }}>
            Save profile
          </button>
          {savedPulse && <span className="text-[12px] text-[var(--emerald)] flex items-center gap-1.5 anim-in"><Icon name="check-circle" size={14} /> Saved</span>}
        </div>
        <p className="text-[11px] text-[var(--text-dim)] mt-3">Just a local label for you — stored encrypted, never sent anywhere.</p>
      </div>

      {/* Currency */}
      <div className="glass rounded-3xl p-5 sm:p-7">
        <div className="flex items-center gap-2 mb-5">
          <Icon name="banknote" size={17} className="text-[var(--amber)]" />
          <h3 className="font-display font-semibold text-lg">Currency</h3>
        </div>
        <label className="text-[12px] text-[var(--text-muted)] font-medium mb-1.5 block">Display all amounts in</label>
        <div className="relative">
          <select value={currency} onChange={(e) => changeCurrency(e.target.value)}
            className="styled-select w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl pl-4 pr-9 py-3 text-sm focus-ring focus:border-[var(--emerald)] cursor-pointer appearance-none">
            {CURRENCIES.map((c) => (
              <option key={c.code} value={c.code}>{c.symbol} — {c.label} ({c.code})</option>
            ))}
          </select>
          <span className="absolute right-3.5 top-1/2 -translate-y-1/2 text-[var(--text-dim)] pointer-events-none"><Icon name="chevron-down" size={14} /></span>
        </div>
        <p className="text-[11px] text-[var(--text-dim)] mt-3">
          This only changes how numbers are <em>displayed</em> — balances aren't converted, so switching currencies doesn't change what you actually owe or are owed.
        </p>
      </div>

      {/* Security */}
      <div className="glass rounded-3xl p-5 sm:p-7">
        <div className="flex items-center gap-2 mb-5">
          <Icon name="shield-check" size={17} className="text-[var(--azure)]" />
          <h3 className="font-display font-semibold text-lg">Security</h3>
        </div>

        <div className="flex items-center justify-between px-4 py-3.5 rounded-xl bg-[var(--surface)] border border-[var(--border-soft)] mb-3">
          <div className="flex items-center gap-2.5">
            <Icon name="lock" size={16} className="text-[var(--text-muted)]" />
            <div>
              <div className="text-sm font-medium">PIN</div>
              <div className="text-[11px] text-[var(--text-dim)]">Your sign-in method</div>
            </div>
          </div>
          <button onClick={() => setShowChangeModal(true)} className="h-9 px-3.5 rounded-xl text-[13px] font-display font-semibold focus-ring" style={{ background: "var(--surface-hover)", border: "1px solid var(--border-soft)" }}>
            Change
          </button>
        </div>

        <div className="flex items-center justify-between px-4 py-3.5 rounded-xl bg-[var(--surface)] border border-[var(--border-soft)]">
          <div className="flex items-center gap-2.5">
            <Icon name="alarm-clock" size={16} className="text-[var(--text-muted)]" />
            <div>
              <div className="text-sm font-medium">Two-factor authentication</div>
              <div className="text-[11px] text-[var(--text-dim)]">{data.security?.totpEnabled ? "Enabled — a code is required at login" : "Not set up"}</div>
            </div>
          </div>
          {data.security?.totpEnabled ? (
            <button onClick={toggleTotp} className="h-9 px-3.5 rounded-xl text-[13px] font-display font-semibold text-[var(--danger)] focus-ring" style={{ background: "var(--danger-dim)", border: "1px solid #4a1f2b" }}>

        </div>
        <p className="text-[12px] text-[var(--text-muted)] leading-relaxed">
          Ledger is 100% private and runs entirely on your device. We never store your PIN or your data on a server — so keep your PIN safe and hold onto your backup code, since without them your data can't be recovered.
        </p>
      </div>

      {/* Danger zone */}
      <div className="glass rounded-3xl p-5 sm:p-6" style={{ borderColor: "#4a1f2b" }}>
