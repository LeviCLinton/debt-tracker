<script>
  // Register the service worker (enables offline use + installability) and
  // capture the browser's install prompt so the app can trigger it from a
  // normal in-app button instead of relying on a hidden browser-menu item.
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./service-worker.js").catch(() => {});
    });
  }
  window.__deferredInstallPrompt = null;
  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    window.__deferredInstallPrompt = e;
    window.dispatchEvent(new Event("pwa-installable"));
  });
  window.addEventListener("appinstalled", () => {
    window.__deferredInstallPrompt = null;
    window.dispatchEvent(new Event("pwa-installed"));
  });
</script>
<script>
  // The Tailwind Play CDN and in-browser Babel transformer both print a
  // one-line "don't use this in production" notice on load. That notice is
  // expected and harmless in this single-file, no-build-step app (there is no
  // production bundler to hand off to), so we filter just those two known
  // messages here — every other console.warn/error still prints normally.
  (function () {
    const KNOWN_NOISY = [
      "cdn.tailwindcss.com should not be used in production",
      "You are using the in-browser Babel transformer",
    ];
    const wrap = (fn) => (...args) => {
      const text = args.map((a) => (typeof a === "string" ? a : "")).join(" ");
      if (KNOWN_NOISY.some((needle) => text.includes(needle))) return;
      fn.apply(console, args);
    };
    console.warn = wrap(console.warn.bind(console));
    console.error = wrap(console.error.bind(console));
  })();
</script>

    --emerald-dim:#F6EAD2;
    --azure:#14120D;
    --azure-dim:#F0EEE7;
    --amber:#B8790A;
    --amber-dim:#F6EAD2;

    --danger-dim:#F7E7E4;

    --bg-vignette:linear-gradient(160deg, #14100A 0%, #1E1710 35%, #241B0D 70%, #2E2410 100%);
    --surface:#241D12;
    --surface-raised:#2A2214;
    --surface-hover:#332A19;
    --border:#3A2F1C;
    --border-soft:#2E2617;
    --text-primary:#F5EEDD;
    --text-muted:#C2AC80;
    --text-dim:#8C7C5C;
    --emerald:#E0AC4E;
    --emerald-dim:#3A2E13;
    --azure:#F5EEDD;
    --azure-dim:#332A19;
    --amber:#E0AC4E;
    --amber-dim:#3A2E13;
    --danger:#E2685A;
    --danger-dim:#3A1F1A;
    --violet:#C2AC80;
    --accent:#E0AC4E;
    --accent-ink:#211804;

  html[data-theme="dark"] .slider-track{ background:#332A19; }
  html[data-theme="dark"] .slider-track::-webkit-slider-thumb{ border-color:#241D12; }

  *{box-sizing:border-box;}
  html,body{background:var(--bg-base);}
  html{ -webkit-text-size-adjust:100%; text-size-adjust:100%; }
  html,body{ max-width:100%; overflow-x:hidden; }
  body{ padding-left:env(safe-area-inset-left); padding-right:env(safe-area-inset-right); }
  .min-h-screen{ min-height:100vh; min-height:100dvh; }
  img, svg { max-width:100%; }
  @media (hover: none) and (pointer: coarse){
    /* Touch devices: focus-within already opens tooltips on tap; give a touch-friendly minimum size to anything acting as a control. */
    .icon-btn, .keypad-btn, .tab-btn { min-height:36px; }
  }
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    color:var(--text-primary);
    background:var(--bg-vignette);
    min-height:100vh;

  .font-mono{font-family:'JetBrains Mono',monospace;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#DDD9CF;border-radius:8px;}
  ::selection{background:rgba(184,121,10,0.25);}

  @keyframes fadeSlideIn{
    from{opacity:0; transform:translateY(10px) scale(0.98);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }
  .anim-in{animation:fadeSlideIn 0.42s cubic-bezier(0.16,1,0.3,1) both;}

  @keyframes shake{

  @keyframes pulseRing{

  .glass{

  .slider-track{
    -webkit-appearance:none;
    appearance:none;
    height:6px;
    border-radius:999px;
    background:#EEEBE3;
    outline:none;
  }
  .slider-track::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:18px;height:18px;border-radius:50%;
    background:var(--emerald);
    box-shadow:0 0 0 4px rgba(184,121,10,0.18), 0 2px 6px rgba(20,18,13,0.18);

    transition:transform 0.15s ease;

  .slider-track::-webkit-slider-thumb:hover{transform:scale(1.12);}
  .slider-track::-moz-range-thumb{

  .pin-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid #D6D2C6;transition:all 0.18s ease;}
  .pin-dot.filled{background:var(--emerald);border-color:var(--emerald);box-shadow:0 0 10px rgba(184,121,10,0.45);}

  .keypad-btn{ transition:all 0.12s ease; font-family:'Space Grotesk',sans-serif; }

  .segbtn{ transition: color 0.35s ease; }
  .tab-btn{ transition: all 0.18s ease; }

  .item-card{ transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease; }
  .item-card:hover{ border-color:#D9D5C9; }

  .item-card-tilt{ transition: transform 0.12s ease-out, border-color 0.18s ease, box-shadow 0.18s ease; will-change: transform; position:relative; overflow:hidden; }
  .item-card-tilt::before{
    content:"";
    position:absolute; inset:0;
    background:radial-gradient(circle at var(--glare-x,50%) var(--glare-y,50%), rgba(255,255,255,0.07), transparent 55%);

  .item-card-tilt:hover::before{ opacity:1; }

  @keyframes confettiBurst{
    0%{ transform:translate(0,0) rotate(0deg); opacity:1; }
    100%{ transform:translate(var(--tx),var(--ty)) rotate(var(--rot)); opacity:0; }
  }
  .confetti-piece{
    position:absolute;
    width:7px; height:12px;
    border-radius:2px;
    animation:confettiBurst 1.15s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  .confetti-round{ border-radius:50%; width:8px; height:8px; }

  .ripple-host{ position:relative; overflow:hidden; }
  .ripple-dot{
    position:absolute; border-radius:50%;
    background:rgba(255,255,255,0.35);
    transform:scale(0);
    animation: rippleAnim 0.6s ease-out forwards;
    pointer-events:none;
  }
  @keyframes rippleAnim{ to{ transform:scale(1); opacity:0; } }

  .gantt-bar{ transition: width 1.1s cubic-bezier(0.16,1,0.3,1); }
  .progress-bar-fill{ transition: width 0.9s cubic-bezier(0.16,1,0.3,1); }

  .modal-backdrop{ animation: fadeIn 0.2s ease both; }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  .modal-panel{ animation: fadeSlideIn 0.28s cubic-bezier(0.16,1,0.3,1) both; }

  .icon-btn{ transition: background 0.15s ease, color 0.15s ease, transform 0.1s ease; }
  .icon-btn:active{ transform:scale(0.9); }

  .focus-ring:focus-visible{ outline:2px solid var(--emerald); outline-offset:2px; }

  .avatar{
    border-radius:9999px; overflow:hidden; display:flex; align-items:center; justify-content:center;
    background:var(--surface-raised); border:1px solid var(--border-soft); flex-shrink:0;
    font-family:'Space Grotesk',sans-serif; font-weight:600; color:var(--text-muted);
  }
  .avatar img{ width:100%; height:100%; object-fit:cover; }

  .dropzone{
    border:1.5px dashed var(--border); border-radius:20px; transition: border-color 0.2s ease, background 0.2s ease;
  }
  .dropzone.drag-over{ border-color:var(--emerald); background:rgba(184,121,10,0.06); }

  select.styled-select{
    appearance:none; -webkit-appearance:none; background-image:none;
  }
  .no-scrollbar{ scrollbar-width:none; -ms-overflow-style:none; }
  .no-scrollbar::-webkit-scrollbar{ display:none; }

  .collapse-grid{ display:grid; grid-template-rows:0fr; transition:grid-template-rows 0.32s cubic-bezier(0.16,1,0.3,1); }
  .collapse-grid.open{ grid-template-rows:1fr; }
  .collapse-inner{ overflow:hidden; min-height:0; }

  .auth-bg-orb{ position:fixed; border-radius:50%; filter:blur(70px); opacity:0.13; pointer-events:none; z-index:0; }
  .motion-bg-canvas{ position:fixed; inset:0; width:100%; height:100%; z-index:0; pointer-events:none; display:block; }
  .dash-bg-orb{ position:fixed; border-radius:50%; filter:blur(90px); opacity:0.07; pointer-events:none; z-index:0; }
  .auth-orb-1{ width:440px; height:440px; background:radial-gradient(circle, #D4A552, transparent 70%); top:-140px; left:-120px; animation: driftA 15s ease-in-out infinite; }
  .auth-orb-2{ width:400px; height:400px; background:radial-gradient(circle, #14120D, transparent 70%); bottom:-160px; right:-120px; animation: driftB 17s ease-in-out infinite; }
  .auth-orb-3{ width:260px; height:260px; background:radial-gradient(circle, #B8790A, transparent 70%); top:40%; right:10%; animation: driftA 20s ease-in-out infinite reverse; opacity:0.5; }
  @keyframes driftA{ 0%,100%{ transform:translate(0,0) scale(1); } 50%{ transform:translate(36px,26px) scale(1.06); } }
  @keyframes driftB{ 0%,100%{ transform:translate(0,0) scale(1); } 50%{ transform:translate(-30px,-34px) scale(1.05); } }

  .strength-bar{ height:5px; border-radius:999px; background:#EEEBE3; overflow:hidden; }
  .strength-fill{ height:100%; border-radius:999px; transition:width 0.35s cubic-bezier(0.16,1,0.3,1), background 0.35s ease; }

  .social-btn{ transition: background 0.15s ease, transform 0.12s ease, border-color 0.15s ease; }
  .social-btn:hover{ background:var(--surface-hover); transform:translateY(-1px); border-color:#D9D5C9; }
  .social-btn:active{ transform:scale(0.98); }

  .recovery-code-capsule{ font-family:'JetBrains Mono',monospace; letter-spacing:0.06em; }

  @keyframes gentlePop{
    0%{ opacity:0; transform:scale(0.9) translateY(6px); }
    100%{ opacity:1; transform:scale(1) translateY(0); }
  }
  .anim-pop{ animation: gentlePop 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }

  .tooltip-anchor{ position:relative; display:inline-flex; }

  /* Tooltip content is rendered through a React portal straight into <body>,
     positioned with `position:fixed` computed from the trigger's own bounding
     box. This is what actually fixes tooltips getting clipped or buried behind
     other elements: as a plain CSS-only child of the trigger, a tooltip could
     never escape an ancestor's `overflow:hidden`/`overflow:auto` (scrollable
     cards, modals, etc.) no matter how high its z-index was. Portaling to the
     document body removes it from that clipping ancestor entirely. */
  @keyframes tooltipFadeIn{ from{ opacity:0; } to{ opacity:1; } }
  .tooltip-bubble-portal{
    background:#1A1712;
    color:#f4f7fb;
    font-family:'Inter',sans-serif;
    font-size:11.5px;
    font-weight:500;
    line-height:1.35;
    padding:7px 14px;
    border-radius:9999px;
    width:max-content;
    max-width:min(220px, 80vw);
    text-align:center;
    white-space:normal;
    word-break:break-word;
    box-shadow:0 4px 16px -4px rgba(20,18,13,0.16), 0 0 0 1px rgba(20,18,13,0.08);
    pointer-events:none;
    z-index:9999;
    animation:tooltipFadeIn 0.14s ease both;
  }
  .tooltip-portal-arrow{
    position:absolute;
    width:8px; height:8px;
    background:#1A1712;
    border-radius:2px;
    transform:translateX(-50%);
  }
  .tooltip-portal-top .tooltip-portal-arrow{ bottom:-3px; clip-path:polygon(0 0,100% 0,50% 100%); }
  .tooltip-portal-bottom .tooltip-portal-arrow{ top:-3px; clip-path:polygon(50% 0,0 100%,100% 100%); }

  /* ===== Design system: single consistent pill radius everywhere (no mixed radii) ===== */
  [class*="rounded-"]{ border-radius:9999px !important; }
  /* Exception: the assistant chat panel reads as a normal rectangular chat
     window (like any standard messaging widget), not a pill — deliberately
     opts out of the site-wide pill radius above by using its own class name. */
  .assistant-panel-box{ border-radius:14px !important; }
  .avatar{ border-radius:9999px; }

  /* ===== Typography: extreme weight contrast instead of color changes ===== */
  .font-display{ font-weight:800 !important; letter-spacing:-0.01em; }
  body{ font-weight:400; }
  [class*="text-[var(--text-muted)]"], [class*="text-[var(--text-dim)]"]{ font-weight:300; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; }
  }

  /* ===== Landing page: scroll-reveal system (Framer whileInView / Notion-style fade+rise) ===== */
  .reveal{
    opacity:0;
    transform:translateY(28px);
    transition:opacity 0.7s cubic-bezier(0.16,1,0.3,1), transform 0.7s cubic-bezier(0.16,1,0.3,1);
    will-change:opacity, transform;
  }
  .reveal-visible{ opacity:1; transform:translateY(0); }
  .reveal-scale{ transform:translateY(20px) scale(0.96); }
  .reveal-scale.reveal-visible{ transform:translateY(0) scale(1); }

  .landing-nav{
    transition: background 0.3s ease, border-color 0.3s ease, backdrop-filter 0.3s ease;
  }
  .landing-feature-card{
    transition: transform 0.25s cubic-bezier(0.16,1,0.3,1), border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .landing-feature-card:hover{
    transform:translateY(-6px);
    border-color:var(--accent-border);
    box-shadow:0 20px 40px -16px rgba(184,121,10,0.28);
  }
  .landing-hero-orb{ position:absolute; border-radius:50%; filter:blur(80px); pointer-events:none; }
  @keyframes heroFloatA{ 0%,100%{ transform:translate(0,0); } 50%{ transform:translate(30px,-20px); } }
  @keyframes heroFloatB{ 0%,100%{ transform:translate(0,0); } 50%{ transform:translate(-24px,26px); } }

/* ============================= TOOLTIP ============================= */
// Pure CSS hover/focus tooltip: fades + slides in via CSS transitions only,
// no JS state, so it appears/disappears immediately as the mouse enters/leaves.
function TooltipBubble({ coords, position, label }) {
  const ref = useRef(null);
  const [shift, setShift] = useState(0);
  const isTop = position !== "bottom";

  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const margin = 10;
    const w = el.offsetWidth || 220;
    const idealLeft = coords.left - w / 2;
    const idealRight = coords.left + w / 2;
    let s = 0;
    if (idealLeft < margin) s = margin - idealLeft;
    else if (idealRight > window.innerWidth - margin) s = (window.innerWidth - margin) - idealRight;
    setShift(s);
  }, [coords]);

  const style = {
    position: "fixed",
    top: isTop ? coords.top - 9 : coords.top + 9,
    left: coords.left + shift,
    transform: isTop ? "translate(-50%, -100%)" : "translate(-50%, 0)",
  };

  return (
    <div ref={ref} style={style} className={`tooltip-bubble-portal ${isTop ? "tooltip-portal-top" : "tooltip-portal-bottom"}`} role="tooltip">
      {label}
      <span className="tooltip-portal-arrow" style={{ left: `calc(50% - ${shift}px)` }}></span>
    </div>
  );
}

function Tooltip({ label, position = "top", className = "", children }) {
  const anchorRef = useRef(null);
  const [visible, setVisible] = useState(false);
  const [coords, setCoords] = useState(null);

  const show = () => {
    const anchor = anchorRef.current;
    if (!anchor) return;
    const rect = anchor.getBoundingClientRect();
    setCoords({ top: position === "bottom" ? rect.bottom : rect.top, left: rect.left + rect.width / 2 });
    setVisible(true);
  };
  const hide = () => setVisible(false);

  // A tooltip left open during a scroll would end up glued to a stale
  // position, so just dismiss it — it's cheap to re-trigger on next hover.
  useEffect(() => {
    if (!visible) return;
    window.addEventListener("scroll", hide, true);
    window.addEventListener("resize", hide);
    return () => {
      window.removeEventListener("scroll", hide, true);
      window.removeEventListener("resize", hide);
    };
  }, [visible]);

  if (!label) return children;
  return (
    <span ref={anchorRef} className={`tooltip-anchor ${className}`}
      onMouseEnter={show} onMouseLeave={hide} onFocus={show} onBlur={hide} onTouchStart={show} onTouchEnd={hide}>
      {children}
      {visible && coords && ReactDOM.createPortal(
        <TooltipBubble coords={coords} position={position} label={label} />,
        document.body
      )}
    </span>
  );
}

/* ============================= CRYPTO HELPERS ============================= */
const enc = new TextEncoder();
const dec = new TextDecoder();

function toB64(buf) {
  const bytes = new Uint8Array(buf);
  let bin = "";
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}
function fromB64(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}
async function deriveKey(pin, saltB64) {
  const salt = new Uint8Array(fromB64(saltB64));
  const baseKey = await crypto.subtle.importKey("raw", enc.encode(pin), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 210000, hash: "SHA-256" },
    baseKey, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
  );
}
async function encryptJSON(key, obj) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const data = enc.encode(JSON.stringify(obj));
  const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, data);
  return { iv: toB64(iv), cipher: toB64(cipher) };
}
async function decryptJSON(key, ivB64, cipherB64) {
  const iv = new Uint8Array(fromB64(ivB64));
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, fromB64(cipherB64));
  return JSON.parse(dec.decode(plain));
}
function randomSaltB64() { return toB64(crypto.getRandomValues(new Uint8Array(16)).buffer); }

/* --- Envelope encryption: a random Data Encryption Key (DEK) encrypts the
   actual app data. The DEK itself is "wrapped" (encrypted) separately under
   the PIN/password key AND under a recovery-code key. This means changing
   your PIN/password or resetting via recovery code never requires touching
   or re-encrypting the bulk data — only its small wrapped key. --- */
async function generateDEK() {
  return crypto.subtle.generateKey({ name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
}
async function wrapDEK(wrapperKey, dek) {
  const raw = await crypto.subtle.exportKey("raw", dek);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, wrapperKey, raw);
  return { iv: toB64(iv), cipher: toB64(cipher) };
}
async function unwrapDEK(wrapperKey, ivB64, cipherB64) {
  const iv = new Uint8Array(fromB64(ivB64));
  const raw = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, wrapperKey, fromB64(cipherB64));
  return crypto.subtle.importKey("raw", raw, { name: "AES-GCM" }, true, ["encrypt", "decrypt"]);
}

/* --- Recovery code: a locally-generated backup key. Since this app has no
   server, it can't email a reset link — this code is the honest client-side
   equivalent of "forgot password". --- */
function generateRecoveryCode() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // no ambiguous 0/O/1/I
  const bytes = crypto.getRandomValues(new Uint8Array(12));
  let raw = "";
  for (let i = 0; i < 12; i++) raw += chars[bytes[i] % chars.length];
  return raw.match(/.{1,4}/g).join("-");
}
function normalizeRecoveryInput(str) {
  const clean = (str || "").toUpperCase().replace(/[^A-Z0-9]/g, "");
  return clean.match(/.{1,4}/g)?.join("-") || clean;
}

/* --- TOTP (RFC 6238) two-factor codes, computed entirely client-side with
   Web Crypto's HMAC-SHA1 — compatible with Google Authenticator, Authy, etc. --- */
function base32Encode(bytes) {
  const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
  let bits = 0, value = 0, out = "";
  for (let i = 0; i < bytes.length; i++) {
    value = (value << 8) | bytes[i];
    bits += 8;
    while (bits >= 5) { out += alphabet[(value >>> (bits - 5)) & 31]; bits -= 5; }
  }
  if (bits > 0) out += alphabet[(value << (5 - bits)) & 31];
  return out;
}
function base32Decode(str) {
  const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
  const clean = str.toUpperCase().replace(/[^A-Z2-7]/g, "");
  let bits = 0, value = 0; const bytes = [];
  for (let i = 0; i < clean.length; i++) {
    value = (value << 5) | alphabet.indexOf(clean[i]);
    bits += 5;
    if (bits >= 8) { bytes.push((value >>> (bits - 8)) & 0xff); bits -= 8; }
  }
  return new Uint8Array(bytes);
}
function generateTotpSecret() { return base32Encode(crypto.getRandomValues(new Uint8Array(20))); }
async function hotpCode(secretBytes, counter) {
  const buf = new ArrayBuffer(8);
  const view = new DataView(buf);
  view.setUint32(0, Math.floor(counter / 2 ** 32), false);
  view.setUint32(4, counter >>> 0, false);
  const key = await crypto.subtle.importKey("raw", secretBytes, { name: "HMAC", hash: "SHA-1" }, false, ["sign"]);
  const sig = new Uint8Array(await crypto.subtle.sign("HMAC", key, buf));
  const offset = sig[sig.length - 1] & 0xf;
  const bin = ((sig[offset] & 0x7f) << 24) | ((sig[offset + 1] & 0xff) << 16) | ((sig[offset + 2] & 0xff) << 8) | (sig[offset + 3] & 0xff);
  return String(bin % 1000000).padStart(6, "0");
}
async function totpCodeAt(secretBase32, timeMs, step = 30) {
  const counter = Math.floor(timeMs / 1000 / step);
  return hotpCode(base32Decode(secretBase32), counter);
}
async function verifyTotp(secretBase32, code, windowSteps = 1) {
  const now = Date.now();
  for (let w = -windowSteps; w <= windowSteps; w++) {
    if ((await totpCodeAt(secretBase32, now + w * 30000)) === code) return true;
  }
  return false;
}

/* --- Password strength: a lightweight local heuristic (no external library). --- */
const STORAGE_KEY = "ledger_debtdash_v2"; // legacy localStorage key, kept only for one-time migration
const IDB_NAME = "ledger_debtdash_db";
const IDB_VERSION = 1;
const IDB_STORE = "kv";
const IDB_RECORD_KEY = "authStore";

/* --- IndexedDB storage layer. Bigger quota than localStorage (important now
   that receipts and contact photos live inside the encrypted blob) and never
   blocks the main thread. Objects are stored via structured clone, so no
   JSON.stringify/parse round-trip is needed. A one-time migration pulls in
   anything left over from the old localStorage-based version. --- */
function idbOpen() {
  return new Promise((resolve, reject) => {
    if (!window.indexedDB) { reject(new Error("IndexedDB is not available in this browser.")); return; }
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, "readonly");
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => resolve(req.result ?? null);
    req.onerror = () => reject(req.error);
  });
}
async function idbSet(key, value) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).put(value, key);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}
async function loadAuthStore() {
  const fromIdb = await idbGet(IDB_RECORD_KEY);
  if (fromIdb) return fromIdb;
  // one-time migration: bring over anything left in localStorage from before the IndexedDB switch
  const legacyRaw = localStorage.getItem(STORAGE_KEY);
  if (!legacyRaw) return null;
  try {
    const parsed = JSON.parse(legacyRaw);
    await idbSet(IDB_RECORD_KEY, parsed);
    localStorage.removeItem(STORAGE_KEY);
    return parsed;
  } catch (e) { return null; }
}
async function saveAuthStore(value) { return idbSet(IDB_RECORD_KEY, value); }
function idbDeleteDatabase() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.deleteDatabase(IDB_NAME);
    req.onsuccess = () => resolve(true);
    req.onerror = () => reject(req.error);
    req.onblocked = () => resolve(true); // still proceed with reload; the DB will finish closing on its own
  });
}
function wipeAllLocalData() {
  return new Promise((resolve) => {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) { /* ignore */ }
    try {
      const req = indexedDB.deleteDatabase(IDB_NAME);
      req.onsuccess = () => resolve();
      req.onerror = () => resolve();
      req.onblocked = () => resolve();
    } catch (e) { resolve(); }
  });
}

const fmtMoney = (n) => {
  const v = Number(n) || 0;
  try {
    return v.toLocaleString("en-US", { style: "currency", currency: CURRENT_CURRENCY, maximumFractionDigits: 0 });
  } catch (e) {
    return `${CURRENT_CURRENCY} ${Math.round(v).toLocaleString("en-US")}`;
  }
};
const fmtMoney2 = (n) => {
  const v = Number(n) || 0;
  try {
    return v.toLocaleString("en-US", { style: "currency", currency: CURRENT_CURRENCY, maximumFractionDigits: 2 });
  } catch (e) {
    return `${CURRENT_CURRENCY} ${v.toLocaleString("en-US", { maximumFractionDigits: 2 })}`;
  }
};
const monthsFromNowLabel = (months) => {
  const d = new Date();
  d.setMonth(d.getMonth() + months);
  return d.toLocaleDateString("en-US", { month: "long", year: "numeric" });
};
const fmtDate = (iso) => {
  if (!iso) return "—";
  const d = new Date(iso + "T00:00:00");
  if (isNaN(d.getTime())) return "—";
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
};
const fmtDateTime = (iso) => {
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "—";
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
};
const todayISO = () => new Date().toISOString().slice(0, 10);
const daysUntil = (iso) => {
  if (!iso) return null;
  const d = new Date(iso + "T00:00:00");
  const now = new Date(); now.setHours(0, 0, 0, 0);
  return Math.round((d - now) / 86400000);
};

function resizeImageFile(file, maxSize = 160, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } }
        else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

function csvEscape(val) {
  const s = val === null || val === undefined ? "" : String(val);
  if (/[",\n]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
  return s;
}
function toCSV(rows, headers) {
  const head = headers.map((h) => csvEscape(h.label)).join(",");
  const body = rows.map((r) => headers.map((h) => csvEscape(h.get(r))).join(",")).join("\n");
  return head + "\n" + body;
}

/* ============================= PAYOFF SIMULATION (debts only) ============================= */
function simulatePayoff(items, extraBudget, strategy) {
  const active = items.filter((d) => d.type === "debt" && d.status === "active" && d.balance > 0);
  if (active.length === 0) {
    return { months: 0, totalInterest: 0, payoffMonth: {}, order: [], insufficient: false };
  }
  const order = [...active].sort((a, b) => strategy === "snowball" ? a.balance - b.balance : b.rate - a.rate);
  const orderIds = order.map((d) => d.id);
  let sim = {}; active.forEach((d) => { sim[d.id] = d.balance; });
  const minSum = active.reduce((s, d) => s + d.minPayment, 0);
  let months = 0, totalInterest = 0;
  const payoffMonth = {};
  const MAX_MONTHS = 720;
  let insufficient = false;
  while (Object.values(sim).some((b) => b > 0.005) && months < MAX_MONTHS) {
    months++;
    active.forEach((d) => {
      if (sim[d.id] > 0.005) { const interest = sim[d.id] * (d.rate / 100 / 12); sim[d.id] += interest; totalInterest += interest; }
    });
    let pool = extraBudget;
    active.forEach((d) => { if (sim[d.id] > 0.005) { const pay = Math.min(d.minPayment, sim[d.id]); sim[d.id] -= pay; } });
    for (const id of orderIds) {
      if (pool <= 0) break;
      if (sim[id] > 0.005) { const pay = Math.min(pool, sim[id]); sim[id] -= pay; pool -= pay; }
    }
    active.forEach((d) => { if (sim[d.id] <= 0.005 && payoffMonth[d.id] === undefined) payoffMonth[d.id] = months; });
    if (months === MAX_MONTHS - 1) insufficient = true;
  }
  return { months, totalInterest, payoffMonth, order: orderIds, insufficient };
}

/* ============================= SEARCH / FILTER / SORT ============================= */
function filterSortItems(items, { query, sortBy, sortDir, statusFilter }) {
  let out = items;
  if (statusFilter && statusFilter !== "all") out = out.filter((i) => i.status === statusFilter);
  if (query && query.trim()) {
    const q = query.trim().toLowerCase();
    out = out.filter((i) => {
      const hay = [i.name, i.contact, i.notes, String(i.balance), String(i.rate), i.dueDate]
        .filter(Boolean).join(" ").toLowerCase();
      return hay.includes(q);
    });
  }
  const dir = sortDir === "asc" ? 1 : -1;
  out = [...out].sort((a, b) => {
    switch (sortBy) {
      case "amount": return (a.balance - b.balance) * dir;
      case "dueDate": {
        const av = a.dueDate ? new Date(a.dueDate).getTime() : Infinity;
        const bv = b.dueDate ? new Date(b.dueDate).getTime() : Infinity;
        return (av - bv) * dir;
      }
      case "dateAdded": return (new Date(a.createdAt) - new Date(b.createdAt)) * dir;
      case "name":
      default: return a.name.localeCompare(b.name) * dir;
    }
  });
  return out;
}

function progressPct(item) {
  const orig = Math.max(item.originalAmount || 0, item.balance || 0, 0.01);
  return Math.max(0, Math.min(100, (1 - item.balance / orig) * 100));
}

function contactSummaries(items) {
  const map = new Map();
  items.forEach((it) => {
    const key = (it.contact || "Unspecified").trim() || "Unspecified";
    if (!map.has(key)) map.set(key, { name: key, image: null, debtTotal: 0, receivableTotal: 0, items: [] });
    const c = map.get(key);
    if (it.status === "active") {
      if (it.type === "debt") c.debtTotal += it.balance; else c.receivableTotal += it.balance;
    }
    if (it.contactImage && !c.image) c.image = it.contactImage;
    c.items.push(it);
  });
  return [...map.values()].sort((a, b) => (b.debtTotal + b.receivableTotal) - (a.debtTotal + a.receivableTotal));
}

/* ============================= LEDGER ASSISTANT ============================= */
// Two tiers, both explicit to the user:
// - A local, rule-based assistant (default, always on): pattern-matches the
//   question and answers from the user's own already-decrypted data. Nothing
//   ever leaves the device for this tier; it's not an LLM, just a
//   conversational front-end over numbers Ledger already computed.
// - An optional "Connect your own AI" tier: the person supplies their own
//   Anthropic API key, which is stored locally (encrypted, same as everything
//   else) but is used to call api.anthropic.com directly from the browser.
//   That's a real, disclosed exception to "nothing leaves this device," and
//   the UI says so plainly before it's ever enabled.

function buildAssistantContext(items, sim, extraBudget, strategy) {
  const debts = items.filter((i) => i.type === "debt");
  const receivables = items.filter((i) => i.type === "receivable");
  const activeDebts = debts.filter((d) => d.status === "active");
  const activeReceivables = receivables.filter((d) => d.status === "active");
  const totalDebt = activeDebts.reduce((s, d) => s + d.balance, 0);
  const totalReceivable = activeReceivables.reduce((s, d) => s + d.balance, 0);
  const contacts = contactSummaries(items);
  const topDebt = [...activeDebts].sort((a, b) => b.rate - a.rate)[0];
  const smallestDebt = [...activeDebts].sort((a, b) => a.balance - b.balance)[0];
  const dueSoon = items.filter((i) => i.status === "active" && i.dueDate && daysUntil(i.dueDate) <= (i.reminderDays ?? 3) && daysUntil(i.dueDate) >= -30);
  return { debts, receivables, activeDebts, activeReceivables, totalDebt, totalReceivable, contacts, topDebt, smallestDebt, dueSoon, sim, extraBudget, strategy };
}

function answerAssistantLocally(query, ctx) {
  const q = query.toLowerCase();
  const has = (...words) => words.some((w) => q.includes(w));

  if (has("hi", "hello", "hey", "sup", "yo ")) {
    return "Hey! I can answer questions about your debts, receivables, and how to use Ledger. Try asking \"how much do I owe?\" or \"when will I be debt-free?\"";
  }
  if (has("thank")) return "Anytime.";

  if (has("net position", "net worth", "overall")) {
    const net = ctx.totalReceivable - ctx.totalDebt;
    return `Your net position is ${fmtMoney(net)} (${fmtMoney(ctx.totalReceivable)} owed to you minus ${fmtMoney(ctx.totalDebt)} you owe).`;
  }
  if (has("how much do i owe", "total debt", "what do i owe", "owe in total")) {
    return ctx.activeDebts.length
      ? `You currently owe ${fmtMoney(ctx.totalDebt)} across ${ctx.activeDebts.length} active debt${ctx.activeDebts.length === 1 ? "" : "s"}.`
      : "You don't have any active debts logged right now.";
  }
  if (has("owed to me", "who owes me", "receivable")) {
    if (!ctx.activeReceivables.length) return "No one owes you anything logged right now.";
    const top = [...ctx.activeReceivables].sort((a, b) => b.balance - a.balance)[0];
    return `You're owed ${fmtMoney(ctx.totalReceivable)} total across ${ctx.activeReceivables.length} entr${ctx.activeReceivables.length === 1 ? "y" : "ies"}. The largest is ${top.name}${top.contact ? ` (${top.contact})` : ""} at ${fmtMoney(top.balance)}.`;
  }
  if (has("debt free", "debt-free", "freedom date", "when will i")) {
    if (!ctx.activeDebts.length) return "You have no active debts — you're already debt-free!";
    return `At your current pace (${ctx.strategy === "snowball" ? "Snowball" : "Avalanche"} strategy, ${fmtMoney(ctx.extraBudget)} extra/month), you're projected debt-free by ${monthsFromNowLabel(ctx.sim.months)} — about ${ctx.sim.months} month${ctx.sim.months === 1 ? "" : "s"} from now.`;
  }
  if (has("interest", "highest rate", "apr")) {
    if (!ctx.topDebt) return "You don't have any active debts to compare interest rates on.";
    return `Your highest-interest debt is ${ctx.topDebt.name} at ${ctx.topDebt.rate}% APR, with a balance of ${fmtMoney(ctx.topDebt.balance)}. Under the Avalanche method, this is the one extra payments go to first.`;
  }
  if (has("smallest balance", "snowball")) {
    if (has("how", "what is", "what's", "explain")) {
      return "Debt Snowball orders your debts smallest balance first, regardless of interest rate — you pay minimums on everything else and throw every extra dollar at the smallest one. It's built around quick psychological wins rather than pure math.";
    }
    if (!ctx.smallestDebt) return "You don't have any active debts to rank by balance.";
    return `Your smallest active debt is ${ctx.smallestDebt.name} at ${fmtMoney(ctx.smallestDebt.balance)}. Under Snowball, this is the one extra payments go to first.`;
  }
  if (has("avalanche") && has("how", "what is", "what's", "explain")) {
    return "Debt Avalanche orders your debts by highest interest rate first — mathematically it saves you the most money in total interest, even if it takes longer to see a balance hit zero.";
  }
  if (has("due", "reminder", "overdue")) {
    if (!ctx.dueSoon.length) return "Nothing due soon — you're all caught up.";
    const names = ctx.dueSoon.slice(0, 3).map((i) => i.name).join(", ");
    return `You have ${ctx.dueSoon.length} item${ctx.dueSoon.length === 1 ? "" : "s"} due soon: ${names}${ctx.dueSoon.length > 3 ? ", and more" : ""}. Check the Statistics tab for the full list.`;
  }
  if (has("import", "spreadsheet", "excel", "csv")) {
    return "Open the cloud icon in the header → \"Import from a spreadsheet.\" You can download a blank template there too, and Ledger auto-detects name, contact, balance, rate, and due date columns.";
  }
  if (has("export", "backup", "drive", "dropbox", "onedrive")) {
    return "The same cloud icon in the header has export options (CSV or full JSON), and Settings → Bring Your Own Storage lets you back up to your own Google Drive, Dropbox, or OneDrive.";
  }
  if (has("2fa", "two-factor", "two factor")) {
    return "Two-factor authentication uses standard TOTP codes (compatible with Google Authenticator, Authy, 1Password) and can be turned on during setup, or off anytime from Settings → Security.";
  }
  if (has("pin", "password") && has("change", "forgot", "reset")) {
    return "You can change your PIN anytime from Settings → Security → Change. If you're locked out entirely, use \"Forgot your PIN?\" on the login screen — you'll need the backup code you saved at setup.";
  }
  if (has("currency")) {
    return "Settings → Currency lets you switch how amounts are displayed (USD, KES, EUR, and more). It only changes formatting, not actual values — Ledger doesn't do currency conversion.";
  }
  if (has("add a debt", "add debt", "new debt", "log a debt")) {
    return "Go to the \"I Owe\" tab (or Overview) and tap \"Add debt.\" You'll enter a name, balance, interest rate, and minimum payment.";
  }
  if (has("add", "receivable") && has("owe", "loan", "money")) {
    return "Go to the \"Owed to Me\" tab and tap \"Add receivable\" — same fields, just framed as money someone owes you instead.";
  }
  if (has("settled", "paid off")) {
    const settledCount = [...ctx.debts, ...ctx.receivables].filter((i) => i.status === "settled").length;
    return settledCount
      ? `You've settled ${settledCount} entr${settledCount === 1 ? "y" : "ies"} so far — you can see them all in the History tab.`
      : "Nothing's been marked settled yet — once a debt or receivable hits zero, it moves to History automatically.";
  }
  if (has("who are you", "what are you", "what can you do", "help")) {
    return "I'm Ledger's built-in assistant — I run entirely on your device and answer from your own data, no server involved. Ask me things like \"how much do I owe,\" \"when will I be debt-free,\" or \"how do I import a spreadsheet.\"";
  }

  return null; // signals "no local match" to the caller
}

const ASSISTANT_FALLBACK = "I'm not sure how to answer that one locally — I can only pattern-match specific questions about your balances, payoff plan, and how to use Ledger (try \"help\" for examples). For open-ended conversation, you can connect your own AI key in the assistant settings.";

async function callAnthropicAPI(apiKey, model, history, systemPrompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model,
      max_tokens: 1024,
      system: systemPrompt,
      messages: history.map((m) => ({ role: m.role, content: m.text })),
    }),
  });
  if (!res.ok) {
    let detail = "";
    try { detail = (await res.json()).error?.message || ""; } catch (e) { /* ignore */ }
    throw new Error(detail || `Request failed (${res.status})`);
  }
  const json = await res.json();
  const block = (json.content || []).find((b) => b.type === "text");
  return block ? block.text : "(empty response)";
}

/* ============================= AUTH SCREENS ============================= */
function MotionBackground() {
  const canvasRef = useRef(null);
  const rafRef = useRef(null);
  const particlesRef = useRef([]);
  const mouseRef = useRef({ x: -9999, y: -9999 });

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let width = 0, height = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);
    const isDark = () => document.documentElement.getAttribute("data-theme") === "dark";

    // Kept deliberately sparse and low-opacity — this is a minimalist, premium
    // app, so the motion should read as "alive" in peripheral vision, not as
    // a decorative centerpiece competing with real content.
    const countFor = (w, h) => Math.max(14, Math.min(38, Math.round((w * h) / 42000)));

    const makeParticle = () => ({
      x: Math.random() * width,
      y: Math.random() * height,
      vx: (Math.random() - 0.5) * 0.14,
      vy: (Math.random() - 0.5) * 0.14,
      r: 1 + Math.random() * 1.5,
    });

    const resize = () => {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const target = countFor(width, height);
      const arr = particlesRef.current;
      if (arr.length < target) { while (arr.length < target) arr.push(makeParticle()); }
      else if (arr.length > target) { arr.length = target; }
    };
    resize();
    let resizeTimer = null;
    const onResize = () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(resize, 150); };
    window.addEventListener("resize", onResize);

    const onMouseMove = (e) => { mouseRef.current.x = e.clientX; mouseRef.current.y = e.clientY; };
    const onMouseLeave = () => { mouseRef.current.x = -9999; mouseRef.current.y = -9999; };
    window.addEventListener("mousemove", onMouseMove);
    window.addEventListener("mouseleave", onMouseLeave);

    const LINK_DIST = 130;
    const MOUSE_RADIUS = 140;

    const tick = () => {
      const dark = isDark();
      const dotRGB = dark ? "224,172,78" : "184,121,10";   // --accent, theme-matched
      const lineRGB = dark ? "224,172,78" : "20,18,13";     // --accent / --text-primary
      const particles = particlesRef.current;
      const mouse = mouseRef.current;
      ctx.clearRect(0, 0, width, height);

      for (const p of particles) {
        const dx = mouse.x - p.x, dy = mouse.y - p.y;
        const d2 = dx * dx + dy * dy;
        if (d2 < MOUSE_RADIUS * MOUSE_RADIUS) {
          const d = Math.sqrt(d2) || 1;
          const pull = (1 - d / MOUSE_RADIUS) * 0.015;
          p.vx += (dx / d) * pull;
          p.vy += (dy / d) * pull;
        }
        p.vx *= 0.985; p.vy *= 0.985;
        p.x += p.vx; p.y += p.vy;
        if (p.x < -10) p.x = width + 10; else if (p.x > width + 10) p.x = -10;
        if (p.y < -10) p.y = height + 10; else if (p.y > height + 10) p.y = -10;
      }

      ctx.lineWidth = 1;
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i], b = particles[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < LINK_DIST) {
            const alpha = 0.05 * (1 - dist / LINK_DIST);
            ctx.strokeStyle = `rgba(${lineRGB},${alpha.toFixed(3)})`;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }

      for (const p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${dotRGB},0.26)`;
        ctx.fill();
      }

      rafRef.current = requestAnimationFrame(tick);
    };

    const start = () => { if (!rafRef.current) rafRef.current = requestAnimationFrame(tick); };
    const stop = () => { if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; } };
    const onVisibility = () => { if (document.hidden) stop(); else start(); };
    document.addEventListener("visibilitychange", onVisibility);
    start();

    return () => {
      stop();
      window.removeEventListener("resize", onResize);
      window.removeEventListener("mousemove", onMouseMove);
      window.removeEventListener("mouseleave", onMouseLeave);
      document.removeEventListener("visibilitychange", onVisibility);
    };
  }, []);

  return <canvas ref={canvasRef} className="motion-bg-canvas" aria-hidden="true"></canvas>;
}

/* --- Generic credential screen: reused for PIN entry, password entry,

function CredentialScreen({ mode, title, subtitle, icon = "lock", onSubmit, error, submitLabel, showForgot, onForgot, showDisclaimer }) {
  const [value, setValue] = useState("");
  const [shake, setShake] = useState(false);

  useEffect(() => {
    if (error) { setShake(true); const t = setTimeout(() => setShake(false), 500); return () => clearTimeout(t); }
  }, [error]);

  const handleDigit = (d) => { if (value.length < 6) setValue(value + d); };
  const handleBack = () => setValue((v) => v.slice(0, -1));
  const canSubmit = mode === "pin" ? value.length >= 4 : value.replace(/[^A-Z0-9]/gi, "").length >= 8;
  const submit = () => { if (canSubmit) onSubmit(mode === "recovery" ? normalizeRecoveryInput(value) : value); };

  return (
    <div className="min-h-screen flex items-center justify-center px-5 py-10 relative z-10">
      <div className="w-full max-w-sm anim-rise">

        </div>

        <div className={`glass rounded-3xl p-6 sm:p-8 ${shake ? "anim-shake" : ""}`}>
          {mode === "pin" ? (
            <>
              <div className="flex items-center justify-center gap-3 mb-8 h-4">
                {Array.from({ length: Math.max(value.length, 4) }).map((_, i) => (
                  <div key={i} className={`pin-dot ${i < value.length ? "filled" : ""}`}></div>
                ))}
              </div>
              {error && <p className="text-[var(--danger)] text-xs text-center -mt-5 mb-5 font-medium">{error}</p>}
              <PinPad onDigit={handleDigit} onBack={handleBack} />

            <>
              <div className="relative mb-3">
                <input
                  autoFocus
                  type="text"

                  onChange={(e) => setValue(e.target.value.toUpperCase())}

                  placeholder="XXXX-XXXX-XXXX"
                  className="w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl px-4 py-3.5 font-mono tracking-widest text-center text-sm focus-ring focus:border-[var(--emerald)]"
                />

            className="w-full mt-6 h-12 rounded-2xl font-display font-semibold text-[15px] transition-all focus-ring disabled:opacity-30 disabled:cursor-not-allowed"
            style={{ background: canSubmit ? "var(--emerald)" : "var(--surface)", color: canSubmit ? "#211804" : "var(--text-dim)" }}>

/* ============================= SHARED UI BITS ============================= */
function useCountUp(value, duration = 650) {
  const [display, setDisplay] = useState(value);
  const prevRef = useRef(value);
  const rafRef = useRef(null);
  useEffect(() => {
    const from = prevRef.current;
    const to = value;
    if (from === to || Number.isNaN(from) || Number.isNaN(to)) { setDisplay(to); prevRef.current = to; return; }
    const start = performance.now();
    const tick = (now) => {
      const p = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - p, 3); // easeOutCubic
      setDisplay(from + (to - from) * eased);
      if (p < 1) rafRef.current = requestAnimationFrame(tick);
      else prevRef.current = to;
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafRef.current);
  }, [value, duration]);
  return display;
}

function DueBadge({ item }) {
  if (!item.dueDate) return null;
  const d = daysUntil(item.dueDate);
  let color = "var(--text-dim)", bg = "transparent", label = fmtDate(item.dueDate);
  if (d < 0) { color = "var(--danger)"; bg = "var(--danger-dim)"; label = `${Math.abs(d)}d overdue`; }
  else if (d <= (item.reminderDays ?? 3)) { color = "var(--amber)"; bg = "var(--amber-dim)"; label = d === 0 ? "Due today" : `Due in ${d}d`; }

/* A drop-in button with a material-style click ripple. Used on the highest-
   traffic actions (auth submit, primary "add" CTAs) rather than every button
   in the app, to keep the effect feeling special rather than noisy. */
/* Floating light/dark toggle. Rendered once at the App root so it's available
   on every screen — auth flow included, not just inside the dashboard. */
function ThemeToggle() {
  const [dark, setDark] = useState(() => document.documentElement.getAttribute("data-theme") === "dark");

  useEffect(() => {
    const sync = () => setDark(document.documentElement.getAttribute("data-theme") === "dark");
    window.addEventListener("ledger-theme-change", sync);
    return () => window.removeEventListener("ledger-theme-change", sync);
  }, []);

  const toggle = () => {
    const next = !dark;
    setDark(next);
    document.documentElement.setAttribute("data-theme", next ? "dark" : "light");
    try { localStorage.setItem("ledger_theme", next ? "dark" : "light"); } catch (e) { /* ignore */ }
    window.dispatchEvent(new Event("ledger-theme-change"));
  };

  return (
    <Tooltip label={dark ? "Switch to light mode" : "Switch to dark mode"} position="bottom">
      <button onClick={toggle}
        className="icon-btn fixed top-4 right-4 z-[95] w-10 h-10 rounded-full flex items-center justify-center focus-ring"
        style={{ background: "var(--glass-bg)", border: "1px solid var(--glass-border)", backdropFilter: "blur(10px)", color: "var(--text-primary)" }}
        aria-label="Toggle dark mode">
        <Icon name={dark ? "sun" : "moon"} size={17} />
      </button>
    </Tooltip>
  );
}

/* ============================= SCROLL-REVEAL SYSTEM ============================= */
// A lightweight stand-in for Framer Motion's `whileInView` / Notion's fade-and-rise
// section reveals — implemented with a plain IntersectionObserver since this app
// has no bundler and framer-motion has no consumable UMD build for a bare <script>
// tag. Same visual result: elements fade and rise into place once, the first time
// they scroll into view, with an optional stagger delay for grouped children.
function useInView(options) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setInView(true); obs.disconnect(); }
    }, { threshold: 0.15, rootMargin: "0px 0px -8% 0px", ...options });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, inView];
}

function Reveal({ children, delay = 0, scale = false, className = "", as: Tag = "div" }) {
  const [ref, inView] = useInView();
  return (
    <Tag ref={ref} className={`reveal ${scale ? "reveal-scale" : ""} ${inView ? "reveal-visible" : ""} ${className}`}
      style={{ transitionDelay: inView ? `${delay}ms` : "0ms" }}>
      {children}
    </Tag>
  );
}

function useIsStandalone() {
  const [standalone, setStandalone] = useState(false);
  useEffect(() => {
    const mq = window.matchMedia("(display-mode: standalone)");
    const check = () => setStandalone(mq.matches || window.navigator.standalone === true);
    check();
    mq.addEventListener?.("change", check);
    return () => mq.removeEventListener?.("change", check);
  }, []);
  return standalone;
}

function InstallAppButton({ className = "", style, children }) {
  const [installable, setInstallable] = useState(() => !!window.__deferredInstallPrompt);
  const [showManual, setShowManual] = useState(false);
  const standalone = useIsStandalone();

  useEffect(() => {
    const onInstallable = () => setInstallable(true);
    const onInstalled = () => setInstallable(false);
    window.addEventListener("pwa-installable", onInstallable);
    window.addEventListener("pwa-installed", onInstalled);
    return () => {
      window.removeEventListener("pwa-installable", onInstallable);
      window.removeEventListener("pwa-installed", onInstalled);
    };
  }, []);

  if (standalone) return null;

  const handleClick = async () => {
    const promptEvent = window.__deferredInstallPrompt;
    if (promptEvent) {
      promptEvent.prompt();
      try { await promptEvent.userChoice; } catch (e) { /* ignore */ }
      window.__deferredInstallPrompt = null;
      setInstallable(false);
    } else {
      setShowManual(true);
    }
  };

  return (
    <>
      <RippleButton onClick={handleClick} className={className} style={style}>
        {children || (<><Icon name="download" size={15} /> Install App</>)}
      </RippleButton>
      {showManual && <InstallInstructionsModal onClose={() => setShowManual(false)} />}
    </>
  );
}

function RippleButton({ className = "", style, onClick, children, disabled, ...rest }) {
  const [ripples, setRipples] = useState([]);
  const spawn = (e) => {
    if (disabled) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height) * 1.6;
    const id = Date.now() + Math.random();
    const x = e.clientX - rect.left - size / 2;
    const y = e.clientY - rect.top - size / 2;
    setRipples((r) => [...r, { id, x, y, size }]);
    setTimeout(() => setRipples((r) => r.filter((rp) => rp.id !== id)), 600);
  };
  return (
    <button className={`ripple-host ${className}`} style={style} onMouseDown={spawn} onClick={onClick} disabled={disabled} {...rest}>
      {children}
      {ripples.map((r) => (
        <span key={r.id} className="ripple-dot" style={{ left: r.x, top: r.y, width: r.size, height: r.size }}></span>
      ))}
    </button>
  );
}

function ItemCard({ item, rank, accentColor, onOpen, delay }) {
  const pct = progressPct(item);
  const isDebt = item.type === "debt";
  const cardRef = useRef(null);
  const [tilt, setTilt] = useState({ rx: 0, ry: 0, glareX: 50, glareY: 50 });
  const [hovering, setHovering] = useState(false);

  const handleMove = (e) => {
    const el = cardRef.current;
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const px = (e.clientX - rect.left) / rect.width;
    const py = (e.clientY - rect.top) / rect.height;
    setHovering(true);
    setTilt({ rx: (0.5 - py) * 6, ry: (px - 0.5) * 6, glareX: px * 100, glareY: py * 100 });
  };
  const handleLeave = () => { setHovering(false); setTilt({ rx: 0, ry: 0, glareX: 50, glareY: 50 }); };

  return (
    <div ref={cardRef} className="item-card item-card-tilt glass rounded-2xl p-4 sm:p-5 cursor-pointer anim-in"
      style={{ animationDelay: `${delay}ms`, transform: `perspective(700px) translateY(${hovering ? -3 : 0}px) rotateX(${tilt.rx}deg) rotateY(${tilt.ry}deg)`, "--glare-x": `${tilt.glareX}%`, "--glare-y": `${tilt.glareY}%` }}
      onMouseMove={handleMove} onMouseLeave={handleLeave} onClick={() => onOpen(item)}>
      <div className="flex items-start justify-between gap-3">
        <div className="flex items-center gap-3 min-w-0">
          <Avatar image={item.contactImage} name={item.contact || item.name} size={38} />
          <div className="min-w-0">
            <div className="flex items-center gap-2">
              <span className="font-display font-semibold text-[15px] truncate">{item.name}</span>
              {rank && (

                  style={{ background: accentColor.dim, color: accentColor.text, border: `1px solid ${accentColor.border}` }}>#{rank}</span>
              )}
            </div>
            <div className="text-[12px] text-[var(--text-dim)] mt-0.5 truncate">
              {item.contact ? `${item.contact} · ` : ""}{isDebt ? `${item.rate}% APR` : "owed to you"}{item.minPayment ? ` · ${fmtMoney(item.minPayment)}/mo` : ""}
            </div>
          </div>
        </div>
        <div className="text-right shrink-0">
          <div className="font-mono text-lg font-semibold" style={{ color: isDebt ? "var(--text-primary)" : "var(--emerald)" }}>{fmtMoney(item.balance)}</div>
          <div className="text-[11px] text-[var(--text-dim)]">{item.status === "settled" ? "settled" : "balance"}</div>
        </div>
      </div>
      <div className="mt-4">
        <div className="flex items-center justify-between text-[11px] text-[var(--text-dim)] mb-2">
          <span>{Math.round(pct)}% paid off</span>
          {item.dueDate && <DueBadge item={item} />}
        </div>
        <div className="h-1.5 rounded-full bg-[#EEEBE3] overflow-hidden">
          <div className="progress-bar-fill h-full rounded-full" style={{ width: `${pct}%`, background: `linear-gradient(90deg, ${accentColor.text}88, ${accentColor.text})` }}></div>
        </div>
      </div>
    </div>
  );
}

  const [date, setDate] = useState(todayISO());

  const verb = item.type === "debt"
    ? (kind === "payment" ? "Log a payment" : "Add a charge")

    const file = e.target.files?.[0];

        setReceipt({ name: file.name, type: "pdf", dataUrl });

  );
}

/* ============================= ITEM MODAL (add/edit) ============================= */
function ItemModal({ initial, defaultType, onClose, onSave, onDelete, onSettle, onTransact }) {
  const isEdit = !!initial;
  const [type, setType] = useState(initial?.type || defaultType || "debt");
  const [name, setName] = useState(initial?.name || "");
  const [contact, setContact] = useState(initial?.contact || "");
  const [contactImage, setContactImage] = useState(initial?.contactImage || null);
  const [balance, setBalance] = useState(initial?.balance ?? "");
  const [rate, setRate] = useState(initial?.rate ?? "");
  const [minPayment, setMinPayment] = useState(initial?.minPayment ?? "");
  const [dueDate, setDueDate] = useState(initial?.dueDate || "");
  const [reminderDays, setReminderDays] = useState(initial?.reminderDays ?? 3);
  const [notes, setNotes] = useState(initial?.notes || "");
  const [showTxn, setShowTxn] = useState(false);
  const [showHistory, setShowHistory] = useState(false);
  const fileRef = useRef(null);

  const valid = name.trim() && Number(balance) >= 0;

  const submit = () => {
    if (!valid) return;
    const base = {
      id: initial?.id || uid("item"),
      type, name: name.trim(), contact: contact.trim(), contactImage,
      balance: Number(balance),
      originalAmount: initial ? Math.max(initial.originalAmount || 0, Number(balance)) : Number(balance),
      rate: Number(rate) || 0,
      minPayment: Number(minPayment) || 0,
      dueDate, reminderDays: Number(reminderDays) || 0, notes: notes.trim(),
      status: initial?.status || "active",
      createdAt: initial?.createdAt || new Date().toISOString(),
      settledAt: initial?.settledAt || null,
      history: initial?.history || [],
    };
    onSave(base);
  };

  const handleImage = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    try { const dataUrl = await resizeImageFile(file); setContactImage(dataUrl); } catch (err) { /* ignore */ }
  };

  const applyTxn = ({ kind, amount, date, note, receipt }) => {
    onTransact(initial.id, { kind, amount, date, note, receipt });
    setShowTxn(false);
    onClose();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center modal-backdrop p-4" style={{ background: "rgba(4,6,10,0.7)" }} onClick={onClose}>
      <div className="modal-panel glass w-full sm:max-w-lg sm:rounded-3xl p-6 sm:p-7 max-h-[92vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-5">
          <h2 className="font-display text-xl font-semibold">{isEdit ? "Edit entry" : "Add an entry"}</h2>
          <button onClick={onClose} className="icon-btn w-9 h-9 rounded-full flex items-center justify-center text-[var(--text-muted)] hover:bg-[var(--surface-hover)] focus-ring"><Icon name="x" size={18} /></button>
        </div>

        <div className="glass rounded-2xl p-1 grid grid-cols-2 mb-5">
          <button onClick={() => setType("debt")} className="py-2.5 rounded-xl text-sm font-medium font-display transition-all"
            style={{ background: type === "debt" ? "var(--emerald-dim)" : "transparent", color: type === "debt" ? "var(--emerald)" : "var(--text-muted)", border: type === "debt" ? "1px solid #E4C57C" : "1px solid transparent" }}>
            <Icon name="trending-down" size={14} className="inline mr-1.5 -mt-0.5" /> I owe this
          </button>
          <button onClick={() => setType("receivable")} className="py-2.5 rounded-xl text-sm font-medium font-display transition-all"
            style={{ background: type === "receivable" ? "var(--azure-dim)" : "transparent", color: type === "receivable" ? "var(--azure)" : "var(--text-muted)", border: type === "receivable" ? "1px solid #DEDBD2" : "1px solid transparent" }}>
            <Icon name="trending-up" size={14} className="inline mr-1.5 -mt-0.5" /> Owed to me
          </button>
        </div>

        <div className="flex items-center gap-4 mb-5">
          <div className="relative">
            <Avatar image={contactImage} name={contact || name} size={56} />
            <button onClick={() => fileRef.current?.click()} className="icon-btn absolute -bottom-1 -right-1 w-7 h-7 rounded-full bg-[var(--emerald)] text-[#211804] flex items-center justify-center border-2 border-[var(--bg-base)]" aria-label="Upload photo">
              <Icon name="camera" size={13} />
            </button>
            <input ref={fileRef} type="file" accept="image/*" onChange={handleImage} className="hidden" />
          </div>
          <div className="flex-1">
            <label className="text-[12px] text-[var(--text-muted)] font-medium mb-2 block">Contact / person</label>
            <input type="text" value={contact} onChange={(e) => setContact(e.target.value)} placeholder="e.g. John Kamau"
              className="w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl px-4 py-2.5 text-sm focus-ring focus:border-[var(--emerald)]" />
          </div>
        </div>

        <div className="space-y-4">
          <div>
            <label className="text-[12px] text-[var(--text-muted)] font-medium mb-2 block">{type === "debt" ? "Debt name" : "What's it for"}</label>
            <input autoFocus type="text" value={name} onChange={(e) => setName(e.target.value)}
              placeholder={type === "debt" ? "e.g. Visa Signature Card" : "e.g. Loan for car repair"}
              className="w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl px-4 py-3 text-sm focus-ring focus:border-[var(--emerald)]" />
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-[12px] text-[var(--text-muted)] font-medium mb-2 block">{type === "debt" ? "Current balance" : "Amount owed to you"}</label>
              <div className="relative">
                <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-[var(--text-dim)] font-mono text-sm">{currentCurrencySymbol()}</span>
                <input type="number" min="0" value={balance} onChange={(e) => setBalance(e.target.value)} placeholder="4,500"
                  className="num-input w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl pl-7 pr-3 py-3 font-mono text-sm focus-ring focus:border-[var(--emerald)]" />
              </div>
            </div>
            <div>
              <label className="text-[12px] text-[var(--text-muted)] font-medium mb-2 block">Interest rate</label>
              <div className="relative">
                <input type="number" min="0" step="0.01" value={rate} onChange={(e) => setRate(e.target.value)} placeholder="0"
                  className="num-input w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl pl-3 pr-8 py-3 font-mono text-sm focus-ring focus:border-[var(--emerald)]" />
                <span className="absolute right-3.5 top-1/2 -translate-y-1/2 text-[var(--text-dim)] font-mono text-sm">%</span>
              </div>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-[12px] text-[var(--text-muted)] font-medium mb-2 block">{type === "debt" ? "Min. monthly payment" : "Expected monthly amount"}</label>
              <div className="relative">
                <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-[var(--text-dim)] font-mono text-sm">{currentCurrencySymbol()}</span>
                <input type="number" min="0" value={minPayment} onChange={(e) => setMinPayment(e.target.value)} placeholder="0"
                  className="num-input w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl pl-7 pr-3 py-3 font-mono text-sm focus-ring focus:border-[var(--emerald)]" />
              </div>
            </div>
            <div>
              <label className="text-[12px] text-[var(--text-muted)] font-medium mb-2 block">Due date</label>
              <input type="date" value={dueDate} onChange={(e) => setDueDate(e.target.value)}
                className="w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl px-3 py-3 text-sm focus-ring focus:border-[var(--emerald)]" />
            </div>
          </div>
          <div>
            <label className="text-[12px] text-[var(--text-muted)] font-medium mb-2 block">Remind me this many days before due date</label>
            <input type="number" min="0" value={reminderDays} onChange={(e) => setReminderDays(e.target.value)}
              className="num-input w-28 bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl px-3 py-2.5 font-mono text-sm focus-ring focus:border-[var(--emerald)]" />
          </div>
          <div>
            <label className="text-[12px] text-[var(--text-muted)] font-medium mb-2 block">Notes</label>
            <textarea rows="2" value={notes} onChange={(e) => setNotes(e.target.value)} placeholder="Anything worth remembering…"
              className="w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl px-4 py-3 text-sm focus-ring focus:border-[var(--emerald)] resize-none" />
          </div>
        </div>

        {isEdit && (
          <>
            <div className="flex gap-2 mt-5">
              <button onClick={() => setShowTxn(true)} className="flex-1 h-11 rounded-xl text-sm font-display font-semibold flex items-center justify-center gap-2 focus-ring"
                style={{ background: "var(--surface)", border: "1px solid var(--border-soft)" }}>
                <Icon name="banknote" size={15} /> Log payment / charge
              </button>
              {initial.status === "active" && (
                <button onClick={() => onSettle(initial.id)} className="h-11 px-3.5 rounded-xl text-sm font-display font-semibold flex items-center justify-center gap-2 focus-ring"
                  style={{ background: "var(--emerald-dim)", border: "1px solid #E4C57C", color: "var(--emerald)" }} title="Mark as fully settled">
                  <Icon name="badge-check" size={15} />
                </button>
              )}
            </div>
            {initial.history && initial.history.length > 0 && (
              <div className="mt-4">
                <button onClick={() => setShowHistory((s) => !s)} className="flex items-center gap-2 text-[12px] text-[var(--text-muted)] hover:text-[var(--text-primary)]">
                  <Icon name={showHistory ? "chevron-down" : "chevron-right"} size={13} /> {initial.history.length} past transaction{initial.history.length === 1 ? "" : "s"}
                </button>
                {showHistory && (
                  <div className="mt-2 space-y-1.5 max-h-40 overflow-y-auto pr-1">
                    {[...initial.history].reverse().map((t) => (
                      <div key={t.id} className="flex items-center justify-between text-[12px] px-3 py-2 rounded-lg bg-[var(--surface)]">
                        <span className="text-[var(--text-muted)] truncate min-w-0 flex-1">{fmtDate(t.date)} {t.note ? `· ${t.note}` : ""}</span>
                        <span className="flex items-center gap-2 shrink-0 ml-2">
                          <ReceiptBadge receipt={t.receipt} />
                          <span className="font-mono font-medium" style={{ color: t.kind === "payment" ? "var(--emerald)" : "var(--amber)" }}>
                            {t.kind === "payment" ? "−" : "+"}{fmtMoney2(t.amount)}
                          </span>
                        </span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </>
        )}

        <div className="flex gap-3 mt-6">
          {isEdit && (
            <button onClick={() => onDelete(initial.id)} className="icon-btn h-12 w-12 rounded-2xl flex items-center justify-center text-[var(--danger)] border border-[#E8BFB8] hover:bg-[#2a1218] focus-ring" aria-label="Delete entry">
              <Icon name="trash-2" size={18} />
            </button>
          )}
          <button onClick={submit} disabled={!valid} className="flex-1 h-12 rounded-2xl font-display font-semibold text-[15px] disabled:opacity-30 focus-ring"
            style={{ background: "var(--emerald)", color: "#211804" }}>
            {isEdit ? "Save changes" : "Add entry"}
          </button>
        </div>
      </div>

      {showTxn && isEdit && <TransactionModal item={initial} onClose={() => setShowTxn(false)} onApply={applyTxn} />}
    </div>
  );
}

/* ============================= DEBT SNAKE TIMELINE ============================= */
function DebtSnake({ items, sim, strategy }) {
  const maxMonths = Math.max(1, sim.months);
  const orderedDebts = sim.order.map((id) => items.find((d) => d.id === id)).filter(Boolean);
  if (orderedDebts.length === 0) {
    return <EmptyState icon="party-popper" title="Nothing to pay off" sub="Add a debt you owe to see your payoff timeline come to life." />;
  }
  const palette = ["#B8790A", "#C68F2E", "#14120D", "#8A5C08", "#D4A552", "#726F66", "#E2BB76", "#4A3506"];
  return (
    <div className="glass rounded-3xl p-5 sm:p-7">
      <div className="flex items-center justify-between mb-1">
        <h3 className="font-display font-semibold text-lg">Payoff timeline</h3>
        <span className="text-[12px] text-[var(--text-dim)] font-mono">{maxMonths} mo total</span>
      </div>
      <p className="text-[13px] text-[var(--text-muted)] mb-6">
        Order and speed each balance hits zero, using the {strategy === "snowball" ? "Snowball" : "Avalanche"} method.
      </p>
      <div className="space-y-4">
        {orderedDebts.map((d, i) => {
          const payoff = sim.payoffMonth[d.id] || 0;
          const widthPct = Math.max(3, (payoff / maxMonths) * 100);
          const color = palette[i % palette.length];
          return (
            <div key={d.id} className="anim-in" style={{ animationDelay: `${i * 70}ms` }}>
              <div className="flex items-center justify-between mb-2">
                <div className="flex items-center gap-2 min-w-0">
                  <span className="w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-mono font-bold shrink-0" style={{ background: color + "22", color, border: `1px solid ${color}55` }}>{i + 1}</span>
                  <span className="font-medium text-sm truncate">{d.name}</span>
                </div>
                <span className="text-[11px] font-mono text-[var(--text-dim)] shrink-0 ml-2">{monthsFromNowLabel(payoff)}</span>
              </div>
              <div className="h-3 rounded-full bg-[#EEEBE3] relative overflow-hidden">
                <div className="gantt-bar h-full rounded-full relative" style={{ width: `${widthPct}%`, background: `linear-gradient(90deg, ${color}55, ${color})` }}>
                  <span className="absolute right-0 top-1/2 -translate-y-1/2 w-3 h-3 rounded-full pulse-dot" style={{ background: color, "--ring-color": color + "8c", "--ring-color-transparent": color + "00" }}></span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <div className="flex items-center gap-2 mt-6 pt-5 border-t border-[var(--border-soft)]">
        <Icon name="flag" size={14} className="text-[var(--text-dim)]" />
        <span className="text-[12px] text-[var(--text-dim)]">Debt-free by <span className="text-[var(--text-primary)] font-medium">{monthsFromNowLabel(maxMonths)}</span></span>
      </div>
    </div>
  );
}

/* ============================= CONTACTS VIEW ============================= */
function ContactsView({ items, onOpenItem }) {
  const [query, setQuery] = useState("");
  const summaries = useMemo(() => {
    const all = contactSummaries(items);
    if (!query.trim()) return all;
    const q = query.toLowerCase();
    return all.filter((c) => c.name.toLowerCase().includes(q));
  }, [items, query]);
  const [expanded, setExpanded] = useState(null);

  if (items.length === 0) {
    return <EmptyState icon="users" title="No contacts yet" sub="Add a debt or receivable with a contact name to see them grouped here." />;
  }

  return (
    <div>
      <Tooltip label="Filter contacts by name." position="bottom" className="max-w-sm w-full">
        <div className="relative mb-4 max-w-sm w-full">
          <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-[var(--text-dim)]"><Icon name="search" size={16} /></span>
          <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search contacts…"
            className="w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl pl-10 pr-3 py-2.5 text-sm focus-ring focus:border-[var(--emerald)]" />
        </div>
      </Tooltip>
      <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-3">
        {summaries.map((c, i) => {
          const net = c.receivableTotal - c.debtTotal;
          const isOpen = expanded === c.name;
          return (
            <div key={c.name} className="glass rounded-2xl p-4 sm:p-5 anim-in" style={{ animationDelay: `${i * 40}ms` }}>
              <div className="flex items-center justify-between cursor-pointer" onClick={() => setExpanded(isOpen ? null : c.name)}>
                <div className="flex items-center gap-3 min-w-0">
                  <Avatar image={c.image} name={c.name} size={40} />
                  <div className="min-w-0">
                    <div className="font-display font-semibold text-[15px] truncate">{c.name}</div>
                    <div className="text-[11px] text-[var(--text-dim)]">{c.items.length} entr{c.items.length === 1 ? "y" : "ies"}</div>
                  </div>
                </div>
                <Tooltip label="What they owe you, minus what you owe them." position="top">
                  <div className="text-right shrink-0">
                    <div className="font-mono text-base font-semibold" style={{ color: net >= 0 ? "var(--emerald)" : "var(--danger)" }}>
                      {net >= 0 ? "+" : ""}{fmtMoney(net)}
                    </div>
                    <div className="text-[11px] text-[var(--text-dim)]">net position</div>
                  </div>
                </Tooltip>
              </div>
              <div className="flex gap-2 mt-3 text-[12px]">
                <span className="px-4 py-1.5 rounded-lg bg-[var(--azure-dim)] text-[var(--azure)] border border-[#DEDBD2]">Owes you {fmtMoney(c.receivableTotal)}</span>
                <span className="px-4 py-1.5 rounded-lg bg-[var(--amber-dim)] text-[var(--amber)] border border-[#E4C57C]">You owe {fmtMoney(c.debtTotal)}</span>
              </div>
              <div className={`collapse-grid ${isOpen ? "open" : ""}`}>
                <div className="collapse-inner">
                  <div className="mt-3 pt-3 border-t border-[var(--border-soft)] space-y-2">
                    {c.items.map((it) => (
                      <div key={it.id} onClick={() => onOpenItem(it)} className="flex items-center justify-between text-[13px] px-2 py-1.5 rounded-lg hover:bg-[var(--surface-hover)] cursor-pointer">
                        <span className="truncate min-w-0 flex-1">{it.name} {it.status === "settled" && <span className="text-[var(--text-dim)]">(settled)</span>}</span>
                        <span className="font-mono" style={{ color: it.type === "debt" ? "var(--amber)" : "var(--azure)" }}>{fmtMoney(it.balance)}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ============================= HISTORY VIEW ============================= */
function HistoryView({ items }) {
  const [query, setQuery] = useState("");
  const transactions = useMemo(() => {
    let all = [];
    items.forEach((it) => {
      (it.history || []).forEach((t) => all.push({ ...t, itemName: it.name, contact: it.contact, itemType: it.type }));
    });
    all.sort((a, b) => new Date(b.date) - new Date(a.date));
    if (query.trim()) {
      const q = query.toLowerCase();
      all = all.filter((t) => [t.itemName, t.contact, t.note].filter(Boolean).join(" ").toLowerCase().includes(q));
    }
    return all;
  }, [items, query]);

  const settled = useMemo(() => items.filter((i) => i.status === "settled").sort((a, b) => new Date(b.settledAt || 0) - new Date(a.settledAt || 0)), [items]);

  return (
    <div className="space-y-6">
      <Tooltip label="Search transactions by item name, contact, or note." position="bottom" className="max-w-sm w-full">
        <div className="relative max-w-sm w-full">
          <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-[var(--text-dim)]"><Icon name="search" size={16} /></span>
          <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search transaction history…"
            className="w-full bg-[var(--surface)] border border-[var(--border-soft)] rounded-xl pl-10 pr-3 py-2.5 text-sm focus-ring focus:border-[var(--emerald)]" />
        </div>
      </Tooltip>

      <div>
        <h3 className="font-display font-semibold text-lg mb-3 flex items-center gap-2">
          <Tooltip label="A running log of every payment or charge you've logged, across all entries, newest first." position="bottom">
